<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" role="img" aria-labelledby="drTitle">
  <title id="drTitle">Creative domains covered by the stack</title>
  <defs>
    <linearGradient id="railBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1100" height="200" rx="20" fill="url(#railBg)"/>
  <rect x="3" y="3" width="1094" height="194" rx="17" fill="none" stroke="#475569" stroke-width="1.5" opacity="0.9">
    <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="550" y="36" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em">DOMAINS</text>
  <!-- six domain capsules -->
  <g transform="translate(55 55)">
    <g transform="translate(0 0)">
      <rect width="140" height="110" rx="16" fill="#312e81" stroke="#818cf8" stroke-width="2" opacity="0.95">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
      </rect>
      <!-- palette icon -->
      <ellipse cx="70" cy="52" rx="36" ry="22" fill="none" stroke="#c7d2fe" stroke-width="2.5"/>
      <circle cx="52" cy="48" r="6" fill="#f472b6"/><circle cx="70" cy="42" r="6" fill="#fbbf24"/><circle cx="88" cy="48" r="6" fill="#34d399"/>
      <text x="70" y="98" text-anchor="middle" fill="#e0e7ff" font-family="system-ui,sans-serif" font-size="11" font-weight="700">DESIGN</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="5s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(165 0)">
      <rect width="140" height="110" rx="16" fill="#831843" stroke="#f472b6" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4.3s" begin="0.3s" repeatCount="indefinite"/>
      </rect>
      <!-- motion curves -->
      <path d="M30 65 Q50 35 70 50 T110 45" fill="none" stroke="#fbcfe8" stroke-width="3" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" values="0;-80" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <path d="M30 65 Q50 35 70 50 T110 45" fill="none" stroke="#fbcfe8" stroke-width="3" stroke-dasharray="20 60" opacity="0.6"/>
      <text x="70" y="98" text-anchor="middle" fill="#fce7f3" font-family="system-ui,sans-serif" font-size="11" font-weight="700">MOTION</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="5.2s" begin="0.4s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(330 0)">
      <rect width="140" height="110" rx="16" fill="#14532d" stroke="#4ade80" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4.1s" begin="0.6s" repeatCount="indefinite"/>
      </rect>
      <!-- gamepad -->
      <rect x="38" y="38" width="64" height="40" rx="10" fill="none" stroke="#bbf7d0" stroke-width="2.5"/>
      <circle cx="57" cy="58" r="5" fill="#86efac"/><circle cx="83" cy="58" r="5" fill="#86efac"/>
      <text x="70" y="98" text-anchor="middle" fill="#dcfce7" font-family="system-ui,sans-serif" font-size="11" font-weight="700">GAMES</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="4.8s" begin="0.8s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(495 0)">
      <rect width="140" height="110" rx="16" fill="#713f12" stroke="#fbbf24" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4.5s" begin="0.2s" repeatCount="indefinite"/>
      </rect>
      <!-- wave -->
      <path d="M28 58 Q45 48 62 58 T98 58 T134 58" fill="none" stroke="#fde68a" stroke-width="2.5" filter="url(#glow)">
        <animate attributeName="d" values="M28 58 Q45 48 62 58 T98 58 T134 58;M28 58 Q45 68 62 58 T98 58 T134 58;M28 58 Q45 48 62 58 T98 58 T134 58" dur="2s" repeatCount="indefinite"/>
      </path>
      <text x="70" y="98" text-anchor="middle" fill="#fef3c7" font-family="system-ui,sans-serif" font-size="11" font-weight="700">AUDIO</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="5.4s" begin="0.15s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(660 0)">
      <rect width="140" height="110" rx="16" fill="#134e4a" stroke="#2dd4bf" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4.2s" begin="0.9s" repeatCount="indefinite"/>
      </rect>
      <!-- bars -->
      <rect x="38" y="52" width="14" height="28" rx="2" fill="#5eead4"/><rect x="58" y="44" width="14" height="36" rx="2" fill="#99f6e4"/><rect x="78" y="48" width="14" height="32" rx="2" fill="#5eead4"/>
      <text x="70" y="98" text-anchor="middle" fill="#ccfbf1" font-family="system-ui,sans-serif" font-size="10" font-weight="700">DATAVIZ</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="5.1s" begin="0.55s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(825 0)">
      <rect width="140" height="110" rx="16" fill="#4c1d95" stroke="#c084fc" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4.4s" begin="0.45s" repeatCount="indefinite"/>
      </rect>
      <!-- shader triangle mesh hint -->
      <path d="M40 72 L70 38 L100 72 Z" fill="none" stroke="#e9d5ff" stroke-width="2"/>
      <circle cx="70" cy="58" r="4" fill="#f0abfc"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/></circle>
      <text x="70" y="98" text-anchor="middle" fill="#f5e1ff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">SHADERS</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="4.7s" begin="0.25s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
