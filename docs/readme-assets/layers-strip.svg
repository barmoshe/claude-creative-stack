<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 150" role="img" aria-labelledby="ltitle">
  <title id="ltitle">Three layers: Skill, Artifact, MCP</title>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"><animate attributeName="stop-color" values="#818cf8;#a5b4fc;#818cf8" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#6366f1"><animate attributeName="stop-color" values="#6366f1;#818cf8;#6366f1" dur="8s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"><animate attributeName="stop-color" values="#f472b6;#fb7185;#f472b6" dur="9s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#ec4899"><animate attributeName="stop-color" values="#ec4899;#f472b6;#ec4899" dur="9s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"><animate attributeName="stop-color" values="#34d399;#6ee7b7;#34d399" dur="7s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#10b981"><animate attributeName="stop-color" values="#10b981;#34d399;#10b981" dur="7s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <filter id="s"><feGaussianBlur stdDeviation="1.2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="880" height="150" rx="18" fill="#0f172a"/>
  <rect x="2" y="2" width="876" height="146" rx="16" fill="none" stroke="#334155" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="6s" repeatCount="indefinite"/>
  </rect>
  <path d="M220 75 H340 M540 75 H660" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M220 75 H340" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 12" opacity="0.85">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="1.15s" repeatCount="indefinite"/>
  </path>
  <path d="M540 75 H660" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 12" opacity="0.85">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="1.15s" begin="0.38s" repeatCount="indefinite"/>
  </path>
  <circle r="6" fill="#fbbf24" filter="url(#s)"><animateMotion dur="1.35s" repeatCount="indefinite" path="M220 75 H340"/></circle>
  <circle r="6" fill="#fde047" opacity="0.85" filter="url(#s)"><animateMotion dur="1.35s" repeatCount="indefinite" begin="0.45s" path="M540 75 H660"/></circle>
  <g transform="translate(70 35)">
    <rect x="-2" y="-2" width="154" height="84" rx="16" fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.55;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="150" height="80" rx="14" fill="url(#g1)"/>
    <text x="75" y="42" text-anchor="middle" fill="#eef2ff" font-family="system-ui,sans-serif" font-size="14" font-weight="800">SKILL</text>
    <text x="75" y="62" text-anchor="middle" fill="#c7d2fe" font-family="system-ui,sans-serif" font-size="11">determinism</text>
  </g>
  <g transform="translate(350 35)">
    <rect x="-2" y="-2" width="194" height="84" rx="16" fill="none" stroke="#fbcfe8" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.55;0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="190" height="80" rx="14" fill="url(#g2)"/>
    <text x="95" y="42" text-anchor="middle" fill="#fdf2f8" font-family="system-ui,sans-serif" font-size="14" font-weight="800">ARTIFACT</text>
    <text x="95" y="62" text-anchor="middle" fill="#fce7f3" font-family="system-ui,sans-serif" font-size="11">live preview</text>
  </g>
  <g transform="translate(670 35)">
    <rect x="-2" y="-2" width="154" height="84" rx="16" fill="none" stroke="#a7f3d0" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.55;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="150" height="80" rx="14" fill="url(#g3)"/>
    <text x="75" y="42" text-anchor="middle" fill="#ecfdf5" font-family="system-ui,sans-serif" font-size="14" font-weight="800">MCP</text>
    <text x="75" y="62" text-anchor="middle" fill="#d1fae5" font-family="system-ui,sans-serif" font-size="11">side-effects</text>
  </g>
</svg>
