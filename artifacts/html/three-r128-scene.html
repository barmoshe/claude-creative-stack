<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Three.js r128 scene</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a12; color: #e6e7ea; font: 14px system-ui; }
    #hud { position: fixed; top: 12px; left: 12px; padding: 8px 10px; background: rgba(0,0,0,.4); border-radius: 6px; }
  </style>
</head>
<body>
  <div id="hud">Drag to orbit • Scroll to zoom • REV: <span id="rev"></span></div>
  <canvas id="c"></canvas>

  <!-- r128 is the artifact-sandbox pinned version. Keep this URL if you paste into a Claude artifact. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // Minimal orbit controls inline — r128 does not ship OrbitControls on the plain three.min
    // build, and `three/examples/jsm/controls/OrbitControls` is not reachable inside artifacts.
    function makeOrbit(camera, dom){
      let target = new THREE.Vector3(0,0,0);
      let theta = 0.6, phi = 0.4, dist = 6;
      let dragging = false, lx = 0, ly = 0;
      dom.addEventListener("pointerdown", e => { dragging = true; lx = e.clientX; ly = e.clientY; dom.setPointerCapture(e.pointerId); });
      dom.addEventListener("pointerup",   e => { dragging = false; dom.releasePointerCapture(e.pointerId); });
      dom.addEventListener("pointermove", e => {
        if (!dragging) return;
        theta -= (e.clientX - lx) * 0.005;
        phi   = Math.max(0.05, Math.min(Math.PI - 0.05, phi - (e.clientY - ly) * 0.005));
        lx = e.clientX; ly = e.clientY;
      });
      dom.addEventListener("wheel", e => { dist = Math.max(1.5, Math.min(30, dist + e.deltaY * 0.01)); e.preventDefault(); }, { passive:false });
      return function update(){
        camera.position.set(
          target.x + dist * Math.sin(phi) * Math.cos(theta),
          target.y + dist * Math.cos(phi),
          target.z + dist * Math.sin(phi) * Math.sin(theta)
        );
        camera.lookAt(target);
      };
    }

    const canvas = document.getElementById("c");
    document.getElementById("rev").textContent = THREE.REVISION;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
    const orbit = makeOrbit(camera, canvas);

    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0); dir.position.set(3,4,2); scene.add(dir);

    // Instanced cubes arranged on a sphere
    const geo = new THREE.BoxBufferGeometry(0.2, 0.2, 0.2);
    const mat = new THREE.MeshStandardMaterial({ roughness: 0.4, metalness: 0.2 });
    const N = 400;
    const mesh = new THREE.InstancedMesh(geo, mat, N);
    const color = new THREE.Color();
    const m = new THREE.Matrix4();
    for (let i = 0; i < N; i++){
      const phi = Math.acos(1 - 2*(i + 0.5)/N);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;
      const x = 2 * Math.cos(theta) * Math.sin(phi);
      const y = 2 * Math.sin(theta) * Math.sin(phi);
      const z = 2 * Math.cos(phi);
      m.makeTranslation(x, y, z);
      mesh.setMatrixAt(i, m);
      color.setHSL((i / N + 0.55) % 1, 0.6, 0.6);
      mesh.setColorAt(i, color);
    }
    scene.add(mesh);

    // Respect reduced motion
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function resize(){
      const { clientWidth:w, clientHeight:h } = document.documentElement;
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
      renderer.setSize(w, h, false);
      camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", resize); resize();

    let t0 = performance.now();
    (function loop(){
      requestAnimationFrame(loop);
      orbit();
      if (!reduce) mesh.rotation.y = (performance.now() - t0) * 0.0003;
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
