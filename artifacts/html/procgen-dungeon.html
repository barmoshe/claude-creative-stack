<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Procgen dungeon — BSP</title>
  <style>
    :root { --bg: oklch(0.14 0.02 260); --panel: oklch(0.20 0.02 260); --text: oklch(0.94 0.01 260); --accent: oklch(0.72 0.14 40); }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font: 13px system-ui; }
    .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    aside { padding: 16px; background: var(--panel); border-right: 1px solid oklch(0.28 0.02 260); }
    main { display: grid; place-items: center; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    label { display: block; margin: 12px 0 6px; opacity: 0.8; }
    input, button { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid oklch(0.30 0.02 260); background: oklch(0.18 0.02 260); color: var(--text); font: inherit; }
    button { cursor: pointer; background: var(--accent); color: oklch(0.18 0.02 260); border: 0; font-weight: 600; margin-top: 12px; }
    canvas { background: oklch(0.10 0.01 260); border-radius: 8px; image-rendering: pixelated; }
    .meta { margin-top: 16px; opacity: 0.7; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>BSP dungeon</h1>
      <label>Seed</label>
      <input id="seed" type="text" value="37">
      <label>Width</label>
      <input id="w" type="number" value="64" min="20" max="160">
      <label>Height</label>
      <input id="h" type="number" value="40" min="20" max="120">
      <label>Depth</label>
      <input id="d" type="number" value="4" min="1" max="7">
      <button id="go">Regenerate</button>
      <div class="meta">Black = wall, light = floor, accent = corridors.<br>Share the seed to reproduce.</div>
    </aside>
    <main><canvas id="c"></canvas></main>
  </div>

  <script>
    function mulberry32(a){
      return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296; };
    }
    function seedFrom(s){ let h = 2166136261; for (let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }

    const WALL = 1, FLOOR = 0, CORR = 2;

    function generate({ W, H, depth, rng }){
      const grid = Array.from({ length: H }, () => new Uint8Array(W).fill(WALL));
      const root = { x: 1, y: 1, w: W - 2, h: H - 2 };

      function split(node, d){
        if (d === 0 || node.w < 10 || node.h < 10) return [node];
        const horizontal = node.w > node.h ? false : node.w < node.h ? true : rng() < 0.5;
        if (horizontal){
          const cut = Math.floor(node.h * (0.35 + rng()*0.3));
          return [ ...split({ x:node.x, y:node.y, w:node.w, h:cut }, d-1),
                   ...split({ x:node.x, y:node.y+cut, w:node.w, h:node.h-cut }, d-1) ];
        } else {
          const cut = Math.floor(node.w * (0.35 + rng()*0.3));
          return [ ...split({ x:node.x, y:node.y, w:cut, h:node.h }, d-1),
                   ...split({ x:node.x+cut, y:node.y, w:node.w-cut, h:node.h }, d-1) ];
        }
      }

      const leaves = split(root, depth);
      const rooms = leaves.map(L => {
        const pad = 1;
        const rw = Math.max(4, Math.floor(L.w * (0.5 + rng()*0.3))) - pad*2;
        const rh = Math.max(4, Math.floor(L.h * (0.5 + rng()*0.3))) - pad*2;
        const rx = L.x + pad + Math.floor(rng() * Math.max(1, L.w - rw - pad*2));
        const ry = L.y + pad + Math.floor(rng() * Math.max(1, L.h - rh - pad*2));
        for (let y = ry; y < ry+rh; y++) for (let x = rx; x < rx+rw; x++) grid[y][x] = FLOOR;
        return { x:rx, y:ry, w:rw, h:rh, cx: (rx+rw/2)|0, cy: (ry+rh/2)|0 };
      });

      // Connect rooms with L-shaped corridors
      for (let i = 1; i < rooms.length; i++){
        const a = rooms[i-1], b = rooms[i];
        const midX = rng() < 0.5 ? a.cx : b.cx;
        for (let x = Math.min(a.cx, b.cx); x <= Math.max(a.cx, b.cx); x++) if (grid[a.cy][x] !== FLOOR) grid[a.cy][x] = CORR;
        for (let y = Math.min(a.cy, b.cy); y <= Math.max(a.cy, b.cy); y++) if (grid[y][midX] !== FLOOR) grid[y][midX] = CORR;
      }
      return { grid, rooms };
    }

    const c = document.getElementById("c");
    function render(state){
      const { grid } = state;
      const H = grid.length, W = grid[0].length;
      const tile = 10;
      c.width = W * tile; c.height = H * tile;
      const ctx = c.getContext("2d");
      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++){
        const v = grid[y][x];
        ctx.fillStyle = v === WALL ? "#0d0e16" : v === FLOOR ? "#c8cbdc" : "#d69962";
        ctx.fillRect(x*tile, y*tile, tile, tile);
      }
    }

    function run(){
      const seedStr = document.getElementById("seed").value || "0";
      const rng = mulberry32(seedFrom(seedStr));
      const W = Math.max(20, Math.min(160, +document.getElementById("w").value|0));
      const H = Math.max(20, Math.min(120, +document.getElementById("h").value|0));
      const depth = Math.max(1, Math.min(7, +document.getElementById("d").value|0));
      const state = generate({ W, H, depth, rng });
      render(state);
    }
    document.getElementById("go").addEventListener("click", run);
    run();
  </script>
</body>
</html>
