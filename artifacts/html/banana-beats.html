<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banana Beats · Monkey Sequencer</title>
  <style>
    :root {
      --bg: oklch(0.95 0.03 85);
      --bg2: oklch(0.92 0.04 80);
      --chassis: oklch(0.88 0.07 75);
      --chassis2: oklch(0.78 0.08 70);
      --display: oklch(0.22 0.06 145);
      --display2: oklch(0.15 0.05 140);
      --text: oklch(0.20 0.02 85);
      --text-muted: oklch(0.45 0.03 80);
      --text-light: oklch(0.92 0.02 95);
      --metal: oklch(0.50 0.04 60);
      --accent: oklch(0.85 0.19 90);
      --accent-hi: oklch(0.92 0.20 88);
      --accent-glow: oklch(0.80 0.20 90 / .6);
      --hot: oklch(0.68 0.22 25);
      --cool: oklch(0.62 0.16 230);
      --border-warm: oklch(0.72 0.06 70);
      --tk0: oklch(0.68 0.18 30);
      --tk1: oklch(0.76 0.16 65);
      --tk2: oklch(0.62 0.16 230);
      --tk3: oklch(0.68 0.16 185);
      --tk4: oklch(0.58 0.18 305);
      --tk5: oklch(0.85 0.19 90);
      --tk6: oklch(0.62 0.18 145);
      --tk7: oklch(0.78 0.16 55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; min-height: 100%; background: var(--bg);
      font: 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: var(--text); }
    body { display: grid; place-items: center; padding: 28px 16px;
      background: radial-gradient(ellipse at 50% 0%, oklch(0.96 0.05 85) 0%, var(--bg) 60%);
      min-height: 100vh; }

    .machine {
      width: min(860px, 100%);
      background: linear-gradient(180deg, var(--chassis) 0%, var(--chassis2) 100%);
      border-radius: 28px; padding: 24px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.6),
        inset 0 -2px 0 rgba(0,0,0,.12),
        0 20px 60px -15px rgba(100,70,30,.25),
        0 4px 12px rgba(100,70,30,.15);
      position: relative;
    }

    .header { display: flex; align-items: center; justify-content: space-between;
      padding: 0 4px 16px; border-bottom: 1px solid var(--border-warm);
      flex-wrap: wrap; gap: 8px; }
    .brand { font-weight: 700; letter-spacing: .28em; text-transform: uppercase;
      font-size: 12px; color: var(--metal); white-space: nowrap; }
    .brand em { color: oklch(0.55 0.16 90); font-style: normal; }
    .hdr-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .led { width: 8px; height: 8px; border-radius: 50%; background: oklch(0.75 0.04 75);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.2); flex-shrink: 0; }
    .led.on { background: oklch(0.65 0.20 145); box-shadow: 0 0 10px oklch(0.60 0.20 145 / .6); }
    .bpm-wrap { display: flex; align-items: center; gap: 4px; }
    .bpm-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--metal); }
    .bpm-input { width: 52px; background: oklch(0.82 0.03 75); border: 1px solid var(--border-warm);
      color: var(--text); padding: 4px 6px; border-radius: 4px; font: inherit; font-size: 12px;
      text-align: center; font-variant-numeric: tabular-nums;
      box-shadow: inset 0 1px 3px rgba(80,50,20,.15); }
    .seed-label { font-size: 9px; color: var(--text-muted); letter-spacing: .08em; }

    .ctrl-btn {
      font: 600 11px ui-monospace, monospace; letter-spacing: .12em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px; cursor: pointer; border: none;
      background: linear-gradient(180deg, oklch(0.75 0.06 70), oklch(0.65 0.06 65));
      color: oklch(0.35 0.04 70);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 2px 4px rgba(80,50,20,.25);
      transition: transform 0.1s, box-shadow 0.1s, color 0.1s;
    }
    .ctrl-btn:hover { color: oklch(0.40 0.14 145); }
    .ctrl-btn:active { transform: translateY(1px); box-shadow: inset 0 1px 3px rgba(80,50,20,.3); }
    .ctrl-btn.live { color: oklch(0.55 0.18 25); background: linear-gradient(180deg, oklch(0.78 0.10 30), oklch(0.68 0.10 25));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 0 12px oklch(0.60 0.18 25 / .3); }

    .display {
      margin: 16px 0 12px;
      background: linear-gradient(180deg, var(--display) 0%, var(--display2) 100%);
      border-radius: 14px; padding: 0; overflow: hidden;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,.7),
        inset 0 -1px 0 rgba(255,255,255,.03),
        0 0 0 2px oklch(0.65 0.06 70);
      position: relative;
    }
    .display::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
      mix-blend-mode: overlay; opacity: 0.5; z-index: 2;
    }
    .display canvas { display: block; width: 100%; height: 280px; }

    .pad-grid { padding: 12px 0 8px; }
    .pad-row { display: flex; align-items: center; gap: 0; margin-bottom: 3px; }
    .pad-label { width: 56px; font-size: 10px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; text-align: right; padding-right: 8px; flex-shrink: 0; }
    .pad-cells { display: flex; gap: 3px; flex: 1; }
    .pad-cells .spacer { width: 4px; flex-shrink: 0; }
    .pad {
      width: 100%; aspect-ratio: 1; border: none; border-radius: 5px; cursor: pointer;
      background: oklch(0.84 0.04 75);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        0 3px 0 oklch(0.65 0.05 70),
        0 5px 8px rgba(80,50,20,.2);
      transition: transform 0.06s ease, box-shadow 0.06s ease;
      flex: 1; min-width: 0; padding: 0;
    }
    .pad:active { transform: translateY(2px);
      box-shadow: inset 0 1px 3px rgba(80,50,20,.3); }
    .pad.on {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.4),
        0 3px 0 var(--tc),
        0 0 14px var(--tc);
      background: var(--tc);
    }
    .pad.current { transform: translateY(2px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 1px 2px rgba(80,50,20,.2); }
    .pad.on.current {
      box-shadow: inset 0 0 0 2px oklch(0.95 0.02 85), 0 0 16px var(--tc);
      background: var(--tc); filter: brightness(1.2);
    }
    .pad-reroll { width: 28px; height: 28px; flex-shrink: 0; margin-left: 4px; border: none;
      background: none; cursor: pointer; font-size: 14px; border-radius: 4px;
      color: var(--text-muted); transition: color .15s; }
    .pad-reroll:hover { color: var(--accent); }

    .tabs { display: flex; gap: 2px; padding: 8px 0 0; }
    .tab { font: 600 10px ui-monospace, monospace; letter-spacing: .14em; text-transform: uppercase;
      padding: 8px 16px; border: none; border-radius: 6px 6px 0 0; cursor: pointer;
      background: oklch(0.80 0.04 75); color: var(--text-muted);
      box-shadow: inset 0 -2px 0 rgba(80,50,20,.1);
      transition: color .15s, background .15s; }
    .tab:hover { color: var(--text); }
    .tab.active { background: oklch(0.72 0.05 70); color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3); }

    .panel {
      background: linear-gradient(180deg, oklch(0.76 0.05 72), oklch(0.72 0.05 70));
      border-radius: 0 8px 8px 8px; padding: 14px 16px;
      box-shadow: inset 0 2px 6px rgba(80,50,20,.15);
      max-height: 260px; overflow-y: auto; margin-bottom: 12px;
    }
    .panel::-webkit-scrollbar { width: 6px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: oklch(0.60 0.04 70); border-radius: 3px; }

    .mixer-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .mixer-label { width: 52px; font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; }
    .mixer-slider { flex: 1; max-width: 140px; height: 4px; accent-color: var(--tc);
      cursor: pointer; }
    .mixer-val { font-size: 10px; width: 32px; text-align: right; font-variant-numeric: tabular-nums;
      color: var(--text-muted); }
    .mixer-btn { font: 700 10px ui-monospace, monospace; width: 24px; height: 24px;
      border-radius: 4px; border: 1px solid oklch(0.60 0.04 70); cursor: pointer;
      background: oklch(0.78 0.04 75); color: var(--text-muted);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
      transition: all .12s; display: grid; place-items: center; }
    .mixer-btn:hover { border-color: var(--text-muted); }
    .mixer-btn.active { background: oklch(0.55 0.16 90); color: oklch(0.15 0.02 85);
      border-color: oklch(0.55 0.16 90); }
    .mixer-btn.solo-active { background: var(--hot); color: #fff; border-color: var(--hot); }

    .fx-slot { padding: 10px 0; border-bottom: 1px solid oklch(0.68 0.04 70); }
    .fx-slot:last-child { border-bottom: none; }
    .fx-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .fx-params { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px 16px; }
    .fx-param { display: flex; flex-direction: column; gap: 2px; }
    .fx-param label { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }
    .fx-param input[type="range"] { width: 100%; height: 4px; accent-color: oklch(0.55 0.16 90); cursor: pointer; }
    .fx-param .val { font-size: 9px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    .preset-item { display: flex; align-items: center; gap: 8px; padding: 6px 0;
      border-bottom: 1px solid oklch(0.68 0.04 70); }
    .preset-item:last-child { border-bottom: none; }
    .preset-name { font-weight: 700; font-size: 12px; flex: 1; }
    .preset-actions { display: flex; gap: 4px; }
    .preset-btn { font: 600 10px ui-monospace, monospace; padding: 3px 8px; border-radius: 4px;
      border: 1px solid oklch(0.60 0.04 70); background: oklch(0.78 0.04 75);
      color: var(--text-muted); cursor: pointer; transition: all .12s; }
    .preset-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .preset-btn.del { color: var(--hot); }
    .preset-save-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .preset-input { flex: 1; background: oklch(0.82 0.03 75); border: 1px solid oklch(0.65 0.04 70);
      color: var(--text); padding: 6px 10px; border-radius: 6px; font: inherit; font-size: 12px;
      box-shadow: inset 0 1px 3px rgba(80,50,20,.1); }

    .kb-hint { padding: 8px 4px 0; text-align: center;
      font-size: 10px; color: var(--text-muted); letter-spacing: .08em; opacity: .6; }

    /* ─── v4: Transport bar ─── */
    .transport-bar { display: flex; align-items: center; gap: 12px;
      padding: 10px 4px; margin: 4px 0 10px;
      border-top: 1px solid var(--border-warm); border-bottom: 1px solid var(--border-warm); }
    .transport-bar .play-big {
      font: 700 13px ui-monospace, monospace; letter-spacing: .16em; text-transform: uppercase;
      padding: 12px 22px; min-width: 100px; border-radius: 8px; cursor: pointer; border: none;
      background: linear-gradient(180deg, oklch(0.78 0.09 70), oklch(0.65 0.07 65));
      color: oklch(0.28 0.04 70);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 3px 5px rgba(80,50,20,.25);
      transition: transform 0.08s, box-shadow 0.12s; }
    .transport-bar .play-big:active { transform: translateY(1px); box-shadow: inset 0 1px 3px rgba(80,50,20,.3); }
    .transport-bar .play-big.live {
      background: linear-gradient(180deg, oklch(0.78 0.16 30), oklch(0.66 0.18 25));
      color: oklch(0.98 0.02 80);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 0 20px oklch(0.62 0.18 25 / .55); }
    .transport-bar .bpm-block { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .transport-bar .bpm-block > label { font: 700 10px ui-monospace, monospace; letter-spacing: .14em;
      text-transform: uppercase; color: var(--metal); white-space: nowrap; }
    .transport-bar .bpm-slider { flex: 1; max-width: 240px; height: 4px;
      accent-color: oklch(0.62 0.18 145); cursor: pointer; }
    .transport-bar .bpm-readout { font: 700 14px ui-monospace, monospace; min-width: 36px;
      text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }
    .tap-btn { font: 600 10px ui-monospace, monospace; padding: 7px 12px;
      letter-spacing: .14em; text-transform: uppercase;
      border: 1px solid var(--border-warm); background: oklch(0.82 0.04 75);
      color: var(--text-muted); border-radius: 6px; cursor: pointer;
      transition: all 0.12s; }
    .tap-btn:hover { color: var(--text); border-color: oklch(0.55 0.16 90); }
    .tap-btn.armed { background: oklch(0.85 0.19 90); color: oklch(0.20 0.04 80);
      border-color: oklch(0.65 0.18 90); box-shadow: 0 0 8px oklch(0.85 0.19 90 / .6); }
    .transport-bar .phase-chip { font: 700 10px ui-monospace, monospace; letter-spacing: .14em;
      text-transform: uppercase; padding: 5px 10px; border-radius: 4px;
      background: oklch(0.32 0.06 145); color: oklch(0.92 0.10 95);
      border: 1px solid oklch(0.45 0.10 145); }

    /* ─── v4: Playhead bar above pads ─── */
    .playhead-bar { display: flex; gap: 3px; padding: 4px 36px 6px 64px; height: 8px; align-items: center; }
    .playhead-bar .phead-cell { flex: 1; min-width: 0; border-radius: 2px; height: 4px;
      background: oklch(0.78 0.04 75);
      transition: background .04s ease, transform .04s ease, box-shadow .04s ease; }
    .playhead-bar .phead-cell.downbeat { background: oklch(0.65 0.05 65); height: 5px; }
    .playhead-bar .phead-cell.current { background: oklch(0.85 0.19 90); transform: scaleY(1.7);
      box-shadow: 0 0 6px oklch(0.85 0.19 90 / .7); }
    .playhead-bar .phead-cell.downbeat.current { background: oklch(0.95 0.20 90);
      transform: scaleY(2.0); box-shadow: 0 0 9px oklch(0.95 0.20 90 / .8); }

    /* ─── v4: Row backlight (subtle per-track gradient on pad-row) ─── */
    .pad-row { background: linear-gradient(90deg,
      color-mix(in oklch, var(--rowtc, transparent) 18%, transparent) 0%,
      color-mix(in oklch, var(--rowtc, transparent) 4%, transparent) 60%,
      transparent 100%);
      border-radius: 6px; padding-left: 2px; }

    /* ─── v4: SeqControls — bank switcher + swing + humanize ─── */
    .seq-controls { display: flex; align-items: center; gap: 14px; padding: 8px 4px; flex-wrap: wrap; }
    .bank-switcher { display: flex; gap: 4px; align-items: center; }
    .bank-switcher > label { font: 700 10px ui-monospace, monospace; letter-spacing: .14em;
      text-transform: uppercase; color: var(--metal); margin-right: 4px; }
    .bank-btn { font: 700 11px ui-monospace, monospace; width: 30px; height: 26px;
      border-radius: 5px; cursor: pointer; border: 1px solid var(--border-warm);
      background: oklch(0.82 0.04 75); color: var(--text-muted);
      transition: all 0.12s; display: grid; place-items: center; }
    .bank-btn:hover { color: var(--text); border-color: oklch(0.55 0.16 90); }
    .bank-btn.active { background: oklch(0.85 0.19 90); color: oklch(0.18 0.04 80);
      border-color: oklch(0.65 0.18 90);
      box-shadow: 0 0 6px oklch(0.85 0.19 90 / .5), inset 0 1px 0 rgba(255,255,255,.4); }
    .swing-block { display: flex; align-items: center; gap: 6px; }
    .swing-block > label { font: 700 10px ui-monospace, monospace; letter-spacing: .12em;
      text-transform: uppercase; color: var(--metal); }
    .swing-slider { width: 100px; height: 4px; accent-color: oklch(0.62 0.16 230); cursor: pointer; }
    .swing-val { font: 700 10px ui-monospace, monospace; min-width: 28px; text-align: right;
      color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .humanize-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer;
      font: 700 10px ui-monospace, monospace; letter-spacing: .12em; text-transform: uppercase;
      color: var(--metal); }
    .humanize-toggle input { accent-color: oklch(0.65 0.20 145); cursor: pointer; }
    .humanize-toggle.on { color: oklch(0.45 0.16 145); }

    .quick-actions { display: flex; gap: 6px; margin-left: auto; }
    .qa-btn { font: 700 10px ui-monospace, monospace; padding: 6px 10px;
      letter-spacing: .14em; text-transform: uppercase;
      border: 1px solid var(--border-warm); background: oklch(0.82 0.04 75);
      color: var(--text-muted); border-radius: 5px; cursor: pointer;
      transition: all 0.12s; }
    .qa-btn:hover { color: var(--text); border-color: oklch(0.55 0.16 90); }
    .qa-btn.danger:hover { color: var(--hot); border-color: var(--hot); }

    /* ─── v4: Mixer extras — variant pill, octave stepper, key select ─── */
    .variant-pill { font: 700 9px ui-monospace, monospace; padding: 4px 8px; min-width: 64px;
      border-radius: 4px; border: 1px solid var(--border-warm); background: oklch(0.78 0.04 75);
      color: var(--text); cursor: pointer; letter-spacing: .06em; text-transform: uppercase;
      transition: all .12s; }
    .variant-pill:hover { border-color: oklch(0.55 0.16 90); }
    .melodic-controls { display: flex; gap: 4px; align-items: center; margin-left: 4px; }
    .octave-stepper, .key-select { font: 600 10px ui-monospace, monospace; padding: 3px 6px;
      border-radius: 4px; border: 1px solid var(--border-warm); background: oklch(0.82 0.03 75);
      color: var(--text); cursor: pointer; }
    .octave-stepper { width: 36px; text-align: center; }
    .key-select { width: 44px; }

    /* ─── v4: Toast (URL-share confirmation) ─── */
    .bb-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 16px; border-radius: 8px;
      background: oklch(0.20 0.04 80); color: oklch(0.95 0.04 90);
      font: 600 11px ui-monospace, monospace; letter-spacing: .12em; text-transform: uppercase;
      box-shadow: 0 4px 16px rgba(0,0,0,.3), 0 0 0 1px oklch(0.45 0.16 90);
      z-index: 9999; pointer-events: none;
      animation: toastIn .25s ease-out, toastOut .25s ease-in 1.7s forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes toastOut { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, 8px); } }

    /* ─── v4: Pad cell — velocity shade + probability dots ─── */
    .pad { position: relative; overflow: hidden; user-select: none;
      touch-action: none; }
    .pad-vel-shade { position: absolute; left: 0; right: 0; top: 0;
      pointer-events: none; border-radius: 5px 5px 0 0;
      background: linear-gradient(180deg, rgba(20,12,4,0.55) 0%, rgba(20,12,4,0.0) 100%); }
    .pad-prob-dots { position: absolute; top: 2px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 2px; pointer-events: none; z-index: 1; }
    .pad-prob-dots span { width: 2.5px; height: 2.5px; border-radius: 50%;
      background: rgba(255,255,255,0.85); box-shadow: 0 0 1px rgba(0,0,0,0.6); }
    .pad.on .pad-prob-dots span { background: rgba(255,255,255,0.95); }
    .pad.dragging { cursor: ns-resize; }

    @keyframes breathe { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }

    @media (max-width: 600px) {
      .machine { padding: 14px; border-radius: 18px; }
      .header { gap: 6px; }
      .pad-label { width: 40px; font-size: 9px; }
      .panel { max-height: 200px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0s !important; transition-duration: 0s !important; }
      .pad { transition: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@15.0.4/build/Tone.js"></script>
  <script>
  // ─── Banana Beats v2 ─────────────────────────────────────────────────────────
  (function(){
  "use strict";

  const h = React.createElement;
  const { useState, useEffect, useRef, useReducer, useCallback, useMemo } = React;
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ─── Utilities (kept from v1) ─────────────────────────────────────────────────

  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function euclidean(steps, hits) {
    if (hits <= 0) return new Array(steps).fill(false);
    if (hits >= steps) return new Array(steps).fill(true);
    const p = [];
    for (let i = 0; i < steps; i++)
      p.push(Math.floor(i * hits / steps) !== Math.floor((i - 1) * hits / steps));
    return p;
  }

  const SCALES = {
    pentatonic: [0, 2, 4, 7, 9],
    dorian: [0, 2, 3, 5, 7, 9, 10],
    minor: [0, 2, 3, 5, 7, 8, 10],
    blues: [0, 3, 5, 6, 7, 10],
  };

  function markovGenerate(steps, scale, order, seed) {
    const rng = mulberry32(seed);
    const notes = SCALES[scale] || SCALES.pentatonic;
    const result = [];
    let prev = notes[0];
    for (let i = 0; i < steps; i++) {
      const idx = notes.indexOf(prev);
      const jump = rng() < 0.3 ? Math.floor(rng() * notes.length) : Math.max(0, Math.min(notes.length - 1, idx + (rng() < 0.5 ? 1 : -1)));
      prev = notes[jump];
      result.push(rng() < 0.6 ? 48 + prev + (rng() < 0.3 ? 12 : 0) : 0);
    }
    return result;
  }

  function densityNoise(steps, density, seed) {
    const rng = mulberry32(seed);
    return Array.from({ length: steps }, () => rng() < density);
  }

  const bus = {
    _h: {},
    on(e, f) { (this._h[e] || (this._h[e] = [])).push(f); },
    off(e, f) { this._h[e] = (this._h[e] || []).filter(x => x !== f); },
    emit(e, d) { (this._h[e] || []).forEach(f => f(d)); }
  };

  function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

  // ─── Track definitions (kept from v1) ─────────────────────────────────────────

  const TRACK_DEFS = [
    { name: "Kick",   gen: "euclidean", k: 4,  density: 0, scale: "", order: 0, color: "var(--tk0)" },
    { name: "Snare",  gen: "euclidean", k: 2,  density: 0, scale: "", order: 0, color: "var(--tk1)" },
    { name: "C-Hat",  gen: "euclidean", k: 11, density: 0, scale: "", order: 0, color: "var(--tk2)" },
    { name: "O-Hat",  gen: "euclidean", k: 3,  density: 0, scale: "", order: 0, color: "var(--tk3)" },
    { name: "Bongo",  gen: "euclidean", k: 5,  density: 0, scale: "", order: 0, color: "var(--tk4)" },
    { name: "Shaker", gen: "noise",     k: 0,  density: 0.6, scale: "", order: 0, color: "var(--tk5)" },
    { name: "Bass",   gen: "markov",    k: 0,  density: 0, scale: "dorian", order: 2, color: "var(--tk6)" },
    { name: "Lead",   gen: "markov",    k: 0,  density: 0, scale: "pentatonic", order: 1, color: "var(--tk7)" },
  ];

  const TRACK_COLORS_RAW = [
    "oklch(0.68 0.18 30)", "oklch(0.76 0.16 65)", "oklch(0.62 0.16 230)", "oklch(0.68 0.16 185)",
    "oklch(0.58 0.18 305)", "oklch(0.85 0.19 90)", "oklch(0.62 0.18 145)", "oklch(0.78 0.16 55)"
  ];

  function generatePattern(def, steps, seed) {
    if (def.gen === "euclidean") return euclidean(steps, def.k);
    if (def.gen === "noise") return densityNoise(steps, def.density, seed);
    if (def.gen === "markov") return markovGenerate(steps, def.scale, def.order, seed);
    return new Array(steps).fill(false);
  }

  // ─── v4: Bank helpers ───
  function buildEmptyBank(steps, gen) {
    const isMelodic = gen === "markov";
    return {
      pattern: isMelodic ? new Array(steps).fill(0) : new Array(steps).fill(false),
      velocity: new Array(steps).fill(1.0),
      probability: new Array(steps).fill(1.0),
    };
  }
  function buildBankFromGen(def, steps, seed) {
    return {
      pattern: generatePattern(def, steps, seed),
      velocity: new Array(steps).fill(1.0),
      probability: new Array(steps).fill(1.0),
    };
  }
  // Get active bank for a track. Tolerant of old-shape (no banks) for backward compat.
  function getBank(track, bankKey) {
    bankKey = bankKey || "a";
    if (track.banks && track.banks[bankKey]) return track.banks[bankKey];
    if (track.banks && track.banks.a) return track.banks.a;
    // Old shape: wrap on the fly
    const steps = (track.pattern || []).length || 16;
    return {
      pattern: track.pattern || new Array(steps).fill(false),
      velocity: new Array(steps).fill(1.0),
      probability: new Array(steps).fill(1.0),
    };
  }
  // Migrate an old-shape track (just `pattern`) into new banks shape.
  function migrateTrack(t) {
    if (t.banks) return t;
    const steps = (t.pattern || []).length || 16;
    const def = TRACK_DEFS[t.id] || {};
    return {
      ...t,
      banks: {
        a: { pattern: t.pattern || new Array(steps).fill(false), velocity: new Array(steps).fill(1.0), probability: new Array(steps).fill(1.0) },
        b: buildEmptyBank(steps, def.gen),
        c: buildEmptyBank(steps, def.gen),
        d: buildEmptyBank(steps, def.gen),
      },
      activeBank: undefined, // global activeBank lives on state, not track
      variant: t.variant != null ? t.variant : 0,
      octave: t.octave != null ? t.octave : 0,
      rootKey: t.rootKey != null ? t.rootKey : 0,
    };
  }

  function buildTracks(defs, steps, seed) {
    return defs.map((def, i) => ({
      ...def, id: i, steps,
      banks: {
        a: buildBankFromGen(def, steps, seed + i * 1000),
        b: buildEmptyBank(steps, def.gen),
        c: buildEmptyBank(steps, def.gen),
        d: buildEmptyBank(steps, def.gen),
      },
      variant: 0,
      octave: 0,
      rootKey: 0,
      gain: 0.8, pan: 0, mute: false, solo: false,
      sendReverb: i >= 6 ? 0.3 : 0.1,
      sendDelay: i === 7 ? 0.25 : 0.05,
    }));
  }

  // ─── Initial state + Reducer (kept from v1) ──────────────────────────────────

  const STEPS = 16;

  function createInitialState() {
    const seed = Math.floor(Math.random() * 1000000);
    return {
      bpm: 96, seed, isPlaying: false, activeTab: "seq", vibe: "chill",
      tracks: buildTracks(TRACK_DEFS, STEPS, seed),
      // v4: global active bank, swing, humanize
      activeBank: "a",
      swing: 0,
      humanize: false,
      fx: [
        { type: "reverb", enabled: true, params: { decay: 4, wet: 0.3, preDelay: 0.01 } },
        { type: "delay", enabled: true, params: { delayTime: 0.25, feedback: 0.3, wet: 0.2 } },
        { type: "filter", enabled: false, params: { frequency: 2000, Q: 1, wet: 0.5 } },
        { type: "distortion", enabled: false, params: { amount: 0.3, wet: 0.4, oversample: 0 } },
      ],
      master: { gain: 0.8, limiter: true },
      character: { state: "idle", trauma: 0, barsPlayed: 0 },
      presets: [],
      currentStep: -1,
    };
  }

  function reducer(state, action) {
    switch (action.type) {
      case "PLAY": return { ...state, isPlaying: true };
      case "STOP": return { ...state, isPlaying: false, currentStep: -1, character: { ...state.character, state: "idle", barsPlayed: 0 } };
      case "SET_BPM": return { ...state, bpm: Math.max(40, Math.min(180, action.value)) };
      case "SET_STEP": return { ...state, currentStep: action.step };
      case "REROLL_ALL": {
        const seed = Math.floor(Math.random() * 1000000);
        const bk = state.activeBank || "a";
        return { ...state, seed, tracks: state.tracks.map((t, i) => {
          const newBank = buildBankFromGen(TRACK_DEFS[i], t.steps, seed + i * 1000);
          return { ...t, banks: { ...t.banks, [bk]: newBank } };
        }) };
      }
      case "REROLL_TRACK": {
        const seed = Math.floor(Math.random() * 1000000);
        const bk = state.activeBank || "a";
        const tracks = state.tracks.map((t, i) => {
          if (i !== action.id) return t;
          const newBank = buildBankFromGen(TRACK_DEFS[i], t.steps, seed);
          return { ...t, banks: { ...t.banks, [bk]: newBank } };
        });
        return { ...state, tracks };
      }
      case "TOGGLE_STEP": {
        const bk = state.activeBank || "a";
        const tracks = state.tracks.map((t, i) => {
          if (i !== action.trackId) return t;
          const bank = getBank(t, bk);
          const pattern = [...bank.pattern];
          if (typeof pattern[action.step] === "number") {
            pattern[action.step] = pattern[action.step] ? 0 : 60;
          } else {
            pattern[action.step] = !pattern[action.step];
          }
          const updatedBank = { ...bank, pattern };
          return { ...t, banks: { ...t.banks, [bk]: updatedBank } };
        });
        return { ...state, tracks };
      }
      case "SET_VELOCITY": {
        const bk = state.activeBank || "a";
        const tracks = state.tracks.map((t, i) => {
          if (i !== action.trackId) return t;
          const bank = getBank(t, bk);
          const velocity = [...bank.velocity];
          velocity[action.step] = Math.max(0.1, Math.min(1.0, action.value));
          return { ...t, banks: { ...t.banks, [bk]: { ...bank, velocity } } };
        });
        return { ...state, tracks };
      }
      case "SET_PROBABILITY": {
        const bk = state.activeBank || "a";
        const tracks = state.tracks.map((t, i) => {
          if (i !== action.trackId) return t;
          const bank = getBank(t, bk);
          const probability = [...bank.probability];
          probability[action.step] = Math.max(0, Math.min(1.0, action.value));
          return { ...t, banks: { ...t.banks, [bk]: { ...bank, probability } } };
        });
        return { ...state, tracks };
      }
      case "SET_BANK": {
        const bk = (action.bank || "a").toLowerCase();
        if (!["a","b","c","d"].includes(bk)) return state;
        return { ...state, activeBank: bk };
      }
      case "SET_VARIANT": {
        const tracks = state.tracks.map((t, i) => i === action.trackId ? { ...t, variant: ((action.value % 3) + 3) % 3 } : t);
        return { ...state, tracks };
      }
      case "SET_OCTAVE": {
        const tracks = state.tracks.map((t, i) => i === action.trackId ? { ...t, octave: Math.max(-2, Math.min(2, action.value)) } : t);
        return { ...state, tracks };
      }
      case "SET_ROOT_KEY": {
        const tracks = state.tracks.map((t, i) => i === action.trackId ? { ...t, rootKey: ((action.value % 12) + 12) % 12 } : t);
        return { ...state, tracks };
      }
      case "SET_SWING": return { ...state, swing: Math.max(0, Math.min(0.6, action.value)) };
      case "SET_HUMANIZE": return { ...state, humanize: !!action.value };
      case "QUICK_CLEAR": {
        const bk = state.activeBank || "a";
        const tracks = state.tracks.map(t => {
          const empty = buildEmptyBank(t.steps, t.gen);
          return { ...t, banks: { ...t.banks, [bk]: empty } };
        });
        return { ...state, tracks };
      }
      case "QUICK_FILL": {
        const bk = state.activeBank || "a";
        // Starter kit: kick on 1/5/9/13, snare on 5/13, closed-hat on every 16th, bongo on 3/11
        const tracks = state.tracks.map((t, i) => {
          const steps = t.steps;
          const empty = buildEmptyBank(steps, t.gen);
          const p = empty.pattern;
          if (i === 0) { p[0] = true; p[4] = true; p[8] = true; p[12] = true; }
          else if (i === 1) { p[4] = true; p[12] = true; }
          else if (i === 2) { for (let j = 0; j < steps; j++) p[j] = true; }
          else if (i === 4) { p[2] = true; p[10] = true; }
          else if (i === 5) { for (let j = 0; j < steps; j++) p[j] = (j % 2 === 1); }
          // melodic tracks left empty in fill
          return { ...t, banks: { ...t.banks, [bk]: empty } };
        });
        return { ...state, tracks };
      }
      case "QUICK_RANDOM_MUTE": {
        const numToMute = 1 + Math.floor(Math.random() * 3); // 1..3
        const ids = state.tracks.map((_, i) => i).sort(() => Math.random() - 0.5).slice(0, numToMute);
        const tracks = state.tracks.map((t, i) => ({ ...t, mute: ids.includes(i) }));
        return { ...state, tracks };
      }
      case "SET_GAIN": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, gain: action.value } : t);
        return { ...state, tracks };
      }
      case "SET_PAN": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, pan: action.value } : t);
        return { ...state, tracks };
      }
      case "MUTE": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, mute: !t.mute } : t);
        return { ...state, tracks };
      }
      case "SOLO": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, solo: !t.solo } : t);
        return { ...state, tracks };
      }
      case "SET_SEND": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, [action.send]: action.value } : t);
        return { ...state, tracks };
      }
      case "SET_FX_PARAM": {
        const fx = state.fx.map((f, i) => {
          if (i !== action.slot) return f;
          return { ...f, params: { ...f.params, [action.key]: action.value } };
        });
        return { ...state, fx };
      }
      case "TOGGLE_FX": {
        const fx = state.fx.map((f, i) => i === action.slot ? { ...f, enabled: !f.enabled } : f);
        return { ...state, fx };
      }
      case "SET_MASTER_GAIN": return { ...state, master: { ...state.master, gain: action.value } };
      case "SET_TAB": return { ...state, activeTab: action.tab };
      case "SET_VIBE": return { ...state, vibe: action.vibe };
      case "SET_CHARACTER": return { ...state, character: { ...state.character, ...action.data } };
      case "SAVE_PRESET": {
        const preset = { id: Date.now().toString(), name: action.name, bpm: state.bpm, seed: state.seed, tracks: state.tracks, fx: state.fx, master: state.master, vibe: state.vibe };
        return { ...state, presets: [...state.presets, preset] };
      }
      case "LOAD_PRESET": {
        const p = state.presets.find(x => x.id === action.id);
        if (!p) return state;
        const migratedTracks = (p.tracks || []).map((t, i) => migrateTrack({ ...t, id: i }));
        return { ...state, bpm: p.bpm, seed: p.seed, tracks: migratedTracks, fx: p.fx, master: p.master, vibe: p.vibe,
                 swing: p.swing != null ? p.swing : state.swing,
                 humanize: p.humanize != null ? p.humanize : state.humanize,
                 activeBank: p.activeBank || state.activeBank || "a" };
      }
      case "DELETE_PRESET": return { ...state, presets: state.presets.filter(p => p.id !== action.id) };
      case "LOAD_SAVED": return { ...state, ...action.data };
      default: return state;
    }
  }

  // ─── Audio Engine (kept from v1) ──────────────────────────────────────────────

  let audioReady = false;
  let synths = [];
  let trackGains = [];
  let trackPans = [];
  let trackFilters = {};
  let reverbSend, delaySend, reverbGain, delayGain, masterGain, limiter;
  let sequences = [];

  // ─── v4: Sound variants per track (3 each = 24 configs) ───
  // Each entry tweaks synth + filter params on the fly. Applied per-step before triggering.
  const VARIANT_TABLE = [
    // 0 Kick (MembraneSynth)
    [
      { name: "808",          pitchDecay: 0.05, octaves: 6, decay: 0.3,  volume: -4 },
      { name: "acoustic",     pitchDecay: 0.02, octaves: 4, decay: 0.2,  volume: -5 },
      { name: "banana-thump", pitchDecay: 0.08, octaves: 8, decay: 0.55, volume: -2 },
    ],
    // 1 Snare (NoiseSynth + bandpass)
    [
      { name: "crisp", decay: 0.15, sustain: 0,    volume: -8, filterFreq: 1000, filterQ: 1.5 },
      { name: "fat",   decay: 0.25, sustain: 0.08, volume: -6, filterFreq:  600, filterQ: 1.0 },
      { name: "clap",  decay: 0.10, sustain: 0,    volume: -7, filterFreq: 1500, filterQ: 2.5 },
    ],
    // 2 C-Hat (NoiseSynth + HP)
    [
      { name: "tight",   decay: 0.06, volume: -12, filterFreq: 7000 },
      { name: "loose",   decay: 0.12, volume: -10, filterFreq: 5000 },
      { name: "shaker",  decay: 0.04, volume: -14, filterFreq: 8000 },
    ],
    // 3 O-Hat (NoiseSynth + HP)
    [
      { name: "crashy",  decay: 0.25, sustain: 0.05, volume: -14, filterFreq: 6000 },
      { name: "sizzle",  decay: 0.4,  sustain: 0.10, volume: -12, filterFreq: 4500 },
      { name: "wash",    decay: 0.5,  sustain: 0.15, volume: -13, filterFreq: 5500 },
    ],
    // 4 Bongo (MembraneSynth)
    [
      { name: "low-tom",     pitchDecay: 0.03, octaves: 3, decay: 0.15, volume: -8 },
      { name: "wood-block",  pitchDecay: 0.01, octaves: 5, decay: 0.08, volume: -10 },
      { name: "temple-bell", pitchDecay: 0.05, octaves: 4, decay: 0.30, volume: -7 },
    ],
    // 5 Shaker (NoiseSynth + HP)
    [
      { name: "egg",          decay: 0.04, volume: -16, filterFreq: 3000 },
      { name: "maraca",       decay: 0.06, volume: -14, filterFreq: 2500 },
      { name: "leaf-rustle",  decay: 0.08, volume: -15, filterFreq: 4000 },
    ],
    // 6 Bass (MonoSynth) — oscType + filter
    [
      { name: "square-sub", oscType: "square",    filterQ: 2, filterBase: 120, volume: -6 },
      { name: "saw-grind",  oscType: "sawtooth",  filterQ: 4, filterBase: 200, volume: -7 },
      { name: "sine-pluck", oscType: "sine",      filterQ: 1, filterBase: 80,  volume: -5 },
    ],
    // 7 Lead (Synth)
    [
      { name: "triangle-bell", oscType: "triangle", attack: 0.01,  decay: 0.15, sustain: 0.2, volume: -10 },
      { name: "square-arp",    oscType: "square",   attack: 0.005, decay: 0.10, sustain: 0.1, volume: -12 },
      { name: "pluck",         oscType: "sine",     attack: 0.001, decay: 0.05, sustain: 0,   volume: -8  },
    ],
  ];

  function applyVariant(trackIdx, variantIdx) {
    const v = (VARIANT_TABLE[trackIdx] || [])[variantIdx];
    if (!v) return;
    const s = synths[trackIdx];
    if (!s) return;
    if (v.pitchDecay != null && "pitchDecay" in s) s.pitchDecay = v.pitchDecay;
    if (v.octaves != null && "octaves" in s) s.octaves = v.octaves;
    if (s.envelope) {
      if (v.attack != null) s.envelope.attack = v.attack;
      if (v.decay != null) s.envelope.decay = v.decay;
      if (v.sustain != null) s.envelope.sustain = v.sustain;
    }
    if (v.volume != null && s.volume) {
      try { s.volume.value = v.volume; } catch(e){}
    }
    if (v.oscType && s.oscillator) {
      try { s.oscillator.type = v.oscType; } catch(e){}
    }
    const f = trackFilters[trackIdx];
    if (f) {
      if (v.filterFreq != null) { try { f.frequency.value = v.filterFreq; } catch(e){} }
      if (v.filterQ != null) { try { f.Q.value = v.filterQ; } catch(e){} }
    }
    // MonoSynth has its own filter + filterEnvelope
    if (s.filter && v.filterQ != null) { try { s.filter.Q.value = v.filterQ; } catch(e){} }
    if (s.filterEnvelope && v.filterBase != null) { try { s.filterEnvelope.baseFrequency = v.filterBase; } catch(e){} }
  }

  function createAudio() {
    if (audioReady) return;
    synths = [
      new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 6, envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.2 }, volume: -4 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.15, sustain: 0, release: 0.1 }, volume: -8 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.06, sustain: 0, release: 0.03 }, volume: -12 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.25, sustain: 0.05, release: 0.15 }, volume: -14 }),
      new Tone.MembraneSynth({ pitchDecay: 0.03, octaves: 3, envelope: { attack: 0.001, decay: 0.15, sustain: 0, release: 0.1 }, volume: -8 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.04, sustain: 0, release: 0.02 }, volume: -16 }),
      new Tone.MonoSynth({ oscillator: { type: "square" }, filter: { Q: 2, frequency: 400 },
        envelope: { attack: 0.01, decay: 0.2, sustain: 0.4, release: 0.3 },
        filterEnvelope: { baseFrequency: 120, octaves: 2.5, attack: 0.01, decay: 0.1, sustain: 0.3, release: 0.3 }, volume: -6 }),
      new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.15, sustain: 0.2, release: 0.3 }, volume: -10 }),
    ];

    trackFilters = {
      1: new Tone.Filter({ frequency: 1000, type: "bandpass", Q: 1.5 }),
      2: new Tone.Filter({ frequency: 6000, type: "highpass" }),
      3: new Tone.Filter({ frequency: 6000, type: "highpass" }),
      5: new Tone.Filter({ frequency: 3000, type: "highpass" }),
    };

    trackGains = synths.map(() => new Tone.Gain(0.8));
    trackPans = synths.map(() => new Tone.Panner(0));

    reverbSend = new Tone.Reverb({ decay: 4, wet: 1, preDelay: 0.01 });
    delaySend = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.3, wet: 1 });
    reverbGain = new Tone.Gain(0.15);
    delayGain = new Tone.Gain(0.1);
    masterGain = new Tone.Gain(0.8);
    limiter = new Tone.Limiter(-3);

    synths.forEach((s, i) => {
      if (trackFilters[i]) { s.connect(trackFilters[i]); trackFilters[i].connect(trackGains[i]); }
      else { s.connect(trackGains[i]); }
      trackGains[i].connect(trackPans[i]);
      trackPans[i].connect(masterGain);
      trackPans[i].connect(reverbGain);
      trackPans[i].connect(delayGain);
    });
    reverbGain.connect(reverbSend);
    reverbSend.connect(masterGain);
    delayGain.connect(delaySend);
    delaySend.connect(masterGain);
    masterGain.connect(limiter);
    limiter.toDestination();
    audioReady = true;
  }

  function triggerTrack(trackIdx, val, time, velocity, octave, rootKey) {
    if (!val) return;
    const s = synths[trackIdx];
    const vel = velocity != null ? Math.max(0, Math.min(1, velocity)) : 1.0;
    if (trackIdx === 0) s.triggerAttackRelease("C1", "8n", time, vel);
    else if (trackIdx === 4) s.triggerAttackRelease("C3", "16n", time, vel);
    else if (trackIdx === 6 && typeof val === "number" && val > 0) {
      const finalMidi = val + (octave || 0) * 12 + (rootKey || 0);
      s.triggerAttackRelease(midiToFreq(finalMidi), "8n", time, 0.7 * vel);
    }
    else if (trackIdx === 7 && typeof val === "number" && val > 0) {
      const finalMidi = val + (octave || 0) * 12 + (rootKey || 0);
      s.triggerAttackRelease(midiToFreq(finalMidi), "16n", time, 0.5 * vel);
    }
    else if ([1, 2, 3, 5].includes(trackIdx)) s.triggerAttackRelease("16n", time, vel);
  }

  function rebuildSequences(getState) {
    disposeSequences();
    const mainSeq = new Tone.Sequence((time, stepIdx) => {
      const st = getState();
      const bk = st.activeBank || "a";
      const swing = st.swing || 0;
      const humanize = !!st.humanize;
      // Swing: delay odd 16ths by swing × 16th × 0.5 (max ~50% of a 16th note)
      const sixteenthDur = Tone.Time("16n").toSeconds();
      const swingOffset = (stepIdx % 2 === 1 && swing > 0) ? swing * sixteenthDur * 0.5 : 0;
      const hasSolo = st.tracks.some(t => t.solo);
      // Track which tracks actually fired (probability + audible) — used for visual events
      const firedTracks = [];
      st.tracks.forEach((track, i) => {
        const audible = hasSolo ? track.solo : !track.mute;
        if (!audible) return;
        const bank = getBank(track, bk);
        const val = bank.pattern[stepIdx];
        if (!val) return;
        const prob = bank.probability ? bank.probability[stepIdx] : 1.0;
        if (prob < 1.0 && Math.random() >= prob) return; // probability gate
        // Velocity (with humanize jitter)
        let vel = bank.velocity ? bank.velocity[stepIdx] : 1.0;
        let timeJitter = 0;
        if (humanize) {
          const rng = mulberry32((st.seed || 0) + stepIdx * 31 + i * 7);
          rng(); rng(); // warm
          timeJitter = (rng() - 0.5) * 0.02;       // ±10ms
          vel = Math.max(0.1, Math.min(1.0, vel * (1 + (rng() - 0.5) * 0.2))); // ±10%
        }
        // Apply variant settings + gain/pan
        applyVariant(i, track.variant || 0);
        trackGains[i].gain.value = track.gain;
        trackPans[i].pan.value = track.pan;
        const finalTime = time + swingOffset + timeJitter;
        triggerTrack(i, val, finalTime, vel, track.octave || 0, track.rootKey || 0);
        firedTracks.push({ i, val });
      });
      Tone.Draw.schedule(() => {
        bus.emit("step", { step: stepIdx });
        firedTracks.forEach(({ i, val }) => {
          bus.emit("trackHit", { track: i, step: stepIdx, val });
          if (i === 0) bus.emit("kick", { step: stepIdx });
          else if (i === 1) bus.emit("snare", { step: stepIdx });
          else if (i === 2 || i === 3) bus.emit("hat", { step: stepIdx });
          else if (i === 4) bus.emit("bongo", { step: stepIdx });
          else if (i === 6) bus.emit("bass", { step: stepIdx });
          else if (i === 7) bus.emit("lead", { step: stepIdx });
        });
        if (stepIdx % 4 === 0) bus.emit("accent", { step: stepIdx });
        if (stepIdx === 0) bus.emit("loopWrap", {});
      }, time);
    }, [...Array(STEPS).keys()], "16n");
    mainSeq.start(0);
    sequences.push(mainSeq);
  }

  function disposeSequences() {
    sequences.forEach(s => { try { s.stop(); s.dispose(); } catch(e){} });
    sequences = [];
  }

  // ─── v4: URL hash share — encode/decode current state as base64 JSON ──────────
  function encodeStateHash(state) {
    const slim = {
      bpm: state.bpm, swing: state.swing, humanize: state.humanize, activeBank: state.activeBank,
      tracks: state.tracks.map(t => ({
        banks: t.banks, gain: t.gain, pan: t.pan, mute: t.mute, solo: t.solo,
        sendReverb: t.sendReverb, sendDelay: t.sendDelay,
        variant: t.variant, octave: t.octave, rootKey: t.rootKey,
      })),
      fx: state.fx, master: state.master,
    };
    try {
      return btoa(unescape(encodeURIComponent(JSON.stringify(slim))));
    } catch (e) { return ""; }
  }
  function decodeStateHash(hash) {
    try {
      return JSON.parse(decodeURIComponent(escape(atob(hash))));
    } catch { return null; }
  }
  function readHashState() {
    const h = (location.hash || "").replace(/^#/, "");
    if (!h.startsWith("s=")) return null;
    return decodeStateHash(h.slice(2));
  }

  // ─── Persistence (kept from v1) ───────────────────────────────────────────────

  let saveTimer;
  function debounceSave(state) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        if (window.storage) {
          await window.storage.set("banana-beats-v2", JSON.stringify({
            presets: state.presets,
            lastSession: { bpm: state.bpm, vibe: state.vibe, tracks: state.tracks.map(t => ({ ...t })), fx: state.fx, master: state.master }
          }));
        }
      } catch (e) {}
    }, 500);
  }

  async function loadSaved() {
    try {
      if (window.storage) {
        const r = await window.storage.get("banana-beats-v2");
        if (r && r.value) return JSON.parse(r.value);
      }
    } catch (e) {}
    return null;
  }

  // ─── Physics Helpers ──────────────────────────────────────────────────────────

  function springStep(current, target, velocity, stiffness, damping, dt) {
    const force = (target - current) * stiffness - velocity * damping;
    const newVel = velocity + force * dt;
    return { value: current + newVel * dt, velocity: newVel };
  }

  function updateVerletPoint(p, ax, ay, damp) {
    const vx = (p.x - p.px) * damp + ax;
    const vy = (p.y - p.py) * damp + ay;
    p.px = p.x; p.py = p.y;
    p.x += vx; p.y += vy;
  }

  function constrainDist(a, b, len) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
    const diff = (dist - len) / dist * 0.5;
    a.x += dx * diff; a.y += dy * diff;
    b.x -= dx * diff; b.y -= dy * diff;
  }

  // ─── Canvas Stage ─────────────────────────────────────────────────────────────

  function createStage(canvas) {
    const ctx = canvas.getContext("2d");
    const W = 812, H = 280;
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // ─── Global stage state ───
    let trauma = 0, flashAlpha = 0, beatPhase = 0;
    let currentBPM = 96;
    let isPlayingFlag = false;
    const trackMute = new Array(8).fill(false);
    const trackSolo = new Array(8).fill(false);
    const trackEnergy = new Array(8).fill(0.25);
    const spotlightFlash = new Array(8).fill(0);

    function addTrauma(amt) { trauma = Math.min(1, trauma + amt); }
    function getShake() {
      const s = trauma * trauma;
      return { x: (Math.random() * 2 - 1) * 12 * s, y: (Math.random() * 2 - 1) * 12 * s };
    }

    // ─── Particle pool (capped at 200) ───
    const particles = [];
    function spawn(x, y, count, color, type, opts) {
      if (reducedMotion) return;
      const o = opts || {};
      for (let i = 0; i < count && particles.length < 200; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * (o.spread != null ? o.spread : 3),
          vy: -Math.random() * (o.lift != null ? o.lift : 3) - (o.lift0 || 1),
          life: o.life || 0.5, maxLife: o.life || 0.5,
          size: (o.minSize || 1.5) + Math.random() * (o.sizeRange || 1.5),
          color, type,
          ang: Math.random() * 6.28,
          angV: (Math.random() - 0.5) * (o.spin || 0.2),
          gravity: o.gravity != null ? o.gravity : 180,
        });
      }
    }

    // ─── Ambient leaves (depth-cycled) ───
    const leaves = [];
    for (let i = 0; i < 8; i++) {
      leaves.push({
        x: Math.random() * W, y: Math.random() * H * 0.7,
        speed: 0.15 + Math.random() * 0.25,
        size: 4 + Math.random() * 5,
        rot: Math.random() * 6.28,
        rotSpeed: (Math.random() - 0.5) * 0.008,
        opacity: 0.15 + Math.random() * 0.2,
      });
    }

    // ─── Decorative drawers ───
    function drawBananaBunch(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      // Vine
      ctx.strokeStyle = "oklch(0.30 0.10 140)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -8); ctx.bezierCurveTo(2, -4, -1, -1, 0, 2);
      ctx.stroke();
      // 5 bananas
      const bp = [[-4, 0, -0.4], [3, -1, 0.3], [-1, 4, -0.1], [5, 4, 0.4], [-5, 6, -0.5]];
      for (const [bx, by, ang] of bp) {
        ctx.save();
        ctx.translate(bx, by); ctx.rotate(ang);
        ctx.fillStyle = "oklch(0.85 0.19 90)";
        ctx.beginPath(); ctx.ellipse(0, 0, 1.6, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "oklch(0.45 0.12 60)";
        ctx.beginPath(); ctx.arc(0, 3.5, 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawHibiscus(x, y, s, hue) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      // 5 petals
      ctx.fillStyle = "oklch(0.72 0.22 " + hue + ")";
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        ctx.save();
        ctx.rotate(a);
        ctx.beginPath();
        ctx.ellipse(0, -4, 3, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // Center stamen
      ctx.fillStyle = "oklch(0.85 0.18 80)";
      ctx.beginPath(); ctx.arc(0, 0, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "oklch(0.55 0.20 25)";
      ctx.beginPath(); ctx.arc(0, 0, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawPalmFrond(x, y, baseAng, t) {
      ctx.save();
      ctx.translate(x, y);
      const sway = Math.sin(t * 0.6) * 0.05;
      ctx.rotate(baseAng + sway);
      // Stem
      ctx.strokeStyle = "oklch(0.30 0.10 130)";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(15, -8, 35, -18, 55, -22);
      ctx.stroke();
      // Leaflets along stem
      ctx.fillStyle = "oklch(0.30 0.13 140)";
      for (let i = 0; i < 8; i++) {
        const tparam = i / 7;
        const sx = tparam * 55, sy = -tparam * 22 - Math.sin(tparam * Math.PI) * 4;
        const side = i % 2 === 0 ? 1 : -1;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(side * 0.9 + tparam * 0.3);
        ctx.beginPath();
        ctx.ellipse(0, side * 6, 2.5, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawTikiTorch(x, y, t, bpm) {
      ctx.save();
      ctx.translate(x, y);
      // Bamboo pole
      ctx.fillStyle = "oklch(0.45 0.10 80)";
      ctx.fillRect(-2, 0, 4, 50);
      ctx.strokeStyle = "oklch(0.30 0.06 70)";
      ctx.lineWidth = 0.6;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(-2, 8 + i * 12); ctx.lineTo(2, 8 + i * 12);
        ctx.stroke();
      }
      // Cup
      ctx.fillStyle = "oklch(0.32 0.08 60)";
      ctx.beginPath();
      ctx.ellipse(0, -2, 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Flame (flicker rate scales with BPM)
      const flickerRate = 6 + bpm / 30;
      const fy = -6 - Math.abs(Math.sin(t * flickerRate)) * 2;
      const fw = 4 + Math.sin(t * flickerRate * 1.3) * 1;
      ctx.fillStyle = "oklch(0.70 0.20 35 / 0.85)";
      ctx.beginPath();
      ctx.ellipse(0, fy - 4, fw, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.85 0.20 80 / 0.9)";
      ctx.beginPath();
      ctx.ellipse(0, fy - 3, fw * 0.6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.95 0.18 95)";
      ctx.beginPath();
      ctx.ellipse(0, fy - 2, fw * 0.3, 1.8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      const glowGrad = ctx.createRadialGradient(0, fy - 4, 0, 0, fy - 4, 24);
      glowGrad.addColorStop(0, "oklch(0.85 0.20 70 / 0.30)");
      glowGrad.addColorStop(1, "transparent");
      ctx.fillStyle = glowGrad;
      ctx.fillRect(-24, fy - 28, 48, 32);
      ctx.restore();
    }

    function drawSpotlight(cx, color, intensity) {
      if (intensity <= 0.02) return;
      const topY = 6, botY = 230;
      const topW = 14, botW = 90;
      const grad = ctx.createLinearGradient(cx, topY, cx, botY);
      grad.addColorStop(0, color.replace("oklch(", "oklch(").replace(")", " / " + (intensity * 0.55).toFixed(3) + ")"));
      grad.addColorStop(1, "transparent");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cx - topW / 2, topY);
      ctx.lineTo(cx + topW / 2, topY);
      ctx.lineTo(cx + botW / 2, botY);
      ctx.lineTo(cx - botW / 2, botY);
      ctx.closePath();
      ctx.fill();
    }

    function drawBambooStage() {
      // Platform plank
      const py = 232, pH = 18;
      const plankGrad = ctx.createLinearGradient(0, py, 0, py + pH);
      plankGrad.addColorStop(0, "oklch(0.42 0.08 65)");
      plankGrad.addColorStop(1, "oklch(0.30 0.07 60)");
      ctx.fillStyle = plankGrad;
      ctx.fillRect(0, py, W, pH);
      // Plank lines
      ctx.strokeStyle = "oklch(0.22 0.05 60)";
      ctx.lineWidth = 0.6;
      for (let i = 0; i < 12; i++) {
        ctx.beginPath();
        ctx.moveTo(i * (W / 12), py);
        ctx.lineTo(i * (W / 12) + 4, py + pH);
        ctx.stroke();
      }
      // Top edge highlight
      ctx.strokeStyle = "oklch(0.55 0.10 70)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(0, py + 0.5); ctx.lineTo(W, py + 0.5);
      ctx.stroke();
      // Bamboo support posts
      ctx.fillStyle = "oklch(0.40 0.10 80)";
      for (const sx of [60, W - 60]) {
        ctx.fillRect(sx - 4, py + pH, 8, H - py - pH);
        ctx.strokeStyle = "oklch(0.25 0.06 70)";
        ctx.lineWidth = 0.8;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(sx - 4, py + pH + 6 + i * 9);
          ctx.lineTo(sx + 4, py + pH + 6 + i * 9);
          ctx.stroke();
        }
      }
    }

    // ─── Background (kept from v2) ───
    // ─── v4: 4 biome BGs (jungle / cave / temple / volcano) + cross-fade ───
    function drawBiomeJungle(t) {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, "oklch(0.30 0.08 230)");
      skyGrad.addColorStop(0.4, "oklch(0.22 0.07 175)");
      skyGrad.addColorStop(1, "oklch(0.14 0.05 145)");
      ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);
      // Moon glow
      const glowPulse = 0.18 + Math.sin(t * 0.3) * 0.04;
      const sunGrad = ctx.createRadialGradient(W * 0.82, H * 0.12, 0, W * 0.82, H * 0.12, 55);
      sunGrad.addColorStop(0, "oklch(0.92 0.18 90 / " + (glowPulse + 0.25) + ")");
      sunGrad.addColorStop(0.4, "oklch(0.80 0.14 65 / " + glowPulse + ")");
      sunGrad.addColorStop(1, "transparent");
      ctx.fillStyle = sunGrad; ctx.fillRect(0, 0, W, H);
      // Stars
      const rng = mulberry32(42);
      for (let i = 0; i < 22; i++) {
        const sx = rng() * W, sy = rng() * H * 0.45;
        const bright = 0.3 + Math.sin(t * 0.8 + i * 1.3) * 0.2;
        ctx.fillStyle = "oklch(0.95 0.04 90 / " + bright + ")";
        ctx.beginPath(); ctx.arc(sx, sy, 0.8 + rng() * 0.8, 0, Math.PI * 2); ctx.fill();
      }
      // Far hills
      ctx.fillStyle = "oklch(0.18 0.07 145)";
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 4) {
        ctx.lineTo(x, H * 0.42 + Math.sin(x * 0.007 + 1.2) * 28 + Math.sin(x * 0.018) * 10);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Mid canopy
      ctx.fillStyle = "oklch(0.16 0.08 140)";
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 3) {
        const base = H * 0.52;
        const tree = Math.sin(x * 0.012 + 0.5) * 22 + Math.sin(x * 0.03) * 8;
        const palm = Math.max(0, Math.sin(x * 0.005) * 12);
        ctx.lineTo(x, base + tree - palm);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Ground fog
      const fogGrad = ctx.createLinearGradient(0, H * 0.66, 0, H * 0.78);
      fogGrad.addColorStop(0, "transparent");
      fogGrad.addColorStop(1, "oklch(0.25 0.06 100 / 0.18)");
      ctx.fillStyle = fogGrad;
      const fogShift = Math.sin(t * 0.4) * 10;
      ctx.fillRect(fogShift, H * 0.66, W, H * 0.12);
      // Hanging vines
      drawVines(t);
    }

    function drawBiomeCave(t) {
      // Deep cool blue/purple sky
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, "oklch(0.16 0.10 280)");
      skyGrad.addColorStop(0.5, "oklch(0.12 0.08 270)");
      skyGrad.addColorStop(1, "oklch(0.10 0.05 260)");
      ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);
      // Bioluminescent crystal glow patches (instead of stars)
      const rng = mulberry32(101);
      for (let i = 0; i < 14; i++) {
        const cx = rng() * W, cy = rng() * H * 0.6;
        const pulse = 0.4 + Math.sin(t * 1.2 + i * 0.7) * 0.3;
        const cgrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22);
        cgrad.addColorStop(0, `oklch(0.78 0.18 ${200 + rng() * 80} / ${pulse * 0.5})`);
        cgrad.addColorStop(1, "transparent");
        ctx.fillStyle = cgrad;
        ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = `oklch(0.85 0.18 ${200 + rng() * 80} / ${pulse})`;
        ctx.beginPath(); ctx.arc(cx, cy, 1.2, 0, Math.PI * 2); ctx.fill();
      }
      // Stalactites — top
      ctx.fillStyle = "oklch(0.20 0.04 280)";
      ctx.beginPath(); ctx.moveTo(0, 0);
      for (let x = 0; x <= W; x += 12) {
        const tipY = 14 + Math.sin(x * 0.07) * 8 + (x % 24 === 0 ? 6 : 0);
        ctx.lineTo(x + 6, tipY);
        ctx.lineTo(x + 12, 0);
      }
      ctx.lineTo(W, 0); ctx.fill();
      // Far jagged stone hills
      ctx.fillStyle = "oklch(0.17 0.04 280)";
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 6) {
        const jag = (x % 18 === 0) ? 18 : 0;
        ctx.lineTo(x, H * 0.46 + Math.sin(x * 0.018) * 24 - jag);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Mid stone hills with cracks
      ctx.fillStyle = "oklch(0.13 0.04 280)";
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 5) {
        const base = H * 0.55 + Math.sin(x * 0.022) * 18;
        ctx.lineTo(x, base + Math.sin(x * 0.06) * 6);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Bioluminescent moss patches on hills
      ctx.strokeStyle = "oklch(0.62 0.18 200 / 0.45)";
      ctx.lineWidth = 1.2;
      const mossRng = mulberry32(202);
      for (let i = 0; i < 9; i++) {
        const mx = mossRng() * W;
        const my = H * 0.6 + mossRng() * H * 0.15;
        ctx.beginPath();
        for (let j = 0; j < 5; j++) {
          ctx.moveTo(mx + j * 1.5, my);
          ctx.lineTo(mx + j * 1.5 + Math.sin(j) * 1, my - 3 - mossRng() * 2);
        }
        ctx.stroke();
      }
    }

    function drawBiomeTemple(t) {
      // Warm dusky orange/sand sky
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, "oklch(0.55 0.10 50)");
      skyGrad.addColorStop(0.4, "oklch(0.62 0.14 60)");
      skyGrad.addColorStop(1, "oklch(0.45 0.10 35)");
      ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);
      // Setting sun
      const sunPulse = 0.6 + Math.sin(t * 0.4) * 0.05;
      const sunGrad = ctx.createRadialGradient(W * 0.78, H * 0.20, 0, W * 0.78, H * 0.20, 70);
      sunGrad.addColorStop(0, `oklch(0.92 0.18 70 / ${sunPulse})`);
      sunGrad.addColorStop(0.3, "oklch(0.80 0.18 50 / 0.4)");
      sunGrad.addColorStop(1, "transparent");
      ctx.fillStyle = sunGrad; ctx.fillRect(0, 0, W, H);
      // Sun disc
      ctx.fillStyle = `oklch(0.95 0.20 80 / ${sunPulse * 0.9})`;
      ctx.beginPath(); ctx.arc(W * 0.78, H * 0.20, 14, 0, Math.PI * 2); ctx.fill();
      // Far stepped pyramidal hills
      ctx.fillStyle = "oklch(0.32 0.10 50)";
      ctx.beginPath(); ctx.moveTo(0, H);
      const pyramids = [
        { cx: W * 0.15, w: 120, h: 60 },
        { cx: W * 0.35, w: 80, h: 45 },
        { cx: W * 0.55, w: 140, h: 75 },
        { cx: W * 0.78, w: 90, h: 50 },
      ];
      ctx.lineTo(0, H * 0.52);
      pyramids.forEach(p => {
        const baseY = H * 0.52;
        const peakY = baseY - p.h;
        ctx.lineTo(p.cx - p.w / 2, baseY);
        // Stepped sides
        const steps = 5;
        for (let i = 0; i < steps; i++) {
          const t1 = i / steps;
          const xL = p.cx - (p.w / 2) * (1 - t1);
          const yL = baseY - p.h * t1;
          ctx.lineTo(xL, yL);
          ctx.lineTo(xL + (p.w / steps) / 2, yL);
        }
        ctx.lineTo(p.cx, peakY);
        for (let i = steps - 1; i >= 0; i--) {
          const t1 = i / steps;
          const xR = p.cx + (p.w / 2) * (1 - t1);
          const yR = baseY - p.h * t1;
          ctx.lineTo(xR - (p.w / steps) / 2, yR);
          ctx.lineTo(xR, yR);
        }
        ctx.lineTo(p.cx + p.w / 2, baseY);
      });
      ctx.lineTo(W, H * 0.52);
      ctx.lineTo(W, H); ctx.fill();
      // Foreground broken pillars
      ctx.fillStyle = "oklch(0.45 0.08 60)";
      const pillars = [
        { x: W * 0.08, h: 60 }, { x: W * 0.92, h: 55 },
        { x: W * 0.30, h: 35 }, { x: W * 0.65, h: 40 },
      ];
      pillars.forEach(p => {
        ctx.fillRect(p.x - 4, H * 0.66, 8, p.h);
        // Capital
        ctx.fillRect(p.x - 6, H * 0.66 - 4, 12, 4);
        // Crack lines
        ctx.strokeStyle = "oklch(0.30 0.06 50)"; ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(p.x - 4, H * 0.66 + 8); ctx.lineTo(p.x + 4, H * 0.66 + 18); ctx.stroke();
      });
      // Hieroglyph dust haze near ground
      ctx.fillStyle = "oklch(0.70 0.10 60 / 0.10)";
      ctx.fillRect(0, H * 0.7, W, H * 0.15);
    }

    function drawBiomeVolcano(t) {
      // Red/orange smoky sky
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, "oklch(0.20 0.06 25)");
      skyGrad.addColorStop(0.5, "oklch(0.30 0.16 30)");
      skyGrad.addColorStop(1, "oklch(0.25 0.16 25)");
      ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);
      // Smoke column from a far volcano
      const smokeY = H * 0.12;
      const smokeGrad = ctx.createRadialGradient(W * 0.5, H * 0.55, 0, W * 0.5, H * 0.30, 120);
      smokeGrad.addColorStop(0, "oklch(0.45 0.10 30 / 0.6)");
      smokeGrad.addColorStop(0.6, "oklch(0.32 0.08 25 / 0.3)");
      smokeGrad.addColorStop(1, "transparent");
      ctx.fillStyle = smokeGrad;
      ctx.fillRect(W * 0.3, 0, W * 0.4, H * 0.6);
      // Distant red sun/moon
      const sunPulse = 0.5 + Math.sin(t * 0.6) * 0.1;
      ctx.fillStyle = `oklch(0.78 0.22 30 / ${sunPulse})`;
      ctx.beginPath(); ctx.arc(W * 0.18, H * 0.18, 18, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `oklch(0.55 0.20 25 / ${sunPulse * 0.6})`;
      ctx.beginPath(); ctx.arc(W * 0.18, H * 0.18, 30, 0, Math.PI * 2); ctx.fill();
      // Jagged angular far hills
      ctx.fillStyle = "oklch(0.16 0.08 25)";
      ctx.beginPath(); ctx.moveTo(0, H);
      ctx.lineTo(0, H * 0.55);
      const peaks = 12;
      for (let i = 0; i <= peaks; i++) {
        const x = (i / peaks) * W;
        const sharp = (i % 2 === 0) ? -22 : 0;
        ctx.lineTo(x, H * 0.50 + sharp + Math.sin(i) * 4);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Mid hills with lava crack veins
      ctx.fillStyle = "oklch(0.12 0.08 25)";
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 6) {
        ctx.lineTo(x, H * 0.62 + Math.sin(x * 0.022) * 14 + Math.sin(x * 0.06) * 6);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Lava cracks (glowing veins)
      const crackPulse = 0.55 + Math.sin(t * 2.5) * 0.18;
      ctx.strokeStyle = `oklch(0.85 0.22 50 / ${crackPulse})`;
      ctx.lineWidth = 1.4;
      const crackRng = mulberry32(303);
      for (let i = 0; i < 7; i++) {
        const sx = crackRng() * W;
        const sy = H * 0.65 + crackRng() * H * 0.12;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        for (let j = 0; j < 4; j++) {
          const dx = (crackRng() - 0.5) * 30;
          const dy = (crackRng() - 0.5) * 14;
          ctx.lineTo(sx + dx, sy + dy);
        }
        ctx.stroke();
        // Inner glow
        ctx.shadowBlur = 6;
        ctx.shadowColor = "oklch(0.88 0.22 60)";
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      // Heat haze near ground
      ctx.fillStyle = `oklch(0.72 0.20 35 / ${0.15 + Math.sin(t * 1.5) * 0.05})`;
      ctx.fillRect(0, H * 0.74, W, H * 0.10);
    }

    function drawBiome(t, idx, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha != null ? alpha : 1;
      if (idx === 1) drawBiomeCave(t);
      else if (idx === 2) drawBiomeTemple(t);
      else if (idx === 3) drawBiomeVolcano(t);
      else drawBiomeJungle(t); // default jungle (idx 0)
      ctx.restore();
    }
    // Backwards-compat alias for legacy callers
    function drawBackground(t) {
      const idx = worldEngine.getBiomeIdx();
      const tT = worldEngine.getTravelT();
      drawBiome(t, idx, 1);
      if (tT > 0.01) {
        const prevName = worldEngine.getPrevBiomeName();
        const prevIdx = ["jungle", "cave", "temple", "volcano"].indexOf(prevName);
        if (prevIdx >= 0 && prevIdx !== idx) drawBiome(t, prevIdx, tT);
      }
    }
    function drawVines(t) {
      ctx.strokeStyle = "oklch(0.22 0.09 145)";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      const energy = trauma * 3 + 0.3;
      for (let i = 0; i < 7; i++) {
        const vx = 50 + i * 120;
        const len = 30 + (i % 3) * 25;
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        for (let y = 0; y < len; y += 4) {
          const sway = Math.sin(y * 0.06 + t * 0.8 + i * 1.5) * (4 + energy * 3) * (y / len);
          ctx.lineTo(vx + sway, y);
        }
        ctx.stroke();
        const tipY = len;
        const tipSway = Math.sin(tipY * 0.06 + t * 0.8 + i * 1.5) * (4 + energy * 3);
        ctx.fillStyle = "oklch(0.28 0.12 140)";
        ctx.beginPath();
        ctx.ellipse(vx + tipSway, tipY + 3, 3, 5, tipSway * 0.05, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    function tickLeaves(t) {
      if (reducedMotion) return;
      leaves.forEach(lf => {
        lf.x -= lf.speed;
        lf.y += Math.sin(t * 0.5 + lf.x * 0.01) * 0.15;
        lf.rot += lf.rotSpeed;
        if (lf.x < -20) { lf.x = W + 20; lf.y = Math.random() * H * 0.55; }
        ctx.save();
        ctx.globalAlpha = lf.opacity;
        ctx.translate(lf.x, lf.y);
        ctx.rotate(lf.rot);
        ctx.fillStyle = "oklch(0.30 0.12 145)";
        ctx.beginPath();
        ctx.ellipse(0, 0, lf.size, lf.size * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "oklch(0.25 0.08 140)";
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(-lf.size, 0); ctx.lineTo(lf.size, 0);
        ctx.stroke();
        ctx.restore();
      });
      ctx.globalAlpha = 1;
    }

    // ─── Character system ───
    const CHAR_DEFS = [
      { name: "Kiko",  animal: "gorilla",      hue: 30,  size: 70 },
      { name: "Riko",  animal: "capuchin",     hue: 65,  size: 45 },
      { name: "Zuri",  animal: "frog",         hue: 230, size: 28 },
      { name: "Luna",  animal: "chameleon",    hue: 185, size: 35 },
      { name: "Bongo", animal: "spiderMonkey", hue: 305, size: 50 },
      { name: "Mika",  animal: "toucan",       hue: 90,  size: 35 },
      { name: "Jumba", animal: "elephant",     hue: 145, size: 75 },
      { name: "Sol",   animal: "quetzal",      hue: 55,  size: 45 },
    ];

    function charX(i) { return 52 + i * 101; }
    function charY(i) { return 198 - Math.cos((i - 3.5) / 4.5) * 14; }
    function charScaleBase(i) { return 0.78 + 0.22 * Math.cos((i - 3.5) / 4.5); }

    function createCharacter(def, idx) {
      const ch = {
        idx, def,
        x: charX(idx), y: charY(idx),
        scale: charScaleBase(idx),
        bodyOffY: 0, bodyOffYVel: 0,
        bodySquash: 1, bodySquashVel: 0,
        headBob: 0, headBobVel: 0,
        armSwing: 0, armSwingVel: 0,
        armSide: 0, // for L/R alternation
        blinkTimer: 3 + Math.random() * 4, blinkDur: 0,
        energyPulse: 0,
        consecutiveHits: 0,
        lastHitStep: -2,
        tail: [], trunk: [],
        custom: {},
        floorShake: 0,
      };
      const tailCounts = { capuchin: 6, chameleon: 5, spiderMonkey: 7, quetzal: 8 };
      const n = tailCounts[def.animal] || 0;
      for (let i = 0; i < n; i++) {
        ch.tail.push({ x: ch.x, y: ch.y + i * 5, px: ch.x, py: ch.y + i * 5 });
      }
      if (def.animal === "elephant") {
        for (let i = 0; i < 5; i++) {
          ch.trunk.push({ x: ch.x, y: ch.y + i * 4, px: ch.x, py: ch.y + i * 4 });
        }
      }
      if (def.animal === "frog") {
        ch.custom.spots = [];
        const rng = mulberry32(idx * 1234 + 7);
        for (let i = 0; i < 8; i++) {
          ch.custom.spots.push({ ang: rng() * 6.28, r: 0.4 + rng() * 0.5, sz: 1 + rng() * 1.5 });
        }
        ch.custom.throat = 0;
      }
      if (def.animal === "chameleon") {
        ch.custom.tongueT = 0;
        ch.custom.eyeL = 0; ch.custom.eyeR = 0;
        ch.custom.hueShift = 0;
      }
      if (def.animal === "quetzal") {
        ch.custom.waves = [];
      }
      if (def.animal === "toucan") {
        ch.custom.shimmy = 0;
      }
      if (def.animal === "gorilla") {
        ch.custom.fistY = 0; ch.custom.fistVel = 0;
      }
      return ch;
    }

    const chars = CHAR_DEFS.map((d, i) => createCharacter(d, i));

    // ─── Update all characters ───
    function updateChars(t, dt) {
      const breathRate = 1.5 + (currentBPM - 60) / 120;
      const springDamp = 2 + currentBPM / 60;
      const legPhaseRate = (currentBPM / 60) * 4;

      chars.forEach((ch, i) => {
        const def = ch.def;

        // Breathing (BPM-tempo-locked)
        const breathTarget = 1 + Math.sin(t * breathRate) * 0.022;
        const bs = springStep(ch.bodySquash, breathTarget, ch.bodySquashVel, 12, springDamp, dt);
        ch.bodySquash = Math.max(0.78, Math.min(1.25, bs.value));
        ch.bodySquashVel = bs.velocity;

        // Body offY (impulse spring)
        const bo = springStep(ch.bodyOffY, 0, ch.bodyOffYVel, 18, springDamp + 1, dt);
        ch.bodyOffY = bo.value;
        ch.bodyOffYVel = bo.velocity;

        // Head bob spring
        const hb = springStep(ch.headBob, 0, ch.headBobVel, 20, springDamp, dt);
        ch.headBob = hb.value; ch.headBobVel = hb.velocity;

        // Arm swing decay
        const as = springStep(ch.armSwing, 0, ch.armSwingVel, 22, springDamp, dt);
        ch.armSwing = as.value; ch.armSwingVel = as.velocity;

        ch.energyPulse *= 0.92;
        ch.floorShake *= 0.85;
        spotlightFlash[i] *= 0.86;

        // Blink
        ch.blinkTimer -= dt;
        if (ch.blinkTimer <= 0 && ch.blinkDur <= 0) {
          ch.blinkDur = 0.1; ch.blinkTimer = 3 + Math.random() * 4;
        }
        if (ch.blinkDur > 0) ch.blinkDur -= dt;

        // Verlet tail
        if (ch.tail.length) {
          const baseX = ch.x, baseY = ch.y + ch.bodyOffY + 4;
          ch.tail[0].x = baseX; ch.tail[0].y = baseY;
          for (let j = 1; j < ch.tail.length; j++) {
            const wind = Math.sin(t * 1.2 + j * 0.6 + i) * 0.18;
            const wagBoost = ch.energyPulse > 0.2 ? Math.sin(t * 6 + j) * 0.4 : 0;
            updateVerletPoint(ch.tail[j], wind + wagBoost, 0.18, 0.94);
          }
          const segLen = def.animal === "spiderMonkey" ? 7 :
                         def.animal === "quetzal" ? 6.2 :
                         def.animal === "capuchin" ? 5.5 :
                         def.animal === "chameleon" ? 5 : 6;
          for (let it = 0; it < 3; it++) {
            for (let j = 1; j < ch.tail.length; j++) constrainDist(ch.tail[j-1], ch.tail[j], segLen);
          }
        }
        // Verlet trunk (elephant)
        if (ch.trunk.length) {
          const baseX = ch.x + 14, baseY = ch.y + ch.bodyOffY - 6;
          ch.trunk[0].x = baseX; ch.trunk[0].y = baseY;
          for (let j = 1; j < ch.trunk.length; j++) {
            const sway = Math.sin(t * 1.5 + j * 0.3) * 0.18 + (ch.energyPulse > 0.2 ? -0.3 : 0);
            updateVerletPoint(ch.trunk[j], sway, 0.12, 0.92);
          }
          for (let it = 0; it < 3; it++) {
            for (let j = 1; j < ch.trunk.length; j++) constrainDist(ch.trunk[j-1], ch.trunk[j], 5);
          }
        }

        // Custom physics
        if (def.animal === "gorilla") {
          const fs = springStep(ch.custom.fistY, 0, ch.custom.fistVel, 30, springDamp + 2, dt);
          ch.custom.fistY = fs.value; ch.custom.fistVel = fs.velocity;
        }
        if (def.animal === "chameleon") {
          ch.custom.tongueT *= 0.78;
          if (ch.custom.tongueT < 0.02) ch.custom.tongueT = 0;
          ch.custom.hueShift *= 0.92;
        }
        if (def.animal === "frog") {
          ch.custom.throat *= 0.88;
        }
        if (def.animal === "toucan") {
          ch.custom.shimmy *= 0.84;
        }
        if (def.animal === "quetzal") {
          ch.custom.waves = ch.custom.waves.filter(w => {
            w.r += dt * 95; w.alpha -= dt * 1.6;
            return w.alpha > 0.02;
          });
        }
      });
    }

    // ─── Per-character draw functions ───
    function tintAlpha(oklchStr, a) { return oklchStr.replace(/\)$/, " / " + a + ")"); }

    function drawZzz(cx, cy, t) {
      ctx.save();
      ctx.fillStyle = "oklch(0.85 0.02 230 / 0.6)";
      ctx.font = "bold 9px ui-monospace, monospace";
      const wob = Math.sin(t * 2) * 1.5;
      ctx.fillText("z", cx - 4 + wob, cy);
      ctx.fillText("Z", cx + wob * 0.5, cy - 5);
      ctx.fillText("z", cx + 5 - wob, cy - 10);
      ctx.restore();
    }

    function drawEyes(hx, hy, lookX, lookY, asleep, blinking) {
      if (asleep || blinking) {
        ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(hx - 3, hy); ctx.lineTo(hx - 1, hy);
        ctx.moveTo(hx + 1, hy); ctx.lineTo(hx + 3, hy);
        ctx.stroke();
      } else {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(hx - 2.5, hy, 1.6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(hx + 2.5, hy, 1.6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(hx - 2.5 + lookX * 0.6, hy + lookY * 0.6, 0.9, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(hx + 2.5 + lookX * 0.6, hy + lookY * 0.6, 0.9, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawGorilla(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Log drum (behind body, sits on platform)
      ctx.fillStyle = "oklch(0.30 0.07 50)";
      ctx.beginPath();
      ctx.ellipse(0, 22, 26, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.38 0.08 55)";
      ctx.beginPath();
      ctx.ellipse(0, 19, 26, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wood grain rings
      ctx.strokeStyle = "oklch(0.22 0.05 50)"; ctx.lineWidth = 0.6;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(0, 19 + i * 1.5, 23, 5, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Body
      ctx.fillStyle = muted ? "oklch(0.26 0.04 30)" : "oklch(0.30 0.07 30)";
      ctx.beginPath();
      ctx.ellipse(0, -2, 18 * sq, 17 / sq, 0, 0, Math.PI * 2);
      ctx.fill();
      // Belly
      ctx.fillStyle = muted ? "oklch(0.40 0.05 35)" : "oklch(0.50 0.09 35)";
      ctx.beginPath();
      ctx.ellipse(0, 4, 11, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      // Arms (with fistY drop)
      const fy = ch.custom.fistY;
      ctx.strokeStyle = muted ? "oklch(0.26 0.04 30)" : "oklch(0.30 0.07 30)";
      ctx.lineWidth = 7; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-13, -8); ctx.bezierCurveTo(-22, -2, -22, 8 + fy, -16, 16 + fy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(13, -8); ctx.bezierCurveTo(22, -2, 22, 8 + fy, 16, 16 + fy);
      ctx.stroke();
      // Fists
      ctx.fillStyle = muted ? "oklch(0.32 0.04 30)" : "oklch(0.40 0.06 30)";
      ctx.beginPath(); ctx.arc(-16, 16 + fy, 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(16, 16 + fy, 4.5, 0, Math.PI * 2); ctx.fill();

      // Head
      const hy = -19 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.28 0.04 30)" : "oklch(0.32 0.07 30)";
      ctx.beginPath(); ctx.ellipse(0, hy, 12, 11, 0, 0, Math.PI * 2); ctx.fill();
      // Brow ridge
      ctx.fillStyle = muted ? "oklch(0.18 0.03 30)" : "oklch(0.22 0.05 30)";
      ctx.beginPath();
      ctx.ellipse(0, hy - 3, 11, 2.8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Face inner
      ctx.fillStyle = muted ? "oklch(0.45 0.05 30)" : "oklch(0.55 0.09 35)";
      ctx.beginPath();
      ctx.ellipse(0, hy + 2, 8, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      drawEyes(0, hy + 0.5, 0, 0, muted, ch.blinkDur > 0);
      // Mouth (wider on hit)
      const mw = 2 + ch.energyPulse * 1.5;
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.9; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(0, hy + 5, mw, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (muted) drawZzz(0, hy - 14, t);
      ctx.restore();
    }

    function drawCapuchin(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Tripod stand
      ctx.strokeStyle = "oklch(0.35 0.04 60)"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(-7, 22); ctx.lineTo(0, 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(7, 22); ctx.lineTo(0, 12); ctx.stroke();
      // Snare drum
      ctx.fillStyle = "oklch(0.85 0.03 80)";
      ctx.beginPath(); ctx.ellipse(0, 9, 11, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "oklch(0.75 0.05 70)";
      ctx.fillRect(-11, 9, 22, 5);
