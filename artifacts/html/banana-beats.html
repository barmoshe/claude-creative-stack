<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banana Beats · Monkey Sequencer</title>
  <style>
    :root {
      --bg: oklch(0.95 0.03 85);
      --bg2: oklch(0.92 0.04 80);
      --chassis: oklch(0.88 0.07 75);
      --chassis2: oklch(0.78 0.08 70);
      --display: oklch(0.22 0.06 145);
      --display2: oklch(0.15 0.05 140);
      --text: oklch(0.20 0.02 85);
      --text-muted: oklch(0.45 0.03 80);
      --text-light: oklch(0.92 0.02 95);
      --metal: oklch(0.50 0.04 60);
      --accent: oklch(0.85 0.19 90);
      --accent-hi: oklch(0.92 0.20 88);
      --accent-glow: oklch(0.80 0.20 90 / .6);
      --hot: oklch(0.68 0.22 25);
      --cool: oklch(0.62 0.16 230);
      --border-warm: oklch(0.72 0.06 70);
      --tk0: oklch(0.68 0.18 30);
      --tk1: oklch(0.76 0.16 65);
      --tk2: oklch(0.62 0.16 230);
      --tk3: oklch(0.68 0.16 185);
      --tk4: oklch(0.58 0.18 305);
      --tk5: oklch(0.85 0.19 90);
      --tk6: oklch(0.62 0.18 145);
      --tk7: oklch(0.78 0.16 55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; min-height: 100%; background: var(--bg);
      font: 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: var(--text); }
    body { display: grid; place-items: center; padding: 28px 16px;
      background: radial-gradient(ellipse at 50% 0%, oklch(0.96 0.05 85) 0%, var(--bg) 60%);
      min-height: 100vh; }

    .machine {
      width: min(860px, 100%);
      background: linear-gradient(180deg, var(--chassis) 0%, var(--chassis2) 100%);
      border-radius: 28px; padding: 24px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.6),
        inset 0 -2px 0 rgba(0,0,0,.12),
        0 20px 60px -15px rgba(100,70,30,.25),
        0 4px 12px rgba(100,70,30,.15);
      position: relative;
    }

    .header { display: flex; align-items: center; justify-content: space-between;
      padding: 0 4px 16px; border-bottom: 1px solid var(--border-warm);
      flex-wrap: wrap; gap: 8px; }
    .brand { font-weight: 700; letter-spacing: .28em; text-transform: uppercase;
      font-size: 12px; color: var(--metal); white-space: nowrap; }
    .brand em { color: oklch(0.55 0.16 90); font-style: normal; }
    .hdr-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .led { width: 8px; height: 8px; border-radius: 50%; background: oklch(0.75 0.04 75);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.2); flex-shrink: 0; }
    .led.on { background: oklch(0.65 0.20 145); box-shadow: 0 0 10px oklch(0.60 0.20 145 / .6); }
    .bpm-wrap { display: flex; align-items: center; gap: 4px; }
    .bpm-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--metal); }
    .bpm-input { width: 52px; background: oklch(0.82 0.03 75); border: 1px solid var(--border-warm);
      color: var(--text); padding: 4px 6px; border-radius: 4px; font: inherit; font-size: 12px;
      text-align: center; font-variant-numeric: tabular-nums;
      box-shadow: inset 0 1px 3px rgba(80,50,20,.15); }
    .seed-label { font-size: 9px; color: var(--text-muted); letter-spacing: .08em; }

    .ctrl-btn {
      font: 600 11px ui-monospace, monospace; letter-spacing: .12em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 6px; cursor: pointer; border: none;
      background: linear-gradient(180deg, oklch(0.75 0.06 70), oklch(0.65 0.06 65));
      color: oklch(0.35 0.04 70);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 2px 4px rgba(80,50,20,.25);
      transition: transform 0.1s, box-shadow 0.1s, color 0.1s;
    }
    .ctrl-btn:hover { color: oklch(0.40 0.14 145); }
    .ctrl-btn:active { transform: translateY(1px); box-shadow: inset 0 1px 3px rgba(80,50,20,.3); }
    .ctrl-btn.live { color: oklch(0.55 0.18 25); background: linear-gradient(180deg, oklch(0.78 0.10 30), oklch(0.68 0.10 25));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 0 12px oklch(0.60 0.18 25 / .3); }

    .display {
      margin: 16px 0 12px;
      background: linear-gradient(180deg, var(--display) 0%, var(--display2) 100%);
      border-radius: 14px; padding: 0; overflow: hidden;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,.7),
        inset 0 -1px 0 rgba(255,255,255,.03),
        0 0 0 2px oklch(0.65 0.06 70);
      position: relative;
    }
    .display::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
      mix-blend-mode: overlay; opacity: 0.5; z-index: 2;
    }
    .display canvas { display: block; width: 100%; height: 280px; }

    .pad-grid { padding: 12px 0 8px; }
    .pad-row { display: flex; align-items: center; gap: 0; margin-bottom: 3px; }
    .pad-label { width: 56px; font-size: 10px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; text-align: right; padding-right: 8px; flex-shrink: 0; }
    .pad-cells { display: flex; gap: 3px; flex: 1; }
    .pad-cells .spacer { width: 4px; flex-shrink: 0; }
    .pad {
      width: 100%; aspect-ratio: 1; border: none; border-radius: 5px; cursor: pointer;
      background: oklch(0.84 0.04 75);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        0 3px 0 oklch(0.65 0.05 70),
        0 5px 8px rgba(80,50,20,.2);
      transition: transform 0.06s ease, box-shadow 0.06s ease;
      flex: 1; min-width: 0; padding: 0;
    }
    .pad:active { transform: translateY(2px);
      box-shadow: inset 0 1px 3px rgba(80,50,20,.3); }
    .pad.on {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.4),
        0 3px 0 var(--tc),
        0 0 14px var(--tc);
      background: var(--tc);
    }
    .pad.current { transform: translateY(2px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 1px 2px rgba(80,50,20,.2); }
    .pad.on.current {
      box-shadow: inset 0 0 0 2px oklch(0.95 0.02 85), 0 0 16px var(--tc);
      background: var(--tc); filter: brightness(1.2);
    }
    .pad-reroll { width: 28px; height: 28px; flex-shrink: 0; margin-left: 4px; border: none;
      background: none; cursor: pointer; font-size: 14px; border-radius: 4px;
      color: var(--text-muted); transition: color .15s; }
    .pad-reroll:hover { color: var(--accent); }

    .tabs { display: flex; gap: 2px; padding: 8px 0 0; }
    .tab { font: 600 10px ui-monospace, monospace; letter-spacing: .14em; text-transform: uppercase;
      padding: 8px 16px; border: none; border-radius: 6px 6px 0 0; cursor: pointer;
      background: oklch(0.80 0.04 75); color: var(--text-muted);
      box-shadow: inset 0 -2px 0 rgba(80,50,20,.1);
      transition: color .15s, background .15s; }
    .tab:hover { color: var(--text); }
    .tab.active { background: oklch(0.72 0.05 70); color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3); }

    .panel {
      background: linear-gradient(180deg, oklch(0.76 0.05 72), oklch(0.72 0.05 70));
      border-radius: 0 8px 8px 8px; padding: 14px 16px;
      box-shadow: inset 0 2px 6px rgba(80,50,20,.15);
      max-height: 260px; overflow-y: auto; margin-bottom: 12px;
    }
    .panel::-webkit-scrollbar { width: 6px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: oklch(0.60 0.04 70); border-radius: 3px; }

    .mixer-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .mixer-label { width: 52px; font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; }
    .mixer-slider { flex: 1; max-width: 140px; height: 4px; accent-color: var(--tc);
      cursor: pointer; }
    .mixer-val { font-size: 10px; width: 32px; text-align: right; font-variant-numeric: tabular-nums;
      color: var(--text-muted); }
    .mixer-btn { font: 700 10px ui-monospace, monospace; width: 24px; height: 24px;
      border-radius: 4px; border: 1px solid oklch(0.60 0.04 70); cursor: pointer;
      background: oklch(0.78 0.04 75); color: var(--text-muted);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
      transition: all .12s; display: grid; place-items: center; }
    .mixer-btn:hover { border-color: var(--text-muted); }
    .mixer-btn.active { background: oklch(0.55 0.16 90); color: oklch(0.15 0.02 85);
      border-color: oklch(0.55 0.16 90); }
    .mixer-btn.solo-active { background: var(--hot); color: #fff; border-color: var(--hot); }

    .fx-slot { padding: 10px 0; border-bottom: 1px solid oklch(0.68 0.04 70); }
    .fx-slot:last-child { border-bottom: none; }
    .fx-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .fx-params { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px 16px; }
    .fx-param { display: flex; flex-direction: column; gap: 2px; }
    .fx-param label { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }
    .fx-param input[type="range"] { width: 100%; height: 4px; accent-color: oklch(0.55 0.16 90); cursor: pointer; }
    .fx-param .val { font-size: 9px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    .preset-item { display: flex; align-items: center; gap: 8px; padding: 6px 0;
      border-bottom: 1px solid oklch(0.68 0.04 70); }
    .preset-item:last-child { border-bottom: none; }
    .preset-name { font-weight: 700; font-size: 12px; flex: 1; }
    .preset-actions { display: flex; gap: 4px; }
    .preset-btn { font: 600 10px ui-monospace, monospace; padding: 3px 8px; border-radius: 4px;
      border: 1px solid oklch(0.60 0.04 70); background: oklch(0.78 0.04 75);
      color: var(--text-muted); cursor: pointer; transition: all .12s; }
    .preset-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .preset-btn.del { color: var(--hot); }
    .preset-save-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .preset-input { flex: 1; background: oklch(0.82 0.03 75); border: 1px solid oklch(0.65 0.04 70);
      color: var(--text); padding: 6px 10px; border-radius: 6px; font: inherit; font-size: 12px;
      box-shadow: inset 0 1px 3px rgba(80,50,20,.1); }

    .kb-hint { padding: 8px 4px 0; text-align: center;
      font-size: 10px; color: var(--text-muted); letter-spacing: .08em; opacity: .6; }

    @keyframes breathe { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }

    @media (max-width: 600px) {
      .machine { padding: 14px; border-radius: 18px; }
      .header { gap: 6px; }
      .pad-label { width: 40px; font-size: 9px; }
      .panel { max-height: 200px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0s !important; transition-duration: 0s !important; }
      .pad { transition: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@15.0.4/build/Tone.js"></script>
  <script>
  // ─── Banana Beats v2 ─────────────────────────────────────────────────────────
  (function(){
  "use strict";

  const h = React.createElement;
  const { useState, useEffect, useRef, useReducer, useCallback, useMemo } = React;
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ─── Utilities (kept from v1) ─────────────────────────────────────────────────

  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function euclidean(steps, hits) {
    if (hits <= 0) return new Array(steps).fill(false);
    if (hits >= steps) return new Array(steps).fill(true);
    const p = [];
    for (let i = 0; i < steps; i++)
      p.push(Math.floor(i * hits / steps) !== Math.floor((i - 1) * hits / steps));
    return p;
  }

  const SCALES = {
    pentatonic: [0, 2, 4, 7, 9],
    dorian: [0, 2, 3, 5, 7, 9, 10],
    minor: [0, 2, 3, 5, 7, 8, 10],
    blues: [0, 3, 5, 6, 7, 10],
  };

  function markovGenerate(steps, scale, order, seed) {
    const rng = mulberry32(seed);
    const notes = SCALES[scale] || SCALES.pentatonic;
    const result = [];
    let prev = notes[0];
    for (let i = 0; i < steps; i++) {
      const idx = notes.indexOf(prev);
      const jump = rng() < 0.3 ? Math.floor(rng() * notes.length) : Math.max(0, Math.min(notes.length - 1, idx + (rng() < 0.5 ? 1 : -1)));
      prev = notes[jump];
      result.push(rng() < 0.6 ? 48 + prev + (rng() < 0.3 ? 12 : 0) : 0);
    }
    return result;
  }

  function densityNoise(steps, density, seed) {
    const rng = mulberry32(seed);
    return Array.from({ length: steps }, () => rng() < density);
  }

  const bus = {
    _h: {},
    on(e, f) { (this._h[e] || (this._h[e] = [])).push(f); },
    off(e, f) { this._h[e] = (this._h[e] || []).filter(x => x !== f); },
    emit(e, d) { (this._h[e] || []).forEach(f => f(d)); }
  };

  function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

  // ─── Track definitions (kept from v1) ─────────────────────────────────────────

  const TRACK_DEFS = [
    { name: "Kick",   gen: "euclidean", k: 4,  density: 0, scale: "", order: 0, color: "var(--tk0)" },
    { name: "Snare",  gen: "euclidean", k: 2,  density: 0, scale: "", order: 0, color: "var(--tk1)" },
    { name: "C-Hat",  gen: "euclidean", k: 11, density: 0, scale: "", order: 0, color: "var(--tk2)" },
    { name: "O-Hat",  gen: "euclidean", k: 3,  density: 0, scale: "", order: 0, color: "var(--tk3)" },
    { name: "Bongo",  gen: "euclidean", k: 5,  density: 0, scale: "", order: 0, color: "var(--tk4)" },
    { name: "Shaker", gen: "noise",     k: 0,  density: 0.6, scale: "", order: 0, color: "var(--tk5)" },
    { name: "Bass",   gen: "markov",    k: 0,  density: 0, scale: "dorian", order: 2, color: "var(--tk6)" },
    { name: "Lead",   gen: "markov",    k: 0,  density: 0, scale: "pentatonic", order: 1, color: "var(--tk7)" },
  ];

  const TRACK_COLORS_RAW = [
    "oklch(0.68 0.18 30)", "oklch(0.76 0.16 65)", "oklch(0.62 0.16 230)", "oklch(0.68 0.16 185)",
    "oklch(0.58 0.18 305)", "oklch(0.85 0.19 90)", "oklch(0.62 0.18 145)", "oklch(0.78 0.16 55)"
  ];

  function generatePattern(def, steps, seed) {
    if (def.gen === "euclidean") return euclidean(steps, def.k);
    if (def.gen === "noise") return densityNoise(steps, def.density, seed);
    if (def.gen === "markov") return markovGenerate(steps, def.scale, def.order, seed);
    return new Array(steps).fill(false);
  }

  function buildTracks(defs, steps, seed) {
    return defs.map((def, i) => ({
      ...def, id: i, steps,
      pattern: generatePattern(def, steps, seed + i * 1000),
      gain: 0.8, pan: 0, mute: false, solo: false,
      sendReverb: i >= 6 ? 0.3 : 0.1,
      sendDelay: i === 7 ? 0.25 : 0.05,
    }));
  }

  // ─── Initial state + Reducer (kept from v1) ──────────────────────────────────

  const STEPS = 16;

  function createInitialState() {
    const seed = Math.floor(Math.random() * 1000000);
    return {
      bpm: 96, seed, isPlaying: false, activeTab: "seq", vibe: "chill",
      tracks: buildTracks(TRACK_DEFS, STEPS, seed),
      fx: [
        { type: "reverb", enabled: true, params: { decay: 4, wet: 0.3, preDelay: 0.01 } },
        { type: "delay", enabled: true, params: { delayTime: 0.25, feedback: 0.3, wet: 0.2 } },
        { type: "filter", enabled: false, params: { frequency: 2000, Q: 1, wet: 0.5 } },
        { type: "distortion", enabled: false, params: { amount: 0.3, wet: 0.4, oversample: 0 } },
      ],
      master: { gain: 0.8, limiter: true },
      character: { state: "idle", trauma: 0, barsPlayed: 0 },
      presets: [],
      currentStep: -1,
    };
  }

  function reducer(state, action) {
    switch (action.type) {
      case "PLAY": return { ...state, isPlaying: true };
      case "STOP": return { ...state, isPlaying: false, currentStep: -1, character: { ...state.character, state: "idle", barsPlayed: 0 } };
      case "SET_BPM": return { ...state, bpm: Math.max(40, Math.min(180, action.value)) };
      case "SET_STEP": return { ...state, currentStep: action.step };
      case "REROLL_ALL": {
        const seed = Math.floor(Math.random() * 1000000);
        return { ...state, seed, tracks: state.tracks.map((t, i) => ({ ...t, pattern: generatePattern(TRACK_DEFS[i], t.steps, seed + i * 1000) })) };
      }
      case "REROLL_TRACK": {
        const seed = Math.floor(Math.random() * 1000000);
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, pattern: generatePattern(TRACK_DEFS[i], t.steps, seed) } : t);
        return { ...state, tracks };
      }
      case "TOGGLE_STEP": {
        const tracks = state.tracks.map((t, i) => {
          if (i !== action.trackId) return t;
          const pattern = [...t.pattern];
          if (typeof pattern[action.step] === "number") {
            pattern[action.step] = pattern[action.step] ? 0 : 60;
          } else {
            pattern[action.step] = !pattern[action.step];
          }
          return { ...t, pattern };
        });
        return { ...state, tracks };
      }
      case "SET_GAIN": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, gain: action.value } : t);
        return { ...state, tracks };
      }
      case "SET_PAN": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, pan: action.value } : t);
        return { ...state, tracks };
      }
      case "MUTE": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, mute: !t.mute } : t);
        return { ...state, tracks };
      }
      case "SOLO": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, solo: !t.solo } : t);
        return { ...state, tracks };
      }
      case "SET_SEND": {
        const tracks = state.tracks.map((t, i) => i === action.id ? { ...t, [action.send]: action.value } : t);
        return { ...state, tracks };
      }
      case "SET_FX_PARAM": {
        const fx = state.fx.map((f, i) => {
          if (i !== action.slot) return f;
          return { ...f, params: { ...f.params, [action.key]: action.value } };
        });
        return { ...state, fx };
      }
      case "TOGGLE_FX": {
        const fx = state.fx.map((f, i) => i === action.slot ? { ...f, enabled: !f.enabled } : f);
        return { ...state, fx };
      }
      case "SET_MASTER_GAIN": return { ...state, master: { ...state.master, gain: action.value } };
      case "SET_TAB": return { ...state, activeTab: action.tab };
      case "SET_VIBE": return { ...state, vibe: action.vibe };
      case "SET_CHARACTER": return { ...state, character: { ...state.character, ...action.data } };
      case "SAVE_PRESET": {
        const preset = { id: Date.now().toString(), name: action.name, bpm: state.bpm, seed: state.seed, tracks: state.tracks, fx: state.fx, master: state.master, vibe: state.vibe };
        return { ...state, presets: [...state.presets, preset] };
      }
      case "LOAD_PRESET": {
        const p = state.presets.find(x => x.id === action.id);
        if (!p) return state;
        return { ...state, bpm: p.bpm, seed: p.seed, tracks: p.tracks, fx: p.fx, master: p.master, vibe: p.vibe };
      }
      case "DELETE_PRESET": return { ...state, presets: state.presets.filter(p => p.id !== action.id) };
      case "LOAD_SAVED": return { ...state, ...action.data };
      default: return state;
    }
  }

  // ─── Audio Engine (kept from v1) ──────────────────────────────────────────────

  let audioReady = false;
  let synths = [];
  let trackGains = [];
  let trackPans = [];
  let reverbSend, delaySend, reverbGain, delayGain, masterGain, limiter;
  let sequences = [];

  function createAudio() {
    if (audioReady) return;
    synths = [
      new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 6, envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.2 }, volume: -4 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.15, sustain: 0, release: 0.1 }, volume: -8 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.06, sustain: 0, release: 0.03 }, volume: -12 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.25, sustain: 0.05, release: 0.15 }, volume: -14 }),
      new Tone.MembraneSynth({ pitchDecay: 0.03, octaves: 3, envelope: { attack: 0.001, decay: 0.15, sustain: 0, release: 0.1 }, volume: -8 }),
      new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.001, decay: 0.04, sustain: 0, release: 0.02 }, volume: -16 }),
      new Tone.MonoSynth({ oscillator: { type: "square" }, filter: { Q: 2, frequency: 400 },
        envelope: { attack: 0.01, decay: 0.2, sustain: 0.4, release: 0.3 },
        filterEnvelope: { baseFrequency: 120, octaves: 2.5, attack: 0.01, decay: 0.1, sustain: 0.3, release: 0.3 }, volume: -6 }),
      new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.15, sustain: 0.2, release: 0.3 }, volume: -10 }),
    ];

    const filters = {
      1: new Tone.Filter({ frequency: 1000, type: "bandpass", Q: 1.5 }),
      2: new Tone.Filter({ frequency: 6000, type: "highpass" }),
      3: new Tone.Filter({ frequency: 6000, type: "highpass" }),
      5: new Tone.Filter({ frequency: 3000, type: "highpass" }),
    };

    trackGains = synths.map(() => new Tone.Gain(0.8));
    trackPans = synths.map(() => new Tone.Panner(0));

    reverbSend = new Tone.Reverb({ decay: 4, wet: 1, preDelay: 0.01 });
    delaySend = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.3, wet: 1 });
    reverbGain = new Tone.Gain(0.15);
    delayGain = new Tone.Gain(0.1);
    masterGain = new Tone.Gain(0.8);
    limiter = new Tone.Limiter(-3);

    synths.forEach((s, i) => {
      if (filters[i]) { s.connect(filters[i]); filters[i].connect(trackGains[i]); }
      else { s.connect(trackGains[i]); }
      trackGains[i].connect(trackPans[i]);
      trackPans[i].connect(masterGain);
      trackPans[i].connect(reverbGain);
      trackPans[i].connect(delayGain);
    });
    reverbGain.connect(reverbSend);
    reverbSend.connect(masterGain);
    delayGain.connect(delaySend);
    delaySend.connect(masterGain);
    masterGain.connect(limiter);
    limiter.toDestination();
    audioReady = true;
  }

  function triggerTrack(trackIdx, val, time) {
    if (!val) return;
    const s = synths[trackIdx];
    if (trackIdx === 0) s.triggerAttackRelease("C1", "8n", time);
    else if (trackIdx === 4) s.triggerAttackRelease("C3", "16n", time);
    else if (trackIdx === 6 && typeof val === "number" && val > 0) s.triggerAttackRelease(midiToFreq(val), "8n", time, 0.7);
    else if (trackIdx === 7 && typeof val === "number" && val > 0) s.triggerAttackRelease(midiToFreq(val), "16n", time, 0.5);
    else if ([1, 2, 3, 5].includes(trackIdx)) s.triggerAttackRelease("16n", time);
  }

  function rebuildSequences(getState) {
    disposeSequences();
    const mainSeq = new Tone.Sequence((time, stepIdx) => {
      const st = getState();
      const hasSolo = st.tracks.some(t => t.solo);
      st.tracks.forEach((track, i) => {
        const audible = hasSolo ? track.solo : !track.mute;
        if (!audible) return;
        trackGains[i].gain.value = track.gain;
        trackPans[i].pan.value = track.pan;
        triggerTrack(i, track.pattern[stepIdx], time);
      });
      Tone.Draw.schedule(() => {
        bus.emit("step", { step: stepIdx });
        const st2 = getState();
        const hasSolo2 = st2.tracks.some(t => t.solo);
        st2.tracks.forEach((track, i) => {
          const audible = hasSolo2 ? track.solo : !track.mute;
          const val = track.pattern[stepIdx];
          if (!val || !audible) return;
          bus.emit("trackHit", { track: i, step: stepIdx, val });
          if (i === 0) bus.emit("kick", { step: stepIdx });
          else if (i === 1) bus.emit("snare", { step: stepIdx });
          else if (i === 2 || i === 3) bus.emit("hat", { step: stepIdx });
          else if (i === 4) bus.emit("bongo", { step: stepIdx });
          else if (i === 6) bus.emit("bass", { step: stepIdx });
          else if (i === 7) bus.emit("lead", { step: stepIdx });
        });
        if (stepIdx % 4 === 0) bus.emit("accent", { step: stepIdx });
        if (stepIdx === 0) bus.emit("loopWrap", {});
      }, time);
    }, [...Array(STEPS).keys()], "16n");
    mainSeq.start(0);
    sequences.push(mainSeq);
  }

  function disposeSequences() {
    sequences.forEach(s => { try { s.stop(); s.dispose(); } catch(e){} });
    sequences = [];
  }

  // ─── Persistence (kept from v1) ───────────────────────────────────────────────

  let saveTimer;
  function debounceSave(state) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        if (window.storage) {
          await window.storage.set("banana-beats-v2", JSON.stringify({
            presets: state.presets,
            lastSession: { bpm: state.bpm, vibe: state.vibe, tracks: state.tracks.map(t => ({ ...t })), fx: state.fx, master: state.master }
          }));
        }
      } catch (e) {}
    }, 500);
  }

  async function loadSaved() {
    try {
      if (window.storage) {
        const r = await window.storage.get("banana-beats-v2");
        if (r && r.value) return JSON.parse(r.value);
      }
    } catch (e) {}
    return null;
  }

  // ─── Physics Helpers ──────────────────────────────────────────────────────────

  function springStep(current, target, velocity, stiffness, damping, dt) {
    const force = (target - current) * stiffness - velocity * damping;
    const newVel = velocity + force * dt;
    return { value: current + newVel * dt, velocity: newVel };
  }

  function updateVerletPoint(p, ax, ay, damp) {
    const vx = (p.x - p.px) * damp + ax;
    const vy = (p.y - p.py) * damp + ay;
    p.px = p.x; p.py = p.y;
    p.x += vx; p.y += vy;
  }

  function constrainDist(a, b, len) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
    const diff = (dist - len) / dist * 0.5;
    a.x += dx * diff; a.y += dy * diff;
    b.x -= dx * diff; b.y -= dy * diff;
  }

  // ─── Canvas Stage ─────────────────────────────────────────────────────────────

  function createStage(canvas) {
    const ctx = canvas.getContext("2d");
    const W = 812, H = 280;
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // ─── Global stage state ───
    let trauma = 0, flashAlpha = 0, beatPhase = 0;
    let currentBPM = 96;
    let isPlayingFlag = false;
    const trackMute = new Array(8).fill(false);
    const trackSolo = new Array(8).fill(false);
    const trackEnergy = new Array(8).fill(0.25);
    const spotlightFlash = new Array(8).fill(0);

    function addTrauma(amt) { trauma = Math.min(1, trauma + amt); }
    function getShake() {
      const s = trauma * trauma;
      return { x: (Math.random() * 2 - 1) * 12 * s, y: (Math.random() * 2 - 1) * 12 * s };
    }

    // ─── Particle pool (capped at 200) ───
    const particles = [];
    function spawn(x, y, count, color, type, opts) {
      if (reducedMotion) return;
      const o = opts || {};
      for (let i = 0; i < count && particles.length < 200; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * (o.spread != null ? o.spread : 3),
          vy: -Math.random() * (o.lift != null ? o.lift : 3) - (o.lift0 || 1),
          life: o.life || 0.5, maxLife: o.life || 0.5,
          size: (o.minSize || 1.5) + Math.random() * (o.sizeRange || 1.5),
          color, type,
          ang: Math.random() * 6.28,
          angV: (Math.random() - 0.5) * (o.spin || 0.2),
          gravity: o.gravity != null ? o.gravity : 180,
        });
      }
    }

    // ─── Ambient leaves (depth-cycled) ───
    const leaves = [];
    for (let i = 0; i < 8; i++) {
      leaves.push({
        x: Math.random() * W, y: Math.random() * H * 0.7,
        speed: 0.15 + Math.random() * 0.25,
        size: 4 + Math.random() * 5,
        rot: Math.random() * 6.28,
        rotSpeed: (Math.random() - 0.5) * 0.008,
        opacity: 0.15 + Math.random() * 0.2,
      });
    }

    // ─── Decorative drawers ───
    function drawBananaBunch(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      // Vine
      ctx.strokeStyle = "oklch(0.30 0.10 140)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -8); ctx.bezierCurveTo(2, -4, -1, -1, 0, 2);
      ctx.stroke();
      // 5 bananas
      const bp = [[-4, 0, -0.4], [3, -1, 0.3], [-1, 4, -0.1], [5, 4, 0.4], [-5, 6, -0.5]];
      for (const [bx, by, ang] of bp) {
        ctx.save();
        ctx.translate(bx, by); ctx.rotate(ang);
        ctx.fillStyle = "oklch(0.85 0.19 90)";
        ctx.beginPath(); ctx.ellipse(0, 0, 1.6, 4, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "oklch(0.45 0.12 60)";
        ctx.beginPath(); ctx.arc(0, 3.5, 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawHibiscus(x, y, s, hue) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      // 5 petals
      ctx.fillStyle = "oklch(0.72 0.22 " + hue + ")";
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        ctx.save();
        ctx.rotate(a);
        ctx.beginPath();
        ctx.ellipse(0, -4, 3, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // Center stamen
      ctx.fillStyle = "oklch(0.85 0.18 80)";
      ctx.beginPath(); ctx.arc(0, 0, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "oklch(0.55 0.20 25)";
      ctx.beginPath(); ctx.arc(0, 0, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawPalmFrond(x, y, baseAng, t) {
      ctx.save();
      ctx.translate(x, y);
      const sway = Math.sin(t * 0.6) * 0.05;
      ctx.rotate(baseAng + sway);
      // Stem
      ctx.strokeStyle = "oklch(0.30 0.10 130)";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(15, -8, 35, -18, 55, -22);
      ctx.stroke();
      // Leaflets along stem
      ctx.fillStyle = "oklch(0.30 0.13 140)";
      for (let i = 0; i < 8; i++) {
        const tparam = i / 7;
        const sx = tparam * 55, sy = -tparam * 22 - Math.sin(tparam * Math.PI) * 4;
        const side = i % 2 === 0 ? 1 : -1;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(side * 0.9 + tparam * 0.3);
        ctx.beginPath();
        ctx.ellipse(0, side * 6, 2.5, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawTikiTorch(x, y, t, bpm) {
      ctx.save();
      ctx.translate(x, y);
      // Bamboo pole
      ctx.fillStyle = "oklch(0.45 0.10 80)";
      ctx.fillRect(-2, 0, 4, 50);
      ctx.strokeStyle = "oklch(0.30 0.06 70)";
      ctx.lineWidth = 0.6;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(-2, 8 + i * 12); ctx.lineTo(2, 8 + i * 12);
        ctx.stroke();
      }
      // Cup
      ctx.fillStyle = "oklch(0.32 0.08 60)";
      ctx.beginPath();
      ctx.ellipse(0, -2, 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Flame (flicker rate scales with BPM)
      const flickerRate = 6 + bpm / 30;
      const fy = -6 - Math.abs(Math.sin(t * flickerRate)) * 2;
      const fw = 4 + Math.sin(t * flickerRate * 1.3) * 1;
      ctx.fillStyle = "oklch(0.70 0.20 35 / 0.85)";
      ctx.beginPath();
      ctx.ellipse(0, fy - 4, fw, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.85 0.20 80 / 0.9)";
      ctx.beginPath();
      ctx.ellipse(0, fy - 3, fw * 0.6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.95 0.18 95)";
      ctx.beginPath();
      ctx.ellipse(0, fy - 2, fw * 0.3, 1.8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      const glowGrad = ctx.createRadialGradient(0, fy - 4, 0, 0, fy - 4, 24);
      glowGrad.addColorStop(0, "oklch(0.85 0.20 70 / 0.30)");
      glowGrad.addColorStop(1, "transparent");
      ctx.fillStyle = glowGrad;
      ctx.fillRect(-24, fy - 28, 48, 32);
      ctx.restore();
    }

    function drawSpotlight(cx, color, intensity) {
      if (intensity <= 0.02) return;
      const topY = 6, botY = 230;
      const topW = 14, botW = 90;
      const grad = ctx.createLinearGradient(cx, topY, cx, botY);
      grad.addColorStop(0, color.replace("oklch(", "oklch(").replace(")", " / " + (intensity * 0.55).toFixed(3) + ")"));
      grad.addColorStop(1, "transparent");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cx - topW / 2, topY);
      ctx.lineTo(cx + topW / 2, topY);
      ctx.lineTo(cx + botW / 2, botY);
      ctx.lineTo(cx - botW / 2, botY);
      ctx.closePath();
      ctx.fill();
    }

    function drawBambooStage() {
      // Platform plank
      const py = 232, pH = 18;
      const plankGrad = ctx.createLinearGradient(0, py, 0, py + pH);
      plankGrad.addColorStop(0, "oklch(0.42 0.08 65)");
      plankGrad.addColorStop(1, "oklch(0.30 0.07 60)");
      ctx.fillStyle = plankGrad;
      ctx.fillRect(0, py, W, pH);
      // Plank lines
      ctx.strokeStyle = "oklch(0.22 0.05 60)";
      ctx.lineWidth = 0.6;
      for (let i = 0; i < 12; i++) {
        ctx.beginPath();
        ctx.moveTo(i * (W / 12), py);
        ctx.lineTo(i * (W / 12) + 4, py + pH);
        ctx.stroke();
      }
      // Top edge highlight
      ctx.strokeStyle = "oklch(0.55 0.10 70)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(0, py + 0.5); ctx.lineTo(W, py + 0.5);
      ctx.stroke();
      // Bamboo support posts
      ctx.fillStyle = "oklch(0.40 0.10 80)";
      for (const sx of [60, W - 60]) {
        ctx.fillRect(sx - 4, py + pH, 8, H - py - pH);
        ctx.strokeStyle = "oklch(0.25 0.06 70)";
        ctx.lineWidth = 0.8;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(sx - 4, py + pH + 6 + i * 9);
          ctx.lineTo(sx + 4, py + pH + 6 + i * 9);
          ctx.stroke();
        }
      }
    }

    // ─── Background (kept from v2) ───
    function drawBackground(t) {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, "oklch(0.30 0.08 230)");
      skyGrad.addColorStop(0.4, "oklch(0.22 0.07 175)");
      skyGrad.addColorStop(1, "oklch(0.14 0.05 145)");
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);
      // Moon glow
      const glowPulse = 0.18 + Math.sin(t * 0.3) * 0.04;
      const sunGrad = ctx.createRadialGradient(W * 0.82, H * 0.12, 0, W * 0.82, H * 0.12, 55);
      sunGrad.addColorStop(0, "oklch(0.92 0.18 90 / " + (glowPulse + 0.25) + ")");
      sunGrad.addColorStop(0.4, "oklch(0.80 0.14 65 / " + glowPulse + ")");
      sunGrad.addColorStop(1, "transparent");
      ctx.fillStyle = sunGrad;
      ctx.fillRect(0, 0, W, H);
      // Stars
      const rng = mulberry32(42);
      for (let i = 0; i < 22; i++) {
        const sx = rng() * W, sy = rng() * H * 0.45;
        const bright = 0.3 + Math.sin(t * 0.8 + i * 1.3) * 0.2;
        ctx.fillStyle = "oklch(0.95 0.04 90 / " + bright + ")";
        ctx.beginPath();
        ctx.arc(sx, sy, 0.8 + rng() * 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // Far hills
      ctx.fillStyle = "oklch(0.18 0.07 145)";
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 4) {
        ctx.lineTo(x, H * 0.42 + Math.sin(x * 0.007 + 1.2) * 28 + Math.sin(x * 0.018) * 10);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Mid canopy
      ctx.fillStyle = "oklch(0.16 0.08 140)";
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 3) {
        const base = H * 0.52;
        const tree = Math.sin(x * 0.012 + 0.5) * 22 + Math.sin(x * 0.03) * 8;
        const palm = Math.max(0, Math.sin(x * 0.005) * 12);
        ctx.lineTo(x, base + tree - palm);
      }
      ctx.lineTo(W, H); ctx.fill();
      // Ground fog
      const fogGrad = ctx.createLinearGradient(0, H * 0.66, 0, H * 0.78);
      fogGrad.addColorStop(0, "transparent");
      fogGrad.addColorStop(1, "oklch(0.25 0.06 100 / 0.18)");
      ctx.fillStyle = fogGrad;
      const fogShift = Math.sin(t * 0.4) * 10;
      ctx.fillRect(fogShift, H * 0.66, W, H * 0.12);
      // Hanging vines
      drawVines(t);
    }
    function drawVines(t) {
      ctx.strokeStyle = "oklch(0.22 0.09 145)";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      const energy = trauma * 3 + 0.3;
      for (let i = 0; i < 7; i++) {
        const vx = 50 + i * 120;
        const len = 30 + (i % 3) * 25;
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        for (let y = 0; y < len; y += 4) {
          const sway = Math.sin(y * 0.06 + t * 0.8 + i * 1.5) * (4 + energy * 3) * (y / len);
          ctx.lineTo(vx + sway, y);
        }
        ctx.stroke();
        const tipY = len;
        const tipSway = Math.sin(tipY * 0.06 + t * 0.8 + i * 1.5) * (4 + energy * 3);
        ctx.fillStyle = "oklch(0.28 0.12 140)";
        ctx.beginPath();
        ctx.ellipse(vx + tipSway, tipY + 3, 3, 5, tipSway * 0.05, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    function tickLeaves(t) {
      if (reducedMotion) return;
      leaves.forEach(lf => {
        lf.x -= lf.speed;
        lf.y += Math.sin(t * 0.5 + lf.x * 0.01) * 0.15;
        lf.rot += lf.rotSpeed;
        if (lf.x < -20) { lf.x = W + 20; lf.y = Math.random() * H * 0.55; }
        ctx.save();
        ctx.globalAlpha = lf.opacity;
        ctx.translate(lf.x, lf.y);
        ctx.rotate(lf.rot);
        ctx.fillStyle = "oklch(0.30 0.12 145)";
        ctx.beginPath();
        ctx.ellipse(0, 0, lf.size, lf.size * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "oklch(0.25 0.08 140)";
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(-lf.size, 0); ctx.lineTo(lf.size, 0);
        ctx.stroke();
        ctx.restore();
      });
      ctx.globalAlpha = 1;
    }

    // ─── Character system ───
    const CHAR_DEFS = [
      { name: "Kiko",  animal: "gorilla",      hue: 30,  size: 70 },
      { name: "Riko",  animal: "capuchin",     hue: 65,  size: 45 },
      { name: "Zuri",  animal: "frog",         hue: 230, size: 28 },
      { name: "Luna",  animal: "chameleon",    hue: 185, size: 35 },
      { name: "Bongo", animal: "spiderMonkey", hue: 305, size: 50 },
      { name: "Mika",  animal: "toucan",       hue: 90,  size: 35 },
      { name: "Jumba", animal: "elephant",     hue: 145, size: 75 },
      { name: "Sol",   animal: "quetzal",      hue: 55,  size: 45 },
    ];

    function charX(i) { return 52 + i * 101; }
    function charY(i) { return 198 - Math.cos((i - 3.5) / 4.5) * 14; }
    function charScaleBase(i) { return 0.78 + 0.22 * Math.cos((i - 3.5) / 4.5); }

    function createCharacter(def, idx) {
      const ch = {
        idx, def,
        x: charX(idx), y: charY(idx),
        scale: charScaleBase(idx),
        bodyOffY: 0, bodyOffYVel: 0,
        bodySquash: 1, bodySquashVel: 0,
        headBob: 0, headBobVel: 0,
        armSwing: 0, armSwingVel: 0,
        armSide: 0, // for L/R alternation
        blinkTimer: 3 + Math.random() * 4, blinkDur: 0,
        energyPulse: 0,
        consecutiveHits: 0,
        lastHitStep: -2,
        tail: [], trunk: [],
        custom: {},
        floorShake: 0,
      };
      const tailCounts = { capuchin: 6, chameleon: 5, spiderMonkey: 7, quetzal: 8 };
      const n = tailCounts[def.animal] || 0;
      for (let i = 0; i < n; i++) {
        ch.tail.push({ x: ch.x, y: ch.y + i * 5, px: ch.x, py: ch.y + i * 5 });
      }
      if (def.animal === "elephant") {
        for (let i = 0; i < 5; i++) {
          ch.trunk.push({ x: ch.x, y: ch.y + i * 4, px: ch.x, py: ch.y + i * 4 });
        }
      }
      if (def.animal === "frog") {
        ch.custom.spots = [];
        const rng = mulberry32(idx * 1234 + 7);
        for (let i = 0; i < 8; i++) {
          ch.custom.spots.push({ ang: rng() * 6.28, r: 0.4 + rng() * 0.5, sz: 1 + rng() * 1.5 });
        }
        ch.custom.throat = 0;
      }
      if (def.animal === "chameleon") {
        ch.custom.tongueT = 0;
        ch.custom.eyeL = 0; ch.custom.eyeR = 0;
        ch.custom.hueShift = 0;
      }
      if (def.animal === "quetzal") {
        ch.custom.waves = [];
      }
      if (def.animal === "toucan") {
        ch.custom.shimmy = 0;
      }
      if (def.animal === "gorilla") {
        ch.custom.fistY = 0; ch.custom.fistVel = 0;
      }
      return ch;
    }

    const chars = CHAR_DEFS.map((d, i) => createCharacter(d, i));

    // ─── Update all characters ───
    function updateChars(t, dt) {
      const breathRate = 1.5 + (currentBPM - 60) / 120;
      const springDamp = 2 + currentBPM / 60;
      const legPhaseRate = (currentBPM / 60) * 4;

      chars.forEach((ch, i) => {
        const def = ch.def;

        // Breathing (BPM-tempo-locked)
        const breathTarget = 1 + Math.sin(t * breathRate) * 0.022;
        const bs = springStep(ch.bodySquash, breathTarget, ch.bodySquashVel, 12, springDamp, dt);
        ch.bodySquash = Math.max(0.78, Math.min(1.25, bs.value));
        ch.bodySquashVel = bs.velocity;

        // Body offY (impulse spring)
        const bo = springStep(ch.bodyOffY, 0, ch.bodyOffYVel, 18, springDamp + 1, dt);
        ch.bodyOffY = bo.value;
        ch.bodyOffYVel = bo.velocity;

        // Head bob spring
        const hb = springStep(ch.headBob, 0, ch.headBobVel, 20, springDamp, dt);
        ch.headBob = hb.value; ch.headBobVel = hb.velocity;

        // Arm swing decay
        const as = springStep(ch.armSwing, 0, ch.armSwingVel, 22, springDamp, dt);
        ch.armSwing = as.value; ch.armSwingVel = as.velocity;

        ch.energyPulse *= 0.92;
        ch.floorShake *= 0.85;
        spotlightFlash[i] *= 0.86;

        // Blink
        ch.blinkTimer -= dt;
        if (ch.blinkTimer <= 0 && ch.blinkDur <= 0) {
          ch.blinkDur = 0.1; ch.blinkTimer = 3 + Math.random() * 4;
        }
        if (ch.blinkDur > 0) ch.blinkDur -= dt;

        // Verlet tail
        if (ch.tail.length) {
          const baseX = ch.x, baseY = ch.y + ch.bodyOffY + 4;
          ch.tail[0].x = baseX; ch.tail[0].y = baseY;
          for (let j = 1; j < ch.tail.length; j++) {
            const wind = Math.sin(t * 1.2 + j * 0.6 + i) * 0.18;
            const wagBoost = ch.energyPulse > 0.2 ? Math.sin(t * 6 + j) * 0.4 : 0;
            updateVerletPoint(ch.tail[j], wind + wagBoost, 0.18, 0.94);
          }
          const segLen = def.animal === "spiderMonkey" ? 7 :
                         def.animal === "quetzal" ? 6.2 :
                         def.animal === "capuchin" ? 5.5 :
                         def.animal === "chameleon" ? 5 : 6;
          for (let it = 0; it < 3; it++) {
            for (let j = 1; j < ch.tail.length; j++) constrainDist(ch.tail[j-1], ch.tail[j], segLen);
          }
        }
        // Verlet trunk (elephant)
        if (ch.trunk.length) {
          const baseX = ch.x + 14, baseY = ch.y + ch.bodyOffY - 6;
          ch.trunk[0].x = baseX; ch.trunk[0].y = baseY;
          for (let j = 1; j < ch.trunk.length; j++) {
            const sway = Math.sin(t * 1.5 + j * 0.3) * 0.18 + (ch.energyPulse > 0.2 ? -0.3 : 0);
            updateVerletPoint(ch.trunk[j], sway, 0.12, 0.92);
          }
          for (let it = 0; it < 3; it++) {
            for (let j = 1; j < ch.trunk.length; j++) constrainDist(ch.trunk[j-1], ch.trunk[j], 5);
          }
        }

        // Custom physics
        if (def.animal === "gorilla") {
          const fs = springStep(ch.custom.fistY, 0, ch.custom.fistVel, 30, springDamp + 2, dt);
          ch.custom.fistY = fs.value; ch.custom.fistVel = fs.velocity;
        }
        if (def.animal === "chameleon") {
          ch.custom.tongueT *= 0.78;
          if (ch.custom.tongueT < 0.02) ch.custom.tongueT = 0;
          ch.custom.hueShift *= 0.92;
        }
        if (def.animal === "frog") {
          ch.custom.throat *= 0.88;
        }
        if (def.animal === "toucan") {
          ch.custom.shimmy *= 0.84;
        }
        if (def.animal === "quetzal") {
          ch.custom.waves = ch.custom.waves.filter(w => {
            w.r += dt * 95; w.alpha -= dt * 1.6;
            return w.alpha > 0.02;
          });
        }
      });
    }

    // ─── Per-character draw functions ───
    function tintAlpha(oklchStr, a) { return oklchStr.replace(/\)$/, " / " + a + ")"); }

    function drawZzz(cx, cy, t) {
      ctx.save();
      ctx.fillStyle = "oklch(0.85 0.02 230 / 0.6)";
      ctx.font = "bold 9px ui-monospace, monospace";
      const wob = Math.sin(t * 2) * 1.5;
      ctx.fillText("z", cx - 4 + wob, cy);
      ctx.fillText("Z", cx + wob * 0.5, cy - 5);
      ctx.fillText("z", cx + 5 - wob, cy - 10);
      ctx.restore();
    }

    function drawEyes(hx, hy, lookX, lookY, asleep, blinking) {
      if (asleep || blinking) {
        ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(hx - 3, hy); ctx.lineTo(hx - 1, hy);
        ctx.moveTo(hx + 1, hy); ctx.lineTo(hx + 3, hy);
        ctx.stroke();
      } else {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(hx - 2.5, hy, 1.6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(hx + 2.5, hy, 1.6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(hx - 2.5 + lookX * 0.6, hy + lookY * 0.6, 0.9, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(hx + 2.5 + lookX * 0.6, hy + lookY * 0.6, 0.9, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawGorilla(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Log drum (behind body, sits on platform)
      ctx.fillStyle = "oklch(0.30 0.07 50)";
      ctx.beginPath();
      ctx.ellipse(0, 22, 26, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.38 0.08 55)";
      ctx.beginPath();
      ctx.ellipse(0, 19, 26, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wood grain rings
      ctx.strokeStyle = "oklch(0.22 0.05 50)"; ctx.lineWidth = 0.6;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(0, 19 + i * 1.5, 23, 5, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Body
      ctx.fillStyle = muted ? "oklch(0.26 0.04 30)" : "oklch(0.30 0.07 30)";
      ctx.beginPath();
      ctx.ellipse(0, -2, 18 * sq, 17 / sq, 0, 0, Math.PI * 2);
      ctx.fill();
      // Belly
      ctx.fillStyle = muted ? "oklch(0.40 0.05 35)" : "oklch(0.50 0.09 35)";
      ctx.beginPath();
      ctx.ellipse(0, 4, 11, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      // Arms (with fistY drop)
      const fy = ch.custom.fistY;
      ctx.strokeStyle = muted ? "oklch(0.26 0.04 30)" : "oklch(0.30 0.07 30)";
      ctx.lineWidth = 7; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-13, -8); ctx.bezierCurveTo(-22, -2, -22, 8 + fy, -16, 16 + fy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(13, -8); ctx.bezierCurveTo(22, -2, 22, 8 + fy, 16, 16 + fy);
      ctx.stroke();
      // Fists
      ctx.fillStyle = muted ? "oklch(0.32 0.04 30)" : "oklch(0.40 0.06 30)";
      ctx.beginPath(); ctx.arc(-16, 16 + fy, 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(16, 16 + fy, 4.5, 0, Math.PI * 2); ctx.fill();

      // Head
      const hy = -19 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.28 0.04 30)" : "oklch(0.32 0.07 30)";
      ctx.beginPath(); ctx.ellipse(0, hy, 12, 11, 0, 0, Math.PI * 2); ctx.fill();
      // Brow ridge
      ctx.fillStyle = muted ? "oklch(0.18 0.03 30)" : "oklch(0.22 0.05 30)";
      ctx.beginPath();
      ctx.ellipse(0, hy - 3, 11, 2.8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Face inner
      ctx.fillStyle = muted ? "oklch(0.45 0.05 30)" : "oklch(0.55 0.09 35)";
      ctx.beginPath();
      ctx.ellipse(0, hy + 2, 8, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      drawEyes(0, hy + 0.5, 0, 0, muted, ch.blinkDur > 0);
      // Mouth (wider on hit)
      const mw = 2 + ch.energyPulse * 1.5;
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.9; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(0, hy + 5, mw, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (muted) drawZzz(0, hy - 14, t);
      ctx.restore();
    }

    function drawCapuchin(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Tripod stand
      ctx.strokeStyle = "oklch(0.35 0.04 60)"; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(-7, 22); ctx.lineTo(0, 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(7, 22); ctx.lineTo(0, 12); ctx.stroke();
      // Snare drum
      ctx.fillStyle = "oklch(0.85 0.03 80)";
      ctx.beginPath(); ctx.ellipse(0, 9, 11, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "oklch(0.75 0.05 70)";
      ctx.fillRect(-11, 9, 22, 5);
      ctx.strokeStyle = "oklch(0.45 0.05 70)"; ctx.lineWidth = 0.5;
      for (let i = 0; i < 5; i++) {
        const sx = -10 + i * 5;
        ctx.beginPath(); ctx.moveTo(sx, 9); ctx.lineTo(sx + 1, 14); ctx.stroke();
      }

      // Tail (verlet, drawn before body)
      if (ch.tail.length) {
        ctx.strokeStyle = muted ? "oklch(0.28 0.06 65)" : "oklch(0.42 0.10 65)";
        ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
      }

      // Body
      ctx.fillStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.beginPath(); ctx.ellipse(0, -1, 8 * sq, 11 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Belly
      ctx.fillStyle = muted ? "oklch(0.55 0.04 70)" : "oklch(0.78 0.08 75)";
      ctx.beginPath(); ctx.ellipse(0, 1, 4.5, 7, 0, 0, Math.PI * 2); ctx.fill();

      // Arms holding sticks (alternating L/R)
      const swing = ch.armSwing;
      const lDown = ch.armSide === 0 ? swing : 0;
      const rDown = ch.armSide === 1 ? swing : 0;
      ctx.strokeStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.lineWidth = 2; ctx.lineCap = "round";
      // Left arm + stick
      ctx.beginPath();
      ctx.moveTo(-5, -2); ctx.lineTo(-7 - lDown * 0.5, 2 + lDown);
      ctx.stroke();
      ctx.strokeStyle = "oklch(0.55 0.06 60)"; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-7 - lDown * 0.5, 2 + lDown); ctx.lineTo(-3, 7 + lDown * 0.7);
      ctx.stroke();
      ctx.fillStyle = "oklch(0.85 0.05 80)";
      ctx.beginPath(); ctx.arc(-3, 7 + lDown * 0.7, 1.2, 0, Math.PI * 2); ctx.fill();
      // Right arm + stick
      ctx.strokeStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(5, -2); ctx.lineTo(7 + rDown * 0.5, 2 + rDown);
      ctx.stroke();
      ctx.strokeStyle = "oklch(0.55 0.06 60)"; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(7 + rDown * 0.5, 2 + rDown); ctx.lineTo(3, 7 + rDown * 0.7);
      ctx.stroke();
      ctx.fillStyle = "oklch(0.85 0.05 80)";
      ctx.beginPath(); ctx.arc(3, 7 + rDown * 0.7, 1.2, 0, Math.PI * 2); ctx.fill();

      // Head
      const hy = -12 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.beginPath(); ctx.arc(0, hy, 8, 0, Math.PI * 2); ctx.fill();
      // Face
      ctx.fillStyle = muted ? "oklch(0.62 0.04 75)" : "oklch(0.85 0.08 75)";
      ctx.beginPath(); ctx.ellipse(0, hy + 1, 5.5, 6, 0, 0, Math.PI * 2); ctx.fill();
      // Ears
      ctx.fillStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.beginPath(); ctx.arc(-7.5, hy - 2, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7.5, hy - 2, 2.2, 0, Math.PI * 2); ctx.fill();
      // Eyes (big)
      drawEyes(0, hy + 0.5, 0, 0, muted, ch.blinkDur > 0);
      // Mouth
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.arc(0, hy + 4, 1.4, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (muted) drawZzz(0, hy - 11, t);
      ctx.restore();
    }

    function drawFrog(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Hi-hat cymbals (frog perches on)
      ctx.fillStyle = "oklch(0.65 0.10 80)";
      ctx.beginPath(); ctx.ellipse(0, 14, 13, 2.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "oklch(0.40 0.06 60)"; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(0, 14); ctx.lineTo(0, 22); ctx.stroke();
      ctx.fillStyle = "oklch(0.55 0.08 75)";
      ctx.beginPath(); ctx.ellipse(0, 16, 13, 2, 0, 0, Math.PI * 2); ctx.fill();

      // Body (dome)
      ctx.fillStyle = muted ? "oklch(0.30 0.06 145)" : "oklch(0.55 0.18 140)";
      ctx.beginPath(); ctx.ellipse(0, 4, 11 * sq, 8 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Belly (cream)
      ctx.fillStyle = muted ? "oklch(0.55 0.04 95)" : "oklch(0.85 0.10 95)";
      ctx.beginPath(); ctx.ellipse(0, 7, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
      // Spots
      if (!muted) {
        ctx.fillStyle = "oklch(0.35 0.10 145)";
        ch.custom.spots.forEach(s => {
          const sx = Math.cos(s.ang) * 8 * s.r;
          const sy = 2 + Math.sin(s.ang) * 5 * s.r;
          ctx.beginPath();
          ctx.arc(sx, sy, s.sz, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      // Throat pouch (pulses)
      const throatScale = 1 + ch.custom.throat * 0.6;
      ctx.fillStyle = muted ? "oklch(0.50 0.04 95)" : "oklch(0.78 0.14 95)";
      ctx.beginPath();
      ctx.ellipse(0, 9, 4 * throatScale, 2.5 * throatScale, 0, 0, Math.PI * 2);
      ctx.fill();
      // Legs (folded)
      ctx.strokeStyle = muted ? "oklch(0.30 0.06 145)" : "oklch(0.50 0.16 142)";
      ctx.lineWidth = 1.6; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-9, 5); ctx.lineTo(-12, 9); ctx.lineTo(-7, 11); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(9, 5); ctx.lineTo(12, 9); ctx.lineTo(7, 11); ctx.stroke();

      // Eyes (bulging)
      const eyeSize = 3.5 + ch.energyPulse * 1.2;
      ctx.fillStyle = muted ? "oklch(0.42 0.06 145)" : "oklch(0.68 0.16 142)";
      ctx.beginPath(); ctx.arc(-5, -3, eyeSize, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, -3, eyeSize, 0, Math.PI * 2); ctx.fill();
      if (!muted && ch.blinkDur <= 0) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-5, -3, eyeSize * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -3, eyeSize * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-5, -3, eyeSize * 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -3, eyeSize * 0.3, 0, Math.PI * 2); ctx.fill();
      } else {
        // Blink/asleep — membrane covers
        ctx.strokeStyle = "#000"; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(-5, -3, eyeSize, 0.1, Math.PI - 0.1);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(5, -3, eyeSize, 0.1, Math.PI - 0.1);
        ctx.stroke();
      }
      // Mouth
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(-3, 1); ctx.quadraticCurveTo(0, 2 + ch.energyPulse, 3, 1);
      ctx.stroke();

      if (muted) drawZzz(0, -10, t);
      ctx.restore();
    }

    function drawChameleon(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Open hi-hat / cymbal stand
      ctx.strokeStyle = "oklch(0.40 0.05 65)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(13, 12); ctx.lineTo(13, 22); ctx.stroke();
      ctx.fillStyle = "oklch(0.65 0.10 80)";
      ctx.beginPath(); ctx.ellipse(13, 11, 8, 1.5, 0, 0, Math.PI * 2); ctx.fill();

      // Tail (curled spiral)
      if (ch.tail.length) {
        const hueShift = ch.def.hue + ch.custom.hueShift * 30;
        ctx.strokeStyle = muted ? "oklch(0.32 0.05 185)" : "oklch(0.55 0.14 " + hueShift + ")";
        ctx.lineWidth = 2.4; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
      }

      // Body
      const hueShift = ch.def.hue + ch.custom.hueShift * 30;
      ctx.fillStyle = muted ? "oklch(0.36 0.06 185)" : "oklch(0.58 0.16 " + hueShift + ")";
      ctx.beginPath();
      ctx.ellipse(-2, 2, 11 * sq, 7 / sq, 0, 0, Math.PI * 2);
      ctx.fill();
      // Stripes
      if (!muted) {
        ctx.strokeStyle = "oklch(0.42 0.10 " + hueShift + ")";
        ctx.lineWidth = 0.8;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(-9 + i * 4, -3); ctx.lineTo(-8 + i * 4, 6);
          ctx.stroke();
        }
      }
      // Legs
      ctx.strokeStyle = muted ? "oklch(0.30 0.05 185)" : "oklch(0.45 0.14 " + hueShift + ")";
      ctx.lineWidth = 1.6; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-7, 5); ctx.lineTo(-9, 9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5, 5); ctx.lineTo(7, 9); ctx.stroke();
      // Head with helmet casque
      const hy = -2 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.36 0.06 185)" : "oklch(0.58 0.16 " + hueShift + ")";
      ctx.beginPath();
      ctx.moveTo(-8, hy);
      ctx.bezierCurveTo(-12, hy - 4, -9, hy - 8, -3, hy - 5);
      ctx.bezierCurveTo(2, hy - 7, 6, hy - 3, 6, hy);
      ctx.lineTo(-8, hy);
      ctx.fill();
      // Turret eyes (independently-tracking)
      const elx = Math.sin(t * 1.7) * 1.5;
      const erx = Math.cos(t * 1.3) * 1.5;
      ctx.fillStyle = muted ? "oklch(0.30 0.04 185)" : "oklch(0.40 0.10 " + hueShift + ")";
      ctx.beginPath(); ctx.arc(-5, hy - 1, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(2, hy - 2, 2.5, 0, Math.PI * 2); ctx.fill();
      if (!muted && ch.blinkDur <= 0) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-5 + elx * 0.5, hy - 1, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(2 + erx * 0.5, hy - 2, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-5 + elx, hy - 1, 0.7, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(2 + erx, hy - 2, 0.7, 0, Math.PI * 2); ctx.fill();
      }
      // Tongue (extends to cymbal on hit)
      if (ch.custom.tongueT > 0.03) {
        const tEnd = 13;
        const tProgress = ch.custom.tongueT;
        const startX = 5, startY = hy + 1;
        ctx.strokeStyle = "oklch(0.65 0.20 25)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(
          startX + (tEnd - startX) * 0.5 * tProgress, startY,
          tEnd - 2, 8 + 2 * (1 - tProgress),
          tEnd - 1 + tProgress * 1, 11
        );
        ctx.stroke();
        // Tongue tip
        ctx.fillStyle = "oklch(0.78 0.20 25)";
        ctx.beginPath();
        ctx.arc(tEnd - 1 + tProgress, 11, 1.4, 0, Math.PI * 2);
        ctx.fill();
      }

      if (muted) drawZzz(-2, hy - 10, t);
      ctx.restore();
    }

    function drawSpiderMonkey(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Bongos (between knees)
      ctx.fillStyle = "oklch(0.36 0.08 50)";
      ctx.beginPath(); ctx.ellipse(-6, 13, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, 13, 4, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "oklch(0.78 0.06 75)";
      ctx.beginPath(); ctx.ellipse(-6, 11, 5, 2.2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, 11, 4, 1.8, 0, 0, Math.PI * 2); ctx.fill();
      // Bongo lacing
      ctx.strokeStyle = "oklch(0.40 0.06 60)"; ctx.lineWidth = 0.5;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(-6 + Math.cos(a) * 5, 11 + Math.sin(a) * 1.6);
        ctx.lineTo(-6 + Math.cos(a) * 5.4, 14 + Math.sin(a) * 1.6);
        ctx.stroke();
      }

      // Tail (long verlet — most expressive)
      if (ch.tail.length) {
        ctx.strokeStyle = muted ? "oklch(0.28 0.06 305)" : "oklch(0.40 0.16 305)";
        ctx.lineWidth = 2.8; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
      }

      // Body
      ctx.fillStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.beginPath(); ctx.ellipse(0, -1, 9 * sq, 12 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Fur tufts
      if (!muted) {
        ctx.strokeStyle = "oklch(0.32 0.10 305)";
        ctx.lineWidth = 0.8;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(-7 + i * 6, -8);
          ctx.lineTo(-6 + i * 6 + Math.sin(t * 2 + i) * 0.5, -11);
          ctx.stroke();
        }
      }

      // Legs (crossed)
      ctx.strokeStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.lineWidth = 2.2; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-4, 6); ctx.bezierCurveTo(-6, 10, 4, 12, 6, 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4, 6); ctx.bezierCurveTo(6, 10, -4, 12, -6, 16); ctx.stroke();

      // Long arms (4-segment bezier each, alternating slap)
      const swing = ch.armSwing;
      const lDown = ch.armSide === 0 ? swing : 0;
      const rDown = ch.armSide === 1 ? swing : 0;
      ctx.strokeStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(-7, -3);
      ctx.bezierCurveTo(-12, 0, -10, 6 + lDown, -7, 11 + lDown);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(7, -3);
      ctx.bezierCurveTo(12, 0, 10, 6 + rDown, 7, 11 + rDown);
      ctx.stroke();
      // Palms (open)
      ctx.fillStyle = muted ? "oklch(0.42 0.04 305)" : "oklch(0.55 0.10 305)";
      ctx.beginPath(); ctx.arc(-7, 11 + lDown, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7, 11 + rDown, 2.2, 0, Math.PI * 2); ctx.fill();

      // Head
      const hy = -13 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.beginPath(); ctx.arc(0, hy, 7.5, 0, Math.PI * 2); ctx.fill();
      // Face
      ctx.fillStyle = muted ? "oklch(0.55 0.04 75)" : "oklch(0.78 0.10 75)";
      ctx.beginPath(); ctx.ellipse(0, hy + 1, 5, 5.5, 0, 0, Math.PI * 2); ctx.fill();
      // Eyes
      drawEyes(0, hy, 0, 0, muted, ch.blinkDur > 0);
      // Mouth
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.arc(0, hy + 4, 1.4, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (muted) drawZzz(0, hy - 10, t);
      ctx.restore();
    }

    function drawToucan(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      const shimmy = ch.custom.shimmy;
      ctx.save();
      ctx.translate(bx + Math.sin(t * 18) * shimmy * 1.5, by);
      ctx.scale(scl, scl);

      // Branch perch
      ctx.strokeStyle = "oklch(0.35 0.08 60)"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-14, 11); ctx.lineTo(14, 13);
      ctx.stroke();

      // Body (compact, black)
      ctx.fillStyle = muted ? "oklch(0.20 0.02 240)" : "oklch(0.18 0.03 240)";
      ctx.beginPath(); ctx.ellipse(0, 0, 8 * sq, 9 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Yellow breast
      ctx.fillStyle = muted ? "oklch(0.55 0.06 90)" : "oklch(0.85 0.18 90)";
      ctx.beginPath(); ctx.ellipse(0, 4, 5, 4, 0, 0, Math.PI * 2); ctx.fill();

      // Legs
      ctx.strokeStyle = "oklch(0.55 0.10 35)"; ctx.lineWidth = 1.3; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-2, 7); ctx.lineTo(-3, 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, 7); ctx.lineTo(3, 12); ctx.stroke();
      // Foot holds maraca
      ctx.fillStyle = muted ? "oklch(0.50 0.05 90)" : "oklch(0.72 0.16 80)";
      ctx.beginPath(); ctx.ellipse(3, 14, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
      // Maraca stick
      ctx.strokeStyle = "oklch(0.42 0.06 60)"; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(3, 13); ctx.lineTo(3 + Math.sin(t * 30) * shimmy * 1, 8);
      ctx.stroke();

      // Wing
      const wingFlap = Math.sin(t * 4) * 1 + ch.energyPulse * 2;
      ctx.fillStyle = muted ? "oklch(0.20 0.02 240)" : "oklch(0.18 0.03 240)";
      ctx.beginPath();
      ctx.ellipse(-3, 1, 5, 3 + wingFlap, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = muted ? "oklch(0.32 0.04 230)" : "oklch(0.45 0.10 230)";
      ctx.beginPath();
      ctx.ellipse(-3, 1, 3, 1.5 + wingFlap * 0.5, 0.3, 0, Math.PI * 2);
      ctx.fill();

      // Head
      const hy = -8 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.20 0.02 240)" : "oklch(0.18 0.03 240)";
      ctx.beginPath(); ctx.arc(0, hy, 5.5, 0, Math.PI * 2); ctx.fill();

      // Giant beak (compound bezier with gradient stops)
      const beakOpen = ch.energyPulse * 1.5;
      const beakGrad = ctx.createLinearGradient(4, hy, 22, hy + 2);
      beakGrad.addColorStop(0, "oklch(0.55 0.18 150)");
      beakGrad.addColorStop(0.4, "oklch(0.78 0.22 95)");
      beakGrad.addColorStop(0.75, "oklch(0.72 0.22 55)");
      beakGrad.addColorStop(1, "oklch(0.62 0.20 25)");
      ctx.fillStyle = muted ? "oklch(0.45 0.08 60)" : beakGrad;
      // Upper beak
      ctx.beginPath();
      ctx.moveTo(4, hy - 1);
      ctx.bezierCurveTo(12, hy - 5, 22, hy - 2, 22, hy + 1 - beakOpen * 0.5);
      ctx.bezierCurveTo(20, hy + 2 - beakOpen * 0.5, 12, hy + 1 - beakOpen * 0.5, 4, hy);
      ctx.fill();
      // Lower beak
      ctx.beginPath();
      ctx.moveTo(4, hy + 1);
      ctx.bezierCurveTo(12, hy + 4 + beakOpen, 20, hy + 2 + beakOpen, 22, hy + 1 + beakOpen * 0.5);
      ctx.lineTo(4, hy + 1);
      ctx.fill();

      // Eye (large)
      if (!muted && ch.blinkDur <= 0) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-1, hy - 1, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-1, hy - 1, 1.1, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.strokeStyle = "#000"; ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(-3, hy - 1); ctx.lineTo(1, hy - 1);
        ctx.stroke();
      }

      if (muted) drawZzz(0, hy - 10, t);
      ctx.restore();
    }

    function drawElephant(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Bass log (in front of feet)
      ctx.fillStyle = "oklch(0.32 0.07 50)";
      ctx.beginPath();
      ctx.ellipse(-12, 22, 14, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.42 0.08 55)";
      ctx.beginPath();
      ctx.ellipse(-12, 19, 14, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Resonance hole
      ctx.fillStyle = "oklch(0.18 0.04 50)";
      ctx.beginPath();
      ctx.arc(-12, 19, 2, 0, Math.PI * 2);
      ctx.fill();
      // Wood rings on top
      ctx.strokeStyle = "oklch(0.22 0.05 50)"; ctx.lineWidth = 0.5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(-12, 19, 12 - i * 3, 3 - i * 0.6, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Body (massive)
      ctx.fillStyle = muted ? "oklch(0.42 0.04 145)" : "oklch(0.55 0.10 145)";
      ctx.beginPath();
      ctx.ellipse(0, -2, 22 * sq, 18 / sq, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wrinkle lines
      if (!muted) {
        ctx.strokeStyle = "oklch(0.40 0.06 145)"; ctx.lineWidth = 0.7;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(-10 + i * 4, 4);
          ctx.bezierCurveTo(-8 + i * 4, 6, -8 + i * 4, 8, -10 + i * 4, 10);
          ctx.stroke();
        }
      }

      // Front legs
      ctx.fillStyle = muted ? "oklch(0.42 0.04 145)" : "oklch(0.55 0.10 145)";
      // Stomp leg (left, animated)
      const stompY = ch.energyPulse > 0.3 ? -ch.energyPulse * 4 : 0;
      ctx.fillRect(-12, 12 + stompY, 6, 9 - stompY);
      ctx.fillRect(4, 13, 6, 8);
      ctx.fillRect(10, 13, 5, 8);
      // Toes
      ctx.fillStyle = muted ? "oklch(0.55 0.04 145)" : "oklch(0.70 0.10 145)";
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(-11 + i * 2, 21 + stompY, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ears (huge, fan-shaped, spring-driven)
      const earFlap = Math.sin(t * 1.5) * 0.6 + ch.energyPulse * 2;
      ctx.fillStyle = muted ? "oklch(0.40 0.04 145)" : "oklch(0.50 0.10 145)";
      ctx.save();
      ctx.translate(-18, -10);
      ctx.rotate(-0.3 - earFlap * 0.05);
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 12 + earFlap, 0, 0, Math.PI * 2);
      ctx.fill();
      // Ear veins
      if (!muted) {
        ctx.strokeStyle = "oklch(0.38 0.06 145)"; ctx.lineWidth = 0.6;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(0, -8 + i * 5); ctx.bezierCurveTo(-3, -4 + i * 5, -5, 0 + i * 5, -7, 4 + i * 5);
          ctx.stroke();
        }
      }
      ctx.restore();
      ctx.save();
      ctx.translate(18, -10);
      ctx.rotate(0.3 + earFlap * 0.05);
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 12 + earFlap, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Head (dome on body)
      const hy = -8 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.45 0.04 145)" : "oklch(0.58 0.10 145)";
      ctx.beginPath();
      ctx.ellipse(0, hy, 11, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      // Trunk (verlet, drawn from base outward)
      if (ch.trunk.length) {
        ctx.strokeStyle = muted ? "oklch(0.45 0.04 145)" : "oklch(0.58 0.10 145)";
        ctx.lineWidth = 4.5; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.trunk[0].x - bx, ch.trunk[0].y - by);
        for (let j = 1; j < ch.trunk.length; j++) {
          ctx.lineTo(ch.trunk[j].x - bx, ch.trunk[j].y - by);
        }
        ctx.stroke();
      }
      // Eyes
      drawEyes(0, hy, 0, 0, muted, ch.blinkDur > 0);
      // Tusks (small)
      if (!muted) {
        ctx.fillStyle = "oklch(0.92 0.04 90)";
        ctx.beginPath();
        ctx.moveTo(-5, hy + 4); ctx.lineTo(-7, hy + 8); ctx.lineTo(-4, hy + 6);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(5, hy + 4); ctx.lineTo(7, hy + 8); ctx.lineTo(4, hy + 6);
        ctx.fill();
      }

      if (muted) drawZzz(0, hy - 12, t);
      ctx.restore();
    }

    function drawQuetzal(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Iridescent body color shifts
      const shift = Math.sin(t * 1.5) * 30;
      const bodyColor = muted ? "oklch(0.36 0.06 145)" : "oklch(0.55 0.18 " + (140 + shift) + ")";

      // Tail plume verlet (8 points, ~50px) — drawn first behind body
      if (ch.tail.length) {
        ctx.strokeStyle = bodyColor;
        ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
        // Feather barbs (perpendicular strokes along chain)
        if (!muted) {
          ctx.strokeStyle = "oklch(0.65 0.20 " + (130 + shift) + ")";
          ctx.lineWidth = 1.4;
          for (let j = 1; j < ch.tail.length; j++) {
            const a = ch.tail[j-1], b = ch.tail[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const nx = -dy / len, ny = dx / len;
            const barbLen = 4 + j * 1.2;
            ctx.beginPath();
            ctx.moveTo(b.x - bx + nx * barbLen, b.y - by + ny * barbLen);
            ctx.lineTo(b.x - bx - nx * barbLen, b.y - by - ny * barbLen);
            ctx.stroke();
          }
        }
      }

      // Body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.ellipse(0, 0, 8 * sq, 10 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Red belly
      ctx.fillStyle = muted ? "oklch(0.45 0.06 25)" : "oklch(0.60 0.20 25)";
      ctx.beginPath(); ctx.ellipse(0, 4, 4.5, 5, 0, 0, Math.PI * 2); ctx.fill();
      // Wing
      ctx.fillStyle = muted ? "oklch(0.30 0.06 145)" : "oklch(0.45 0.16 " + (135 + shift) + ")";
      ctx.beginPath();
      ctx.ellipse(-2, 0, 6, 4, 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Branch
      ctx.strokeStyle = "oklch(0.35 0.08 60)"; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-13, 12); ctx.lineTo(13, 13);
      ctx.stroke();
      // Legs
      ctx.strokeStyle = "oklch(0.55 0.10 35)"; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(-2, 7); ctx.lineTo(-2, 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, 7); ctx.lineTo(2, 12); ctx.stroke();

      // Head
      const hy = -10 + ch.headBob;
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(0, hy, 5.5, 0, Math.PI * 2); ctx.fill();
      // 3 crest feathers
      if (!muted) {
        ctx.strokeStyle = "oklch(0.72 0.20 " + (140 + shift) + ")";
        ctx.lineWidth = 1.6; ctx.lineCap = "round";
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(-1 + i * 1, hy - 3);
          ctx.lineTo(-2 + i * 1.5, hy - 7 - i * 1.5);
          ctx.stroke();
        }
      }
      // Beak
      const beakOpen = ch.energyPulse * 1.2;
      ctx.fillStyle = "oklch(0.62 0.20 25)";
      ctx.beginPath();
      ctx.moveTo(4, hy - 1); ctx.lineTo(9, hy + 1 - beakOpen * 0.4);
      ctx.lineTo(4, hy + 2 + beakOpen * 0.4);
      ctx.fill();
      // Eye
      drawEyes(0, hy - 1, 0, 0, muted, ch.blinkDur > 0);

      // Sound wave arcs (emit on hit)
      ch.custom.waves.forEach(w => {
        ctx.strokeStyle = "oklch(0.85 0.20 80 / " + w.alpha.toFixed(3) + ")";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(8, hy + 1, w.r, -0.6, 0.6);
        ctx.stroke();
      });

      if (muted) drawZzz(0, hy - 12, t);
      ctx.restore();
    }

    function drawCharacter(ch, t, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      const a = ch.def.animal;
      if (a === "gorilla") drawGorilla(ch, t);
      else if (a === "capuchin") drawCapuchin(ch, t);
      else if (a === "frog") drawFrog(ch, t);
      else if (a === "chameleon") drawChameleon(ch, t);
      else if (a === "spiderMonkey") drawSpiderMonkey(ch, t);
      else if (a === "toucan") drawToucan(ch, t);
      else if (a === "elephant") drawElephant(ch, t);
      else if (a === "quetzal") drawQuetzal(ch, t);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // ─── Hit reactions ───
    function applyHit(idx, step) {
      const ch = chars[idx];
      // Consecutive hits buildup
      if (ch.lastHitStep >= 0 && (step - ch.lastHitStep + 16) % 16 <= 2) ch.consecutiveHits++;
      else ch.consecutiveHits = 1;
      ch.lastHitStep = step;
      const buildup = 1 + Math.min(0.6, (ch.consecutiveHits - 1) * 0.15);
      const energyMul = 0.7 + trackEnergy[idx] * 0.6;
      const k = buildup * energyMul;
      ch.energyPulse = Math.min(1, ch.energyPulse + 0.4 * k);
      spotlightFlash[idx] = Math.min(1, spotlightFlash[idx] + 0.7);

      const trackColor = TRACK_COLORS_RAW[idx];
      const cx = ch.x, cy = ch.y;

      if (idx === 0) {
        // Gorilla kick
        addTrauma(0.32 * k);
        ch.custom.fistVel += 22 * k;
        ch.bodyOffYVel += 5 * k;
        ch.bodySquashVel -= 3;
        spawn(cx, cy + 16, 6, "oklch(0.50 0.08 55)", "dust", { spread: 4.5, lift: 2.5, life: 0.6, sizeRange: 2.5 });
        // Floor shake to all
        chars.forEach((c, i) => { if (i !== 0) c.floorShake = -1.2 * k; });
      } else if (idx === 1) {
        // Capuchin snare
        addTrauma(0.12 * k);
        ch.armSwingVel += 14 * k;
        ch.armSide = (ch.armSide + 1) % 2;
        ch.headBobVel -= 2;
        spawn(cx, cy - 14, 4, trackColor, "spark", { spread: 3, lift: 3, life: 0.35 });
      } else if (idx === 2) {
        // Frog hat
        ch.bodyOffYVel += 5.5 * k;
        ch.custom.throat = 1;
        spawn(cx, cy - 8, 2, "oklch(0.85 0.05 230)", "spark", { spread: 2, lift: 2.5, life: 0.3 });
      } else if (idx === 3) {
        // Chameleon o-hat (tongue)
        ch.custom.tongueT = 1;
        ch.custom.hueShift = 1;
        spawn(cx + 12, cy - 4, 3, trackColor, "spark", { spread: 2, lift: 2, life: 0.4 });
      } else if (idx === 4) {
        // Spider monkey bongo
        addTrauma(0.08 * k);
        ch.armSwingVel += 16 * k;
        ch.armSide = (ch.armSide + 1) % 2;
        ch.bodyOffYVel += 2.5;
        spawn(cx, cy + 8, 3, trackColor, "spark", { spread: 3, lift: 2, life: 0.4 });
      } else if (idx === 5) {
        // Toucan shaker
        ch.custom.shimmy = 1;
        ch.headBobVel -= 1.5;
        spawn(cx + 10, cy + 12, 2, trackColor, "banana", { spread: 2.5, lift: 2, life: 0.5, sizeRange: 1 });
      } else if (idx === 6) {
        // Elephant bass
        addTrauma(0.18 * k);
        ch.bodyOffYVel += 3.5 * k;
        ch.bodySquashVel -= 6;
        spawn(cx - 8, cy + 18, 4, "oklch(0.50 0.08 55)", "dust", { spread: 4, lift: 2, life: 0.7, sizeRange: 3 });
        // Neighbors get low-freq wobble
        [5, 7].forEach(n => { chars[n].bodyOffYVel += 1.4; });
      } else if (idx === 7) {
        // Quetzal lead
        ch.custom.waves.push({ r: 4, alpha: 0.85 });
        ch.headBobVel -= 4 * k;
        spawn(cx + 8, cy - 12, 3, trackColor, "spark", { spread: 2, lift: 3, life: 0.5 });
      }
    }

    function applyAccent() {
      // Synchronized mini-jump
      chars.forEach(c => {
        if (!trackMute[c.idx]) c.bodyOffYVel += 4.5;
      });
      flashAlpha = Math.max(flashAlpha, 0.18);
    }

    function applyLoopWrap() { flashAlpha = Math.max(flashAlpha, 0.25); }

    // ─── Bus listeners ───
    bus.on("trackHit", (d) => { applyHit(d.track, d.step); });
    bus.on("accent", applyAccent);
    bus.on("loopWrap", applyLoopWrap);
    bus.on("step", (d) => { beatPhase = d.step / STEPS; });
