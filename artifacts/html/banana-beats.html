      ctx.strokeStyle = "oklch(0.45 0.05 70)"; ctx.lineWidth = 0.5;
      for (let i = 0; i < 5; i++) {
        const sx = -10 + i * 5;
        ctx.beginPath(); ctx.moveTo(sx, 9); ctx.lineTo(sx + 1, 14); ctx.stroke();
      }

      // Tail (verlet, drawn before body)
      if (ch.tail.length) {
        ctx.strokeStyle = muted ? "oklch(0.28 0.06 65)" : "oklch(0.42 0.10 65)";
        ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
      }

      // Body
      ctx.fillStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.beginPath(); ctx.ellipse(0, -1, 8 * sq, 11 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Belly
      ctx.fillStyle = muted ? "oklch(0.55 0.04 70)" : "oklch(0.78 0.08 75)";
      ctx.beginPath(); ctx.ellipse(0, 1, 4.5, 7, 0, 0, Math.PI * 2); ctx.fill();

      // Arms holding sticks (alternating L/R)
      const swing = ch.armSwing;
      const lDown = ch.armSide === 0 ? swing : 0;
      const rDown = ch.armSide === 1 ? swing : 0;
      ctx.strokeStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.lineWidth = 2; ctx.lineCap = "round";
      // Left arm + stick
      ctx.beginPath();
      ctx.moveTo(-5, -2); ctx.lineTo(-7 - lDown * 0.5, 2 + lDown);
      ctx.stroke();
      ctx.strokeStyle = "oklch(0.55 0.06 60)"; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-7 - lDown * 0.5, 2 + lDown); ctx.lineTo(-3, 7 + lDown * 0.7);
      ctx.stroke();
      ctx.fillStyle = "oklch(0.85 0.05 80)";
      ctx.beginPath(); ctx.arc(-3, 7 + lDown * 0.7, 1.2, 0, Math.PI * 2); ctx.fill();
      // Right arm + stick
      ctx.strokeStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(5, -2); ctx.lineTo(7 + rDown * 0.5, 2 + rDown);
      ctx.stroke();
      ctx.strokeStyle = "oklch(0.55 0.06 60)"; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(7 + rDown * 0.5, 2 + rDown); ctx.lineTo(3, 7 + rDown * 0.7);
      ctx.stroke();
      ctx.fillStyle = "oklch(0.85 0.05 80)";
      ctx.beginPath(); ctx.arc(3, 7 + rDown * 0.7, 1.2, 0, Math.PI * 2); ctx.fill();

      // Head
      const hy = -12 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.beginPath(); ctx.arc(0, hy, 8, 0, Math.PI * 2); ctx.fill();
      // Face
      ctx.fillStyle = muted ? "oklch(0.62 0.04 75)" : "oklch(0.85 0.08 75)";
      ctx.beginPath(); ctx.ellipse(0, hy + 1, 5.5, 6, 0, 0, Math.PI * 2); ctx.fill();
      // Ears
      ctx.fillStyle = muted ? "oklch(0.32 0.05 65)" : "oklch(0.45 0.10 65)";
      ctx.beginPath(); ctx.arc(-7.5, hy - 2, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7.5, hy - 2, 2.2, 0, Math.PI * 2); ctx.fill();
      // Eyes (big)
      drawEyes(0, hy + 0.5, 0, 0, muted, ch.blinkDur > 0);
      // Mouth
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.arc(0, hy + 4, 1.4, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (muted) drawZzz(0, hy - 11, t);
      ctx.restore();
    }

    function drawFrog(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Hi-hat cymbals (frog perches on)
      ctx.fillStyle = "oklch(0.65 0.10 80)";
      ctx.beginPath(); ctx.ellipse(0, 14, 13, 2.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "oklch(0.40 0.06 60)"; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(0, 14); ctx.lineTo(0, 22); ctx.stroke();
      ctx.fillStyle = "oklch(0.55 0.08 75)";
      ctx.beginPath(); ctx.ellipse(0, 16, 13, 2, 0, 0, Math.PI * 2); ctx.fill();

      // Body (dome)
      ctx.fillStyle = muted ? "oklch(0.30 0.06 145)" : "oklch(0.55 0.18 140)";
      ctx.beginPath(); ctx.ellipse(0, 4, 11 * sq, 8 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Belly (cream)
      ctx.fillStyle = muted ? "oklch(0.55 0.04 95)" : "oklch(0.85 0.10 95)";
      ctx.beginPath(); ctx.ellipse(0, 7, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
      // Spots
      if (!muted) {
        ctx.fillStyle = "oklch(0.35 0.10 145)";
        ch.custom.spots.forEach(s => {
          const sx = Math.cos(s.ang) * 8 * s.r;
          const sy = 2 + Math.sin(s.ang) * 5 * s.r;
          ctx.beginPath();
          ctx.arc(sx, sy, s.sz, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      // Throat pouch (pulses)
      const throatScale = 1 + ch.custom.throat * 0.6;
      ctx.fillStyle = muted ? "oklch(0.50 0.04 95)" : "oklch(0.78 0.14 95)";
      ctx.beginPath();
      ctx.ellipse(0, 9, 4 * throatScale, 2.5 * throatScale, 0, 0, Math.PI * 2);
      ctx.fill();
      // Legs (folded)
      ctx.strokeStyle = muted ? "oklch(0.30 0.06 145)" : "oklch(0.50 0.16 142)";
      ctx.lineWidth = 1.6; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-9, 5); ctx.lineTo(-12, 9); ctx.lineTo(-7, 11); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(9, 5); ctx.lineTo(12, 9); ctx.lineTo(7, 11); ctx.stroke();

      // Eyes (bulging)
      const eyeSize = 3.5 + ch.energyPulse * 1.2;
      ctx.fillStyle = muted ? "oklch(0.42 0.06 145)" : "oklch(0.68 0.16 142)";
      ctx.beginPath(); ctx.arc(-5, -3, eyeSize, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, -3, eyeSize, 0, Math.PI * 2); ctx.fill();
      if (!muted && ch.blinkDur <= 0) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-5, -3, eyeSize * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -3, eyeSize * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-5, -3, eyeSize * 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -3, eyeSize * 0.3, 0, Math.PI * 2); ctx.fill();
      } else {
        // Blink/asleep — membrane covers
        ctx.strokeStyle = "#000"; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(-5, -3, eyeSize, 0.1, Math.PI - 0.1);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(5, -3, eyeSize, 0.1, Math.PI - 0.1);
        ctx.stroke();
      }
      // Mouth
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(-3, 1); ctx.quadraticCurveTo(0, 2 + ch.energyPulse, 3, 1);
      ctx.stroke();

      if (muted) drawZzz(0, -10, t);
      ctx.restore();
    }

    function drawChameleon(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Open hi-hat / cymbal stand
      ctx.strokeStyle = "oklch(0.40 0.05 65)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(13, 12); ctx.lineTo(13, 22); ctx.stroke();
      ctx.fillStyle = "oklch(0.65 0.10 80)";
      ctx.beginPath(); ctx.ellipse(13, 11, 8, 1.5, 0, 0, Math.PI * 2); ctx.fill();

      // Tail (curled spiral)
      if (ch.tail.length) {
        const hueShift = ch.def.hue + ch.custom.hueShift * 30;
        ctx.strokeStyle = muted ? "oklch(0.32 0.05 185)" : "oklch(0.55 0.14 " + hueShift + ")";
        ctx.lineWidth = 2.4; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
      }

      // Body
      const hueShift = ch.def.hue + ch.custom.hueShift * 30;
      ctx.fillStyle = muted ? "oklch(0.36 0.06 185)" : "oklch(0.58 0.16 " + hueShift + ")";
      ctx.beginPath();
      ctx.ellipse(-2, 2, 11 * sq, 7 / sq, 0, 0, Math.PI * 2);
      ctx.fill();
      // Stripes
      if (!muted) {
        ctx.strokeStyle = "oklch(0.42 0.10 " + hueShift + ")";
        ctx.lineWidth = 0.8;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(-9 + i * 4, -3); ctx.lineTo(-8 + i * 4, 6);
          ctx.stroke();
        }
      }
      // Legs
      ctx.strokeStyle = muted ? "oklch(0.30 0.05 185)" : "oklch(0.45 0.14 " + hueShift + ")";
      ctx.lineWidth = 1.6; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-7, 5); ctx.lineTo(-9, 9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5, 5); ctx.lineTo(7, 9); ctx.stroke();
      // Head with helmet casque
      const hy = -2 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.36 0.06 185)" : "oklch(0.58 0.16 " + hueShift + ")";
      ctx.beginPath();
      ctx.moveTo(-8, hy);
      ctx.bezierCurveTo(-12, hy - 4, -9, hy - 8, -3, hy - 5);
      ctx.bezierCurveTo(2, hy - 7, 6, hy - 3, 6, hy);
      ctx.lineTo(-8, hy);
      ctx.fill();
      // Turret eyes (independently-tracking)
      const elx = Math.sin(t * 1.7) * 1.5;
      const erx = Math.cos(t * 1.3) * 1.5;
      ctx.fillStyle = muted ? "oklch(0.30 0.04 185)" : "oklch(0.40 0.10 " + hueShift + ")";
      ctx.beginPath(); ctx.arc(-5, hy - 1, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(2, hy - 2, 2.5, 0, Math.PI * 2); ctx.fill();
      if (!muted && ch.blinkDur <= 0) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-5 + elx * 0.5, hy - 1, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(2 + erx * 0.5, hy - 2, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-5 + elx, hy - 1, 0.7, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(2 + erx, hy - 2, 0.7, 0, Math.PI * 2); ctx.fill();
      }
      // Tongue (extends to cymbal on hit)
      if (ch.custom.tongueT > 0.03) {
        const tEnd = 13;
        const tProgress = ch.custom.tongueT;
        const startX = 5, startY = hy + 1;
        ctx.strokeStyle = "oklch(0.65 0.20 25)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(
          startX + (tEnd - startX) * 0.5 * tProgress, startY,
          tEnd - 2, 8 + 2 * (1 - tProgress),
          tEnd - 1 + tProgress * 1, 11
        );
        ctx.stroke();
        // Tongue tip
        ctx.fillStyle = "oklch(0.78 0.20 25)";
        ctx.beginPath();
        ctx.arc(tEnd - 1 + tProgress, 11, 1.4, 0, Math.PI * 2);
        ctx.fill();
      }

      if (muted) drawZzz(-2, hy - 10, t);
      ctx.restore();
    }

    function drawSpiderMonkey(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Bongos (between knees)
      ctx.fillStyle = "oklch(0.36 0.08 50)";
      ctx.beginPath(); ctx.ellipse(-6, 13, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, 13, 4, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "oklch(0.78 0.06 75)";
      ctx.beginPath(); ctx.ellipse(-6, 11, 5, 2.2, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, 11, 4, 1.8, 0, 0, Math.PI * 2); ctx.fill();
      // Bongo lacing
      ctx.strokeStyle = "oklch(0.40 0.06 60)"; ctx.lineWidth = 0.5;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(-6 + Math.cos(a) * 5, 11 + Math.sin(a) * 1.6);
        ctx.lineTo(-6 + Math.cos(a) * 5.4, 14 + Math.sin(a) * 1.6);
        ctx.stroke();
      }

      // Tail (long verlet — most expressive)
      if (ch.tail.length) {
        ctx.strokeStyle = muted ? "oklch(0.28 0.06 305)" : "oklch(0.40 0.16 305)";
        ctx.lineWidth = 2.8; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
      }

      // Body
      ctx.fillStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.beginPath(); ctx.ellipse(0, -1, 9 * sq, 12 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Fur tufts
      if (!muted) {
        ctx.strokeStyle = "oklch(0.32 0.10 305)";
        ctx.lineWidth = 0.8;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(-7 + i * 6, -8);
          ctx.lineTo(-6 + i * 6 + Math.sin(t * 2 + i) * 0.5, -11);
          ctx.stroke();
        }
      }

      // Legs (crossed)
      ctx.strokeStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.lineWidth = 2.2; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-4, 6); ctx.bezierCurveTo(-6, 10, 4, 12, 6, 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4, 6); ctx.bezierCurveTo(6, 10, -4, 12, -6, 16); ctx.stroke();

      // Long arms (4-segment bezier each, alternating slap)
      const swing = ch.armSwing;
      const lDown = ch.armSide === 0 ? swing : 0;
      const rDown = ch.armSide === 1 ? swing : 0;
      ctx.strokeStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(-7, -3);
      ctx.bezierCurveTo(-12, 0, -10, 6 + lDown, -7, 11 + lDown);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(7, -3);
      ctx.bezierCurveTo(12, 0, 10, 6 + rDown, 7, 11 + rDown);
      ctx.stroke();
      // Palms (open)
      ctx.fillStyle = muted ? "oklch(0.42 0.04 305)" : "oklch(0.55 0.10 305)";
      ctx.beginPath(); ctx.arc(-7, 11 + lDown, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7, 11 + rDown, 2.2, 0, Math.PI * 2); ctx.fill();

      // Head
      const hy = -13 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.30 0.06 305)" : "oklch(0.42 0.16 305)";
      ctx.beginPath(); ctx.arc(0, hy, 7.5, 0, Math.PI * 2); ctx.fill();
      // Face
      ctx.fillStyle = muted ? "oklch(0.55 0.04 75)" : "oklch(0.78 0.10 75)";
      ctx.beginPath(); ctx.ellipse(0, hy + 1, 5, 5.5, 0, 0, Math.PI * 2); ctx.fill();
      // Eyes
      drawEyes(0, hy, 0, 0, muted, ch.blinkDur > 0);
      // Mouth
      ctx.strokeStyle = "#000"; ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.arc(0, hy + 4, 1.4, 0.2, Math.PI - 0.2);
      ctx.stroke();

      if (muted) drawZzz(0, hy - 10, t);
      ctx.restore();
    }

    function drawToucan(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      const shimmy = ch.custom.shimmy;
      ctx.save();
      ctx.translate(bx + Math.sin(t * 18) * shimmy * 1.5, by);
      ctx.scale(scl, scl);

      // Branch perch
      ctx.strokeStyle = "oklch(0.35 0.08 60)"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-14, 11); ctx.lineTo(14, 13);
      ctx.stroke();

      // Body (compact, black)
      ctx.fillStyle = muted ? "oklch(0.20 0.02 240)" : "oklch(0.18 0.03 240)";
      ctx.beginPath(); ctx.ellipse(0, 0, 8 * sq, 9 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Yellow breast
      ctx.fillStyle = muted ? "oklch(0.55 0.06 90)" : "oklch(0.85 0.18 90)";
      ctx.beginPath(); ctx.ellipse(0, 4, 5, 4, 0, 0, Math.PI * 2); ctx.fill();

      // Legs
      ctx.strokeStyle = "oklch(0.55 0.10 35)"; ctx.lineWidth = 1.3; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-2, 7); ctx.lineTo(-3, 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, 7); ctx.lineTo(3, 12); ctx.stroke();
      // Foot holds maraca
      ctx.fillStyle = muted ? "oklch(0.50 0.05 90)" : "oklch(0.72 0.16 80)";
      ctx.beginPath(); ctx.ellipse(3, 14, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
      // Maraca stick
      ctx.strokeStyle = "oklch(0.42 0.06 60)"; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(3, 13); ctx.lineTo(3 + Math.sin(t * 30) * shimmy * 1, 8);
      ctx.stroke();

      // Wing
      const wingFlap = Math.sin(t * 4) * 1 + ch.energyPulse * 2;
      ctx.fillStyle = muted ? "oklch(0.20 0.02 240)" : "oklch(0.18 0.03 240)";
      ctx.beginPath();
      ctx.ellipse(-3, 1, 5, 3 + wingFlap, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = muted ? "oklch(0.32 0.04 230)" : "oklch(0.45 0.10 230)";
      ctx.beginPath();
      ctx.ellipse(-3, 1, 3, 1.5 + wingFlap * 0.5, 0.3, 0, Math.PI * 2);
      ctx.fill();

      // Head
      const hy = -8 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.20 0.02 240)" : "oklch(0.18 0.03 240)";
      ctx.beginPath(); ctx.arc(0, hy, 5.5, 0, Math.PI * 2); ctx.fill();

      // Giant beak (compound bezier with gradient stops)
      const beakOpen = ch.energyPulse * 1.5;
      const beakGrad = ctx.createLinearGradient(4, hy, 22, hy + 2);
      beakGrad.addColorStop(0, "oklch(0.55 0.18 150)");
      beakGrad.addColorStop(0.4, "oklch(0.78 0.22 95)");
      beakGrad.addColorStop(0.75, "oklch(0.72 0.22 55)");
      beakGrad.addColorStop(1, "oklch(0.62 0.20 25)");
      ctx.fillStyle = muted ? "oklch(0.45 0.08 60)" : beakGrad;
      // Upper beak
      ctx.beginPath();
      ctx.moveTo(4, hy - 1);
      ctx.bezierCurveTo(12, hy - 5, 22, hy - 2, 22, hy + 1 - beakOpen * 0.5);
      ctx.bezierCurveTo(20, hy + 2 - beakOpen * 0.5, 12, hy + 1 - beakOpen * 0.5, 4, hy);
      ctx.fill();
      // Lower beak
      ctx.beginPath();
      ctx.moveTo(4, hy + 1);
      ctx.bezierCurveTo(12, hy + 4 + beakOpen, 20, hy + 2 + beakOpen, 22, hy + 1 + beakOpen * 0.5);
      ctx.lineTo(4, hy + 1);
      ctx.fill();

      // Eye (large)
      if (!muted && ch.blinkDur <= 0) {
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(-1, hy - 1, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-1, hy - 1, 1.1, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.strokeStyle = "#000"; ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(-3, hy - 1); ctx.lineTo(1, hy - 1);
        ctx.stroke();
      }

      if (muted) drawZzz(0, hy - 10, t);
      ctx.restore();
    }

    function drawElephant(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      ctx.fillStyle = "oklch(0.32 0.07 50)";
      ctx.beginPath();
      ctx.ellipse(-12, 22, 14, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "oklch(0.42 0.08 55)";
      ctx.beginPath();
      ctx.ellipse(-12, 19, 14, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Resonance hole
      ctx.fillStyle = "oklch(0.18 0.04 50)";
      ctx.beginPath();
      ctx.arc(-12, 19, 2, 0, Math.PI * 2);
      ctx.fill();
      // Wood rings on top
      ctx.strokeStyle = "oklch(0.22 0.05 50)"; ctx.lineWidth = 0.5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(-12, 19, 12 - i * 3, 3 - i * 0.6, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Body (massive)
      ctx.fillStyle = muted ? "oklch(0.42 0.04 145)" : "oklch(0.55 0.10 145)";
      ctx.beginPath();
      ctx.ellipse(0, -2, 22 * sq, 18 / sq, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wrinkle lines
      if (!muted) {
        ctx.strokeStyle = "oklch(0.40 0.06 145)"; ctx.lineWidth = 0.7;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(-10 + i * 4, 4);
          ctx.bezierCurveTo(-8 + i * 4, 6, -8 + i * 4, 8, -10 + i * 4, 10);
          ctx.stroke();
        }
      }

      // Front legs
      ctx.fillStyle = muted ? "oklch(0.42 0.04 145)" : "oklch(0.55 0.10 145)";
      // Stomp leg (left, animated)
      const stompY = ch.energyPulse > 0.3 ? -ch.energyPulse * 4 : 0;
      ctx.fillRect(-12, 12 + stompY, 6, 9 - stompY);
      ctx.fillRect(4, 13, 6, 8);
      ctx.fillRect(10, 13, 5, 8);

      ctx.fillStyle = muted ? "oklch(0.55 0.04 145)" : "oklch(0.70 0.10 145)";
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(-11 + i * 2, 21 + stompY, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Ears (huge, fan-shaped, spring-driven)
      const earFlap = Math.sin(t * 1.5) * 0.6 + ch.energyPulse * 2;
      ctx.fillStyle = muted ? "oklch(0.40 0.04 145)" : "oklch(0.50 0.10 145)";
      ctx.save();
      ctx.translate(-18, -10);
      ctx.rotate(-0.3 - earFlap * 0.05);
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 12 + earFlap, 0, 0, Math.PI * 2);
      ctx.fill();
      // Ear veins
      if (!muted) {
        ctx.strokeStyle = "oklch(0.38 0.06 145)"; ctx.lineWidth = 0.6;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(0, -8 + i * 5); ctx.bezierCurveTo(-3, -4 + i * 5, -5, 0 + i * 5, -7, 4 + i * 5);
          ctx.stroke();
        }
      }
      ctx.restore();
      ctx.save();
      ctx.translate(18, -10);
      ctx.rotate(0.3 + earFlap * 0.05);
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 12 + earFlap, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Head (dome on body)
      const hy = -8 + ch.headBob;
      ctx.fillStyle = muted ? "oklch(0.45 0.04 145)" : "oklch(0.58 0.10 145)";
      ctx.beginPath();
      ctx.ellipse(0, hy, 11, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      // Trunk (verlet, drawn from base outward)
      if (ch.trunk.length) {
        ctx.strokeStyle = muted ? "oklch(0.45 0.04 145)" : "oklch(0.58 0.10 145)";
        ctx.lineWidth = 4.5; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.trunk[0].x - bx, ch.trunk[0].y - by);
        for (let j = 1; j < ch.trunk.length; j++) {
          ctx.lineTo(ch.trunk[j].x - bx, ch.trunk[j].y - by);
        }
        ctx.stroke();
      }
      // Eyes
      drawEyes(0, hy, 0, 0, muted, ch.blinkDur > 0);
      // Tusks (small)
      if (!muted) {
        ctx.fillStyle = "oklch(0.92 0.04 90)";
        ctx.beginPath();
        ctx.moveTo(-5, hy + 4); ctx.lineTo(-7, hy + 8); ctx.lineTo(-4, hy + 6);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(5, hy + 4); ctx.lineTo(7, hy + 8); ctx.lineTo(4, hy + 6);
        ctx.fill();
      }

      if (muted) drawZzz(0, hy - 12, t);
      ctx.restore();
    }

    function drawQuetzal(ch, t) {
      const bx = ch.x, by = ch.y + ch.bodyOffY + ch.floorShake;
      const sq = ch.bodySquash, scl = ch.scale;
      const muted = trackMute[ch.idx];
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(scl, scl);

      // Iridescent body color shifts
      const shift = Math.sin(t * 1.5) * 30;
      const bodyColor = muted ? "oklch(0.36 0.06 145)" : "oklch(0.55 0.18 " + (140 + shift) + ")";

      // Tail plume verlet (8 points, ~50px) — drawn first behind body
      if (ch.tail.length) {
        ctx.strokeStyle = bodyColor;
        ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(ch.tail[0].x - bx, ch.tail[0].y - by);
        for (let j = 1; j < ch.tail.length; j++) {
          ctx.lineTo(ch.tail[j].x - bx, ch.tail[j].y - by);
        }
        ctx.stroke();
        // Feather barbs (perpendicular strokes along chain)
        if (!muted) {
          ctx.strokeStyle = "oklch(0.65 0.20 " + (130 + shift) + ")";
          ctx.lineWidth = 1.4;
          for (let j = 1; j < ch.tail.length; j++) {
            const a = ch.tail[j-1], b = ch.tail[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const nx = -dy / len, ny = dx / len;
            const barbLen = 4 + j * 1.2;
            ctx.beginPath();
            ctx.moveTo(b.x - bx + nx * barbLen, b.y - by + ny * barbLen);
            ctx.lineTo(b.x - bx - nx * barbLen, b.y - by - ny * barbLen);
            ctx.stroke();
          }
        }
      }

      // Body
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.ellipse(0, 0, 8 * sq, 10 / sq, 0, 0, Math.PI * 2); ctx.fill();
      // Red belly
      ctx.fillStyle = muted ? "oklch(0.45 0.06 25)" : "oklch(0.60 0.20 25)";
      ctx.beginPath(); ctx.ellipse(0, 4, 4.5, 5, 0, 0, Math.PI * 2); ctx.fill();
      // Wing
      ctx.fillStyle = muted ? "oklch(0.30 0.06 145)" : "oklch(0.45 0.16 " + (135 + shift) + ")";
      ctx.beginPath();
      ctx.ellipse(-2, 0, 6, 4, 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Branch
      ctx.strokeStyle = "oklch(0.35 0.08 60)"; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-13, 12); ctx.lineTo(13, 13);
      ctx.stroke();
      // Legs
      ctx.strokeStyle = "oklch(0.55 0.10 35)"; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(-2, 7); ctx.lineTo(-2, 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, 7); ctx.lineTo(2, 12); ctx.stroke();

      // Head
      const hy = -10 + ch.headBob;
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(0, hy, 5.5, 0, Math.PI * 2); ctx.fill();
      // 3 crest feathers
      if (!muted) {
        ctx.strokeStyle = "oklch(0.72 0.20 " + (140 + shift) + ")";
        ctx.lineWidth = 1.6; ctx.lineCap = "round";
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(-1 + i * 1, hy - 3);
          ctx.lineTo(-2 + i * 1.5, hy - 7 - i * 1.5);
          ctx.stroke();
        }
      }
      // Beak
      const beakOpen = ch.energyPulse * 1.2;
      ctx.fillStyle = "oklch(0.62 0.20 25)";
      ctx.beginPath();
      ctx.moveTo(4, hy - 1); ctx.lineTo(9, hy + 1 - beakOpen * 0.4);
      ctx.lineTo(4, hy + 2 + beakOpen * 0.4);
      ctx.fill();
      // Eye
      drawEyes(0, hy - 1, 0, 0, muted, ch.blinkDur > 0);

      // Sound wave arcs (emit on hit)
      ch.custom.waves.forEach(w => {
        ctx.strokeStyle = "oklch(0.85 0.20 80 / " + w.alpha.toFixed(3) + ")";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(8, hy + 1, w.r, -0.6, 0.6);
        ctx.stroke();
      });

      if (muted) drawZzz(0, hy - 12, t);
      ctx.restore();
    }

    function drawCharacter(ch, t, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      const a = ch.def.animal;
      if (a === "gorilla") drawGorilla(ch, t);
      else if (a === "capuchin") drawCapuchin(ch, t);
      else if (a === "frog") drawFrog(ch, t);
      else if (a === "chameleon") drawChameleon(ch, t);
      else if (a === "spiderMonkey") drawSpiderMonkey(ch, t);
      else if (a === "toucan") drawToucan(ch, t);
      else if (a === "elephant") drawElephant(ch, t);
      else if (a === "quetzal") drawQuetzal(ch, t);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // ─── Hit reactions ───
    function applyHit(idx, step) {
      const ch = chars[idx];
      // Consecutive hits buildup
      if (ch.lastHitStep >= 0 && (step - ch.lastHitStep + 16) % 16 <= 2) ch.consecutiveHits++;
      else ch.consecutiveHits = 1;
      ch.lastHitStep = step;
      const buildup = 1 + Math.min(0.6, (ch.consecutiveHits - 1) * 0.15);
      const energyMul = 0.7 + trackEnergy[idx] * 0.6;
      const k = buildup * energyMul;
      ch.energyPulse = Math.min(1, ch.energyPulse + 0.4 * k);
      spotlightFlash[idx] = Math.min(1, spotlightFlash[idx] + 0.7);

      const trackColor = TRACK_COLORS_RAW[idx];
      const cx = ch.x, cy = ch.y;

      if (idx === 0) {
        // Gorilla kick
        addTrauma(0.32 * k);
        ch.custom.fistVel += 22 * k;
        ch.bodyOffYVel += 5 * k;
        ch.bodySquashVel -= 3;
        spawn(cx, cy + 16, 6, "oklch(0.50 0.08 55)", "dust", { spread: 4.5, lift: 2.5, life: 0.6, sizeRange: 2.5 });
        // Floor shake to all
        chars.forEach((c, i) => { if (i !== 0) c.floorShake = -1.2 * k; });
      } else if (idx === 1) {
        // Capuchin snare
        addTrauma(0.12 * k);
        ch.armSwingVel += 14 * k;
        ch.armSide = (ch.armSide + 1) % 2;
        ch.headBobVel -= 2;
        spawn(cx, cy - 14, 4, trackColor, "spark", { spread: 3, lift: 3, life: 0.35 });
      } else if (idx === 2) {
        // Frog hat
        ch.bodyOffYVel += 5.5 * k;
        ch.custom.throat = 1;
        spawn(cx, cy - 8, 2, "oklch(0.85 0.05 230)", "spark", { spread: 2, lift: 2.5, life: 0.3 });
      } else if (idx === 3) {
        // Chameleon o-hat (tongue)
        ch.custom.tongueT = 1;
        ch.custom.hueShift = 1;
        spawn(cx + 12, cy - 4, 3, trackColor, "spark", { spread: 2, lift: 2, life: 0.4 });
      } else if (idx === 4) {
        // Spider monkey bongo
        addTrauma(0.08 * k);
        ch.armSwingVel += 16 * k;
        ch.armSide = (ch.armSide + 1) % 2;
        ch.bodyOffYVel += 2.5;
        spawn(cx, cy + 8, 3, trackColor, "spark", { spread: 3, lift: 2, life: 0.4 });
      } else if (idx === 5) {
        // Toucan shaker
        ch.custom.shimmy = 1;
        ch.headBobVel -= 1.5;
        spawn(cx + 10, cy + 12, 2, trackColor, "banana", { spread: 2.5, lift: 2, life: 0.5, sizeRange: 1 });
      } else if (idx === 6) {
        // Elephant bass
        addTrauma(0.18 * k);
        ch.bodyOffYVel += 3.5 * k;
        ch.bodySquashVel -= 6;
        spawn(cx - 8, cy + 18, 4, "oklch(0.50 0.08 55)", "dust", { spread: 4, lift: 2, life: 0.7, sizeRange: 3 });
        // Neighbors get low-freq wobble
        [5, 7].forEach(n => { chars[n].bodyOffYVel += 1.4; });
      } else if (idx === 7) {
        // Quetzal lead
        ch.custom.waves.push({ r: 4, alpha: 0.85 });
        ch.headBobVel -= 4 * k;
        spawn(cx + 8, cy - 12, 3, trackColor, "spark", { spread: 2, lift: 3, life: 0.5 });
      }
    }

    function applyAccent() {
      // Synchronized mini-jump
      chars.forEach(c => {
        if (!trackMute[c.idx]) c.bodyOffYVel += 4.5;
      });
      flashAlpha = Math.max(flashAlpha, 0.18);
    }

    function applyLoopWrap() { flashAlpha = Math.max(flashAlpha, 0.25); }

    // ─── Bus listeners (tracked for cleanup in destroy()) ───
    const busSubs = [];
    function busOn(evt, fn) { bus.on(evt, fn); busSubs.push([evt, fn]); }
    function busOffAll() { busSubs.forEach(([e, f]) => bus.off(e, f)); busSubs.length = 0; }
    const _trackHit = (d) => { applyHit(d.track, d.step); };
    const _stepBP = (d) => { beatPhase = d.step / STEPS; };
    busOn("trackHit", _trackHit);
    busOn("accent", applyAccent);
    busOn("loopWrap", applyLoopWrap);
    busOn("step", _stepBP);

    // ─── v4: World Engine — phase machine, enemies, projectiles, biome BG ───
    const BIOME_NAMES = ["jungle", "cave", "temple", "volcano"];
    const PHASE_NAMES = ["travel", "encounter", "battle", "battle", "battle", "climax", "boss", "victory"];
    function createWorldEngine() {
      let loopBar = 0;
      let phaseTime = 0;
      let prevBiome = 0;
      let travelT = 0;
      const enemies = [];     // populated in phase 12
      const projectiles = []; // populated in phase 13
      const critters = [];    // pool of active critters
      const weatherParticles = []; // weather effects
      let lastInputAt = performance.now();
      let sleepProgress = 0;  // 0..1 sleep cascade
      let dayNightPhase = 0;  // 0..1 day-night cycle (slow)

      // ─── Phase 10: critter species (procedural draws, 9 total) ───
      const CRITTER_SPECIES = {
        // Universal (any biome)
        butterfly: {
          biomes: [0, 1, 2, 3], speed: 35, amp: 14, ySpan: [60, 200],
          draw: (ctx, t, x, y, age) => {
            const flap = Math.sin(t * 14 + age * 3) * 0.6 + 0.4;
            const hue = 320 + Math.sin(age) * 30;
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = `oklch(0.72 0.20 ${hue})`;
            // wings
            ctx.beginPath(); ctx.ellipse(-3, -1, 3.5, 5 * flap, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(3, -1, 3.5, 5 * flap, 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = `oklch(0.55 0.22 ${hue + 20})`;
            ctx.beginPath(); ctx.ellipse(-3, 2, 2.5, 3 * flap, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(3, 2, 2.5, 3 * flap, 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "oklch(0.18 0.04 60)";
            ctx.fillRect(-0.6, -3, 1.2, 6);
            // antennae
            ctx.strokeStyle = "oklch(0.18 0.04 60)"; ctx.lineWidth = 0.6;
            ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(-2, -6); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(2, -6); ctx.stroke();
            ctx.restore();
          },
        },
        dragonfly: {
          biomes: [0, 1], speed: 60, amp: 8, ySpan: [80, 180],
          draw: (ctx, t, x, y, age) => {
            const flap = Math.sin(t * 30) * 0.5 + 0.5;
            ctx.save(); ctx.translate(x, y);
            // 4 long thin wings
            ctx.fillStyle = "oklch(0.85 0.04 200 / 0.55)";
            ctx.beginPath(); ctx.ellipse(-1, -2, 7, 1.6 * flap, -0.4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse( 1, -2, 7, 1.6 * flap, 0.4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(-1,  1, 6, 1.4 * flap, -0.4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse( 1,  1, 6, 1.4 * flap, 0.4, 0, Math.PI * 2); ctx.fill();
            // body
            ctx.fillStyle = "oklch(0.55 0.18 165)";
            ctx.fillRect(-0.7, -4, 1.4, 9);
            ctx.fillStyle = "oklch(0.42 0.16 165)";
            for (let i = 0; i < 3; i++) ctx.fillRect(-0.7, -3 + i * 3, 1.4, 1);
            // eye
            ctx.fillStyle = "oklch(0.30 0.06 60)";
            ctx.beginPath(); ctx.arc(0, -4.5, 1.2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          },
        },
        firefly: {
          biomes: [0, 1, 2, 3], speed: 25, amp: 22, ySpan: [50, 200],
          draw: (ctx, t, x, y, age) => {
            const pulse = (Math.sin(t * 4 + age * 7) * 0.5 + 0.5) * 0.9 + 0.1;
            ctx.save(); ctx.translate(x, y);
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
            grad.addColorStop(0, `oklch(0.95 0.20 95 / ${pulse})`);
            grad.addColorStop(0.4, `oklch(0.85 0.20 80 / ${pulse * 0.5})`);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = `oklch(0.95 0.18 95 / ${pulse})`;
            ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          },
        },
        // Cave-only (biome 1)
        glowMoth: {
          biomes: [1], speed: 28, amp: 18, ySpan: [70, 190],
          draw: (ctx, t, x, y, age) => {
            const flap = Math.sin(t * 12) * 0.5 + 0.5;
            ctx.save(); ctx.translate(x, y);
            // glowing aura
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 12);
            grad.addColorStop(0, "oklch(0.78 0.18 200 / 0.45)");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
            // wings
            ctx.fillStyle = "oklch(0.42 0.10 260)";
            ctx.beginPath(); ctx.ellipse(-3, 0, 4, 5 * flap, -0.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse( 3, 0, 4, 5 * flap, 0.2, 0, Math.PI * 2); ctx.fill();
            // glowing body
            ctx.fillStyle = "oklch(0.85 0.18 200)";
            ctx.fillRect(-0.7, -3, 1.4, 6);
            ctx.restore();
          },
        },
        bat: {
          biomes: [1], speed: 70, amp: 28, ySpan: [50, 150],
          draw: (ctx, t, x, y, age) => {
            const flap = Math.sin(t * 8) * 0.6 + 0.4;
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = "oklch(0.20 0.04 280)";
            // body
            ctx.beginPath(); ctx.ellipse(0, 0, 2.5, 4, 0, 0, Math.PI * 2); ctx.fill();
            // wings (membrane)
            ctx.beginPath();
            ctx.moveTo(-2, -1);
            ctx.bezierCurveTo(-7, -3 - flap * 2, -10, 0, -8, 4 + flap * 2);
            ctx.bezierCurveTo(-5, 2, -3, 1, -2, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(2, -1);
            ctx.bezierCurveTo(7, -3 - flap * 2, 10, 0, 8, 4 + flap * 2);
            ctx.bezierCurveTo(5, 2, 3, 1, 2, 0);
            ctx.fill();
            // eyes
            ctx.fillStyle = "oklch(0.62 0.20 25)";
            ctx.beginPath(); ctx.arc(-0.8, -2, 0.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(0.8, -2, 0.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          },
        },
        // Temple-only (biome 2)
        scarab: {
          biomes: [2], speed: 45, amp: 6, ySpan: [180, 220],
          draw: (ctx, t, x, y, age) => {
            const flap = Math.sin(t * 18) * 0.5 + 0.5;
            ctx.save(); ctx.translate(x, y);
            // shell
            ctx.fillStyle = "oklch(0.45 0.18 145)";
            ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 4.5, 0, 0, Math.PI * 2); ctx.fill();
            // shell sheen
            ctx.fillStyle = "oklch(0.65 0.20 140)";
            ctx.beginPath(); ctx.ellipse(-0.8, -1, 1.2, 1.6, 0, 0, Math.PI * 2); ctx.fill();
            // wings (translucent)
            ctx.fillStyle = "oklch(0.85 0.10 95 / 0.35)";
            ctx.beginPath(); ctx.ellipse(-2, 0, 3, 4 * flap, -0.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse( 2, 0, 3, 4 * flap, 0.2, 0, Math.PI * 2); ctx.fill();
            // legs
            ctx.strokeStyle = "oklch(0.20 0.05 80)"; ctx.lineWidth = 0.6;
            for (let i = -1; i <= 1; i++) {
              ctx.beginPath(); ctx.moveTo(-1.5, i * 1.5); ctx.lineTo(-3.5, i * 1.5 + 1); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(1.5, i * 1.5); ctx.lineTo(3.5, i * 1.5 + 1); ctx.stroke();
            }
            ctx.restore();
          },
        },
        sigilOrb: {
          biomes: [2], speed: 18, amp: 10, ySpan: [80, 180],
          draw: (ctx, t, x, y, age) => {
            const pulse = Math.sin(t * 1.5 + age * 3) * 0.3 + 0.7;
            ctx.save(); ctx.translate(x, y); ctx.rotate(t * 0.4 + age);
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 6);
            grad.addColorStop(0, `oklch(0.85 0.18 60 / ${pulse})`);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
            // sigil triangle
            ctx.strokeStyle = `oklch(0.95 0.20 80 / ${pulse})`; ctx.lineWidth = 0.8;
            ctx.beginPath();
            for (let i = 0; i < 3; i++) {
              const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
              const px = Math.cos(a) * 3, py = Math.sin(a) * 3;
              if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath(); ctx.stroke();
            ctx.restore();
          },
        },
        // Volcano-only (biome 3)
        ember: {
          biomes: [3], speed: 12, amp: 4, ySpan: [60, 220],
          draw: (ctx, t, x, y, age) => {
            const flicker = Math.sin(t * 18 + age * 5) * 0.4 + 0.6;
            ctx.save(); ctx.translate(x, y);
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 6);
            grad.addColorStop(0, `oklch(0.95 0.22 60 / ${flicker})`);
            grad.addColorStop(0.5, `oklch(0.70 0.22 35 / ${flicker * 0.5})`);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = `oklch(0.98 0.20 80 / ${flicker})`;
            ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          },
        },
        ashFlake: {
          biomes: [3], speed: 8, amp: 18, ySpan: [40, 220],
          draw: (ctx, t, x, y, age) => {
            ctx.save(); ctx.translate(x, y); ctx.rotate(age * 0.7 + t * 0.5);
            ctx.fillStyle = "oklch(0.32 0.04 60 / 0.55)";
            for (let i = 0; i < 6; i++) {
              ctx.save(); ctx.rotate((i / 6) * Math.PI * 2);
              ctx.fillRect(-0.4, -2, 0.8, 2);
              ctx.restore();
            }
            ctx.fillStyle = "oklch(0.45 0.06 60 / 0.65)";
            ctx.beginPath(); ctx.arc(0, 0, 0.7, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          },
        },
      };

      function spawnCritter() {
        const biome = getBiomeIdx();
        const eligible = Object.entries(CRITTER_SPECIES).filter(([k, s]) => s.biomes.includes(biome));
        if (!eligible.length) return;
        const [name, spec] = eligible[Math.floor(Math.random() * eligible.length)];
        const dir = Math.random() < 0.5 ? 1 : -1;
        const yBase = spec.ySpan[0] + Math.random() * (spec.ySpan[1] - spec.ySpan[0]);
        critters.push({
          name, spec, dir,
          x: dir > 0 ? -20 : W + 20,
          yBase,
          ySeed: Math.random() * 1000,
          age: 0,
          ttl: 25 + Math.random() * 10,
        });
      }

      // Maintain ~3 critters constant
      let critterTimer = 0.8;

      // ─── Phase 10: weather (per biome) ───
      function spawnWeather() {
        const biome = getBiomeIdx();
        if (biome === 0) {
          // Jungle leaves — tick falls slow, drift sideways
          weatherParticles.push({
            kind: "leaf", x: Math.random() * W, y: -10,
            vx: (Math.random() - 0.5) * 8, vy: 5 + Math.random() * 6,
            rot: Math.random() * 6.28, rotV: (Math.random() - 0.5) * 0.04,
            size: 2 + Math.random() * 2, life: 12, hue: 130 + Math.random() * 30,
          });
        } else if (biome === 1) {
          // Cave motes — slow upward drift
          weatherParticles.push({
            kind: "mote", x: Math.random() * W, y: H + 4,
            vx: (Math.random() - 0.5) * 4, vy: -(2 + Math.random() * 3),
            rot: 0, rotV: 0,
            size: 0.8 + Math.random() * 1.2, life: 12, hue: 200 + Math.random() * 30,
          });
        } else if (biome === 2) {
          // Temple sand-grains — diagonal drift
          weatherParticles.push({
            kind: "grain", x: -4, y: Math.random() * H * 0.7,
            vx: 14 + Math.random() * 6, vy: 4 + Math.random() * 3,
            rot: Math.random() * 6.28, rotV: 0.02,
            size: 1 + Math.random() * 0.8, life: 10, hue: 70 + Math.random() * 20,
          });
        } else {
          // Volcano ember sparks — rise + flicker
          weatherParticles.push({
            kind: "spark", x: Math.random() * W, y: H + 6,
            vx: (Math.random() - 0.5) * 14, vy: -(20 + Math.random() * 16),
            rot: 0, rotV: 0,
            size: 1.2 + Math.random() * 1.0, life: 4, hue: 30 + Math.random() * 25,
          });
        }
      }
      let weatherTimer = 0.2;

      const _wLoop = () => {
        loopBar += 1;
        phaseTime = 0;
        const newBiomeIdx = Math.floor(loopBar / 8) % 4;
        const oldBiomeIdx = Math.floor((loopBar - 1) / 8) % 4;
        if (newBiomeIdx !== oldBiomeIdx) {
          prevBiome = oldBiomeIdx;
          travelT = 1.0;
        }
      };
      const _wHit = () => { lastInputAt = performance.now(); sleepProgress = 0; };
      const _wStep = () => { lastInputAt = performance.now(); };
      busOn("loopWrap", _wLoop);
      busOn("trackHit", _wHit);
      busOn("step", _wStep);

      function getPhase() { return PHASE_NAMES[loopBar % 8] || "encounter"; }
      function getBiomeIdx() { return Math.floor(loopBar / 8) % 4; }
      function getBiomeName() { return BIOME_NAMES[getBiomeIdx()]; }
      function getPrevBiomeName() { return BIOME_NAMES[prevBiome]; }
      function getTravelT() { return travelT; }
      function getLoopBar() { return loopBar; }
      function getPhaseTime() { return phaseTime; }
      function getSleep() { return sleepProgress; }
      function getDayNight() { return dayNightPhase; }

      function tick(t, dt) {
        phaseTime += dt;
        travelT = Math.max(0, travelT - dt * 0.5);
        // Slow day/night cycle: full loop every 4 minutes
        dayNightPhase = (dayNightPhase + dt / 240) % 1;
        // Sleep cascade
        const idleSec = (performance.now() - lastInputAt) / 1000;
        const targetSleep = idleSec > 25 ? Math.min(1, (idleSec - 25) / 5) : 0;
        sleepProgress += (targetSleep - sleepProgress) * dt * 1.5;

        // Critter spawn / tick
        critterTimer -= dt;
        if (critterTimer <= 0 && critters.length < 4) {
          spawnCritter();
          critterTimer = 1.2 + Math.random() * 1.5;
        }
        for (let i = critters.length - 1; i >= 0; i--) {
          const c = critters[i];
          c.age += dt;
          c.x += c.dir * c.spec.speed * dt;
          c.ttl -= dt;
          if (c.ttl <= 0 || c.x < -40 || c.x > W + 40) critters.splice(i, 1);
        }

        // Weather tick
        weatherTimer -= dt;
        if (weatherTimer <= 0 && weatherParticles.length < 60 && !reducedMotion) {
          spawnWeather();
          weatherTimer = 0.18 + Math.random() * 0.1;
        }
        for (let i = weatherParticles.length - 1; i >= 0; i--) {
          const w = weatherParticles[i];
          w.x += w.vx * dt;
          w.y += w.vy * dt;
          if (w.kind === "leaf") w.vx += Math.sin(t * 1.5 + w.x * 0.01) * 4 * dt;
          w.rot += w.rotV;
          w.life -= dt;
          if (w.life <= 0 || w.y < -10 || w.y > H + 12 || w.x > W + 12 || w.x < -12) weatherParticles.splice(i, 1);
        }
      }

      function drawWeatherBack(t) {
        // Drawn behind characters (back layer)
        if (reducedMotion) return;
        const biome = getBiomeIdx();
        if (biome === 1) {
          // Cave motes — draw them behind
          weatherParticles.forEach(w => {
            if (w.kind !== "mote") return;
            ctx.save(); ctx.translate(w.x, w.y);
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, w.size * 4);
            grad.addColorStop(0, `oklch(0.85 0.14 ${w.hue} / 0.7)`);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, w.size * 4, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          });
        } else if (biome === 3) {
          // Volcano embers
          weatherParticles.forEach(w => {
            if (w.kind !== "spark") return;
            ctx.save(); ctx.translate(w.x, w.y);
            const flicker = Math.sin(t * 24 + w.life * 7) * 0.3 + 0.7;
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, w.size * 3);
            grad.addColorStop(0, `oklch(0.95 0.24 ${w.hue} / ${flicker})`);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, w.size * 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          });
        }
      }

      function drawWeatherFront(t) {
        if (reducedMotion) return;
        const biome = getBiomeIdx();
        weatherParticles.forEach(w => {
          if (biome === 0 && w.kind === "leaf") {
            ctx.save(); ctx.translate(w.x, w.y); ctx.rotate(w.rot);
            ctx.fillStyle = `oklch(0.45 0.16 ${w.hue})`;
            ctx.beginPath(); ctx.ellipse(0, 0, w.size, w.size * 0.4, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = `oklch(0.30 0.10 ${w.hue})`; ctx.lineWidth = 0.3;
            ctx.beginPath(); ctx.moveTo(-w.size, 0); ctx.lineTo(w.size, 0); ctx.stroke();
            ctx.restore();
          } else if (biome === 2 && w.kind === "grain") {
            ctx.fillStyle = `oklch(0.78 0.10 ${w.hue} / 0.7)`;
            ctx.beginPath(); ctx.arc(w.x, w.y, w.size, 0, Math.PI * 2); ctx.fill();
          }
        });
      }

      function drawCritters(t) {
        critters.forEach(c => {
          const yWobble = Math.sin(t * 1.5 + c.ySeed) * c.spec.amp;
          c.spec.draw(ctx, t, c.x, c.yBase + yWobble, c.age);
        });
      }

      function drawDayNightTint() {
        // Subtle tint overlay synced to dayNightPhase. 4-minute full cycle.
        // Phase 0: dawn (warm), 0.25: noon (clear), 0.5: dusk (orange), 0.75: night (deep blue)
        const p = dayNightPhase;
        let r = 0, g = 0, b = 0, a = 0;
        if (p < 0.25) { a = (0.25 - p) * 4 * 0.18; r = 250; g = 180; b = 130; }
        else if (p < 0.5) { a = 0; }
        else if (p < 0.75) { a = (p - 0.5) * 4 * 0.18; r = 240; g = 130; b = 80; }
        else { a = 0.18 + (p - 0.75) * 4 * 0.10; r = 30; g = 50; b = 110; }
        if (a < 0.01) return;
        ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${a.toFixed(3)})`;
        ctx.fillRect(0, 0, W, H);
      }

      function drawSleepZ(t) {
        if (sleepProgress < 0.05) return;
        // Already drawn per-character in their muted state — but we add a global desaturation overlay
        ctx.fillStyle = `rgba(20, 30, 60, ${(sleepProgress * 0.22).toFixed(3)})`;
        ctx.fillRect(0, 0, W, H);
      }

      function drawBack(t) {
        // Behind chars: cave motes & volcano embers (atmospheric backlight)
        drawWeatherBack(t);
        // Draw critters that are positioned far back (small ones)
        critters.forEach(c => {
          if (c.yBase < 100) {
            const yWobble = Math.sin(t * 1.5 + c.ySeed) * c.spec.amp;
            c.spec.draw(ctx, t, c.x, c.yBase + yWobble, c.age);
          }
        });
      }
      function drawMid(t) {
        // Draw remaining critters in front of chars when y is high (closer to viewer)
        critters.forEach(c => {
          if (c.yBase >= 100) {
            const yWobble = Math.sin(t * 1.5 + c.ySeed) * c.spec.amp;
            c.spec.draw(ctx, t, c.x, c.yBase + yWobble, c.age);
          }
        });
        // Front-running weather (leaves, grains)
        drawWeatherFront(t);
      }
      function drawFinalOverlay(t) {
        drawDayNightTint();
        drawSleepZ(t);
      }

      return { tick, drawBack, drawMid, drawFinalOverlay,
        getPhase, getBiomeIdx, getBiomeName, getPrevBiomeName,
        getTravelT, getLoopBar, getPhaseTime, getSleep, getDayNight,
        enemies, projectiles, critters, weatherParticles };
    }
    const worldEngine = createWorldEngine();

    // ─── Particle tick + draw ───
    function tickParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        p.vy += p.gravity * dt;
        p.x += p.vx;
        p.y += p.vy * dt;
        p.ang += p.angV;
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = alpha;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.ang);
        if (p.type === "banana") {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.ellipse(0, 0, p.size * 0.4, p.size, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "oklch(0.40 0.10 55)";
          ctx.beginPath(); ctx.arc(0, p.size * 0.8, p.size * 0.15, 0, Math.PI * 2); ctx.fill();
        } else {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    // ─── Public API setters ───
    function setTrackStates(tracks) {
      tracks.forEach((t, i) => {
        trackMute[i] = !!t.mute;
        trackSolo[i] = !!t.solo;
      });
    }
    function setEnergies(tracks, bankKey) {
      const bk = bankKey || "a";
      tracks.forEach((t, i) => {
        const bank = getBank(t, bk);
        const hits = bank.pattern.filter(Boolean).length;
        trackEnergy[i] = hits / bank.pattern.length;
      });
    }
    function setBPM(b) { currentBPM = b; }
    function setPlaying(p) { isPlayingFlag = p; }

    // ─── Main render loop ───
    let lastTime = 0, raf;
    function frame(now) {
      raf = requestAnimationFrame(frame);
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      const t = now / 1000;

      // Reset to base DPR transform every frame (defensive — guards against
      // any drift from unbalanced ctx.save/translate elsewhere in the pipeline).
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);

      trauma = Math.max(0, trauma - 1.5 * dt);
      const shaking = !reducedMotion && trauma > 0.01;
      if (shaking) {
        const s = getShake();
        ctx.save();
        ctx.translate(s.x, s.y);
      }

      worldEngine.tick(t, dt);
      drawBackground(t);
      if (!reducedMotion) tickLeaves(t);

      // World back layer (biome BG plates, weather)
      worldEngine.drawBack(t);

      // Stage platform
      drawBambooStage();

      // Behind-character decorations
      drawBananaBunch(120, 88, 0.95);
      drawBananaBunch(W - 130, 102, 0.85);
      drawBananaBunch(W * 0.5, 76, 0.7);
      drawHibiscus(46, 246, 1.1, 320);
      drawHibiscus(W - 46, 252, 0.95, 90);
      drawHibiscus(W * 0.32, 256, 0.7, 25);
      drawHibiscus(W * 0.68, 254, 0.7, 200);
      drawPalmFrond(8, 256, -0.35, t);
      drawPalmFrond(W - 8, 250, Math.PI + 0.35, t + 1.4);

      // Spotlights (behind chars)
      chars.forEach((ch, i) => {
        const baseIntensity = (trackMute[i] ? 0.04 : 0.18) + spotlightFlash[i] * 0.7;
        drawSpotlight(ch.x, TRACK_COLORS_RAW[i], baseIntensity);
      });

      // Update + draw chars (depth-sorted by Y)
      updateChars(t, dt);
      const order = chars.map((_, i) => i).sort((a, b) => chars[a].y - chars[b].y);
      const hasSolo = trackSolo.some(s => s);
      order.forEach(i => {
        const ch = chars[i];
        let alpha = 1;
        if (hasSolo && !trackSolo[i]) alpha = 0.5;
        // Solo glow halo
        if (hasSolo && trackSolo[i]) {
          const g = ctx.createRadialGradient(ch.x, ch.y, 0, ch.x, ch.y, 50);
          g.addColorStop(0, TRACK_COLORS_RAW[i].replace(")", " / 0.35)"));
          g.addColorStop(1, "transparent");
          ctx.fillStyle = g;
          ctx.fillRect(ch.x - 50, ch.y - 50, 100, 100);
        }
        drawCharacter(ch, t, alpha);
      });

      // World mid layer (enemies, projectiles, boss, class verb FX)
      worldEngine.drawMid(t);

      // Front-of-stage decorations: tiki torches
      drawTikiTorch(28, 224, t, currentBPM);
      drawTikiTorch(W - 28, 224, t + 1.7, currentBPM);

      if (!reducedMotion) tickParticles(dt);
      if (shaking) ctx.restore();

      // Flash overlay
      if (flashAlpha > 0 && !reducedMotion) {
        ctx.fillStyle = "rgba(255,255,200," + flashAlpha + ")";
        ctx.fillRect(0, 0, W, H);
        flashAlpha -= dt * 8;
        if (flashAlpha < 0.01) flashAlpha = 0;
      }

      // World engine final overlay (day/night, sleep cascade)
      worldEngine.drawFinalOverlay(t);
    }
    raf = requestAnimationFrame(frame);

    return {
      destroy() { cancelAnimationFrame(raf); busOffAll(); },
      setPlaying, setBPM, setTrackStates, setEnergies,
      getWorldState() {
        return {
          loopBar: worldEngine.getLoopBar(),
          phase: worldEngine.getPhase(),
          biome: worldEngine.getBiomeName(),
          biomeIdx: worldEngine.getBiomeIdx(),
        };
      },
    };
  }

  // ─── React Components ─────────────────────────────────────────────────────────

  function Header({ state, dispatch }) {
    return h("div", { className: "header" },
      h("div", { style: { display: "flex", alignItems: "center", gap: "10px" } },
        h("div", { className: "brand" }, "\uD83C\uDF4C ", h("em", null, "BANANA"), " BEATS"),
        h("div", { className: "led" + (state.isPlaying ? " on" : "") })
      ),
      h("div", { className: "hdr-right" },
        h("button", { className: "ctrl-btn", onClick: () => dispatch({ type: "REROLL_ALL" }),
          title: "Reroll all patterns" }, "\uD83C\uDFB2"),
        h("span", { className: "seed-label" }, "#" + state.seed)
      )
    );
  }

  // \u2500\u2500\u2500 v4: TransportBar \u2014 BPM slider + tap-tempo + big play \u2500\u2500\u2500
  function TransportBar({ state, dispatch }) {
    const tapsRef = useRef([]);
    const [tapArmed, setTapArmed] = useState(false);
    const handleTap = useCallback(() => {
      const now = performance.now();
      tapsRef.current = [...tapsRef.current.slice(-3), now]; // keep last 4
      setTapArmed(true);
      setTimeout(() => setTapArmed(false), 150);
      const taps = tapsRef.current;
      if (taps.length < 2) return;
      // average interval over recent taps
      const intervals = [];
      for (let i = 1; i < taps.length; i++) intervals.push(taps[i] - taps[i - 1]);
      // Drop intervals > 2s as stale
      const valid = intervals.filter(d => d < 2000 && d > 200);
      if (!valid.length) { tapsRef.current = [now]; return; }
      const avg = valid.reduce((a, b) => a + b, 0) / valid.length;
      const newBpm = Math.round(60000 / avg);
      const clamped = Math.max(40, Math.min(200, newBpm));
      dispatch({ type: "SET_BPM", value: clamped });
    }, [dispatch]);
    const onPlay = useCallback(async () => {
      if (!state.isPlaying) {
        createAudio();
        await Tone.start();
        Tone.Transport.bpm.value = state.bpm;
        dispatch({ type: "PLAY" });
      } else {
        Tone.Transport.stop();
        Tone.Transport.position = 0;
        disposeSequences();
        dispatch({ type: "STOP" });
      }
    }, [state.isPlaying, state.bpm, dispatch]);
    return h("div", { className: "transport-bar" },
      h("button", { className: "play-big" + (state.isPlaying ? " live" : ""), onClick: onPlay,
        "aria-label": state.isPlaying ? "Stop" : "Play" }, state.isPlaying ? "\u25A0 STOP" : "\u25B6 PLAY"),
      h("div", { className: "bpm-block" },
        h("label", null, "BPM"),
        h("input", { type: "range", className: "bpm-slider",
          min: 40, max: 200, step: 1, value: state.bpm,
          onChange: e => dispatch({ type: "SET_BPM", value: parseInt(e.target.value) }) }),
        h("span", { className: "bpm-readout" }, state.bpm)
      ),
      h("button", { className: "tap-btn" + (tapArmed ? " armed" : ""),
        onClick: handleTap, title: "Tap 2-4 times in tempo" }, "TAP"),
      h("span", { className: "phase-chip" }, state.isPlaying ? "\u25B8 Live" : "\u25CF Ready")
    );
  }

  // \u2500\u2500\u2500 v4: SeqControls \u2014 pattern banks + swing + humanize \u2500\u2500\u2500
  function SeqControls({ state, dispatch }) {
    const bk = state.activeBank || "a";

      h("div", { className: "bank-switcher" },
        h("label", null, "Bank"),
        banks.map(b => h("button", {

        }, b.toUpperCase()))
      ),
      h("div", { className: "swing-block" },
        h("label", null, "Swing"),
        h("input", { type: "range", className: "swing-slider",
          min: 0, max: 0.6, step: 0.01, value: state.swing || 0,
          onChange: e => dispatch({ type: "SET_SWING", value: parseFloat(e.target.value) }) }),

      ),

          onChange: e => dispatch({ type: "SET_HUMANIZE", value: e.target.checked }) }),
        "Humanize"
      ),
      h("div", { className: "quick-actions" },
        h("button", { className: "qa-btn danger", onClick: () => dispatch({ type: "QUICK_CLEAR" }),
          title: "Clear active bank (Q)" }, "Clear"),
        h("button", { className: "qa-btn", onClick: () => dispatch({ type: "QUICK_FILL" }),
          title: "Fill active bank with starter pattern (F)" }, "Fill"),
        h("button", { className: "qa-btn", onClick: () => dispatch({ type: "QUICK_RANDOM_MUTE" }),
          title: "Randomly mute 1-3 tracks" }, "Rnd Mute")
      )
    );
  }

  // \u2500\u2500\u2500 v4: PlayheadBar \u2014 visual sweep showing current step \u2500\u2500\u2500
  function PlayheadBar({ currentStep }) {
    const cells = [];
    for (let i = 0; i < STEPS; i++) {
      const isDown = i % 4 === 0;
      const isCurr = i === currentStep;
      cells.push(h("div", {
        key: i,
        className: "phead-cell" + (isDown ? " downbeat" : "") + (isCurr ? " current" : "")
      }));
    }
    return h("div", { className: "playhead-bar", "aria-hidden": "true" }, cells);
  }

  function PadGrid({ state, dispatch }) {
    const bk = state.activeBank || "a";
    // Drag-vs-click pad pointer handler. If drag delta > 4px, treat as velocity adjust.
    const handlePadDown = (e, ti, si, isOn, currentVel) => {
      if (e.button === 2) return; // right-click handled separately
      e.preventDefault();
      const startY = e.clientY;
      const startVel = currentVel != null ? currentVel : 1.0;
      let dragged = false;
      let lastVel = startVel;
      const onMove = (ev) => {
        const dy = startY - ev.clientY;
        if (!isOn) return;
        if (Math.abs(dy) > 4) {
          dragged = true;
          const newVel = Math.max(0.1, Math.min(1.0, startVel + dy * 0.005));
          if (Math.abs(newVel - lastVel) > 0.01) {
            lastVel = newVel;
            dispatch({ type: "SET_VELOCITY", trackId: ti, step: si, value: newVel });
          }
        }
      };
      const onUp = () => {
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        document.removeEventListener("pointercancel", onUp);
        if (!dragged) dispatch({ type: "TOGGLE_STEP", trackId: ti, step: si });
      };
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
      document.addEventListener("pointercancel", onUp);
    };
    const cycleProb = (ti, si, currentProb) => {
      const seq = [1.0, 0.75, 0.5, 0.25];
      const rounded = Math.round((currentProb != null ? currentProb : 1.0) * 100) / 100;
      let idx = seq.findIndex(v => Math.abs(v - rounded) < 0.01);
      if (idx === -1) idx = 0;
      const next = seq[(idx + 1) % seq.length];
      dispatch({ type: "SET_PROBABILITY", trackId: ti, step: si, value: next });
    };
    return h("div", { className: "pad-grid" },
      state.tracks.map((track, ti) => {
        const bank = getBank(track, bk);
        return h("div", { key: ti, className: "pad-row", style: { "--rowtc": TRACK_COLORS_RAW[ti] } },
          h("div", { className: "pad-label", style: { color: TRACK_COLORS_RAW[ti] } }, track.name),
          h("div", { className: "pad-cells" },
            bank.pattern.map((val, si) => {
              const isSpacer = si > 0 && si % 4 === 0;
              const vel = bank.velocity ? bank.velocity[si] : 1.0;
              const prob = bank.probability ? bank.probability[si] : 1.0;
              const probDots = prob >= 0.99 ? 0 : (prob >= 0.7 ? 1 : prob >= 0.4 ? 2 : 3);
              const titleText = track.name + " \u00B7 step " + (si + 1) +
                " \u00B7 vel " + Math.round(vel * 100) + "%" +
                (prob < 1.0 ? " \u00B7 " + Math.round(prob * 100) + "% chance" : "");
              const padChildren = [];
              if (val && vel < 0.99) {
                padChildren.push(h("span", { key: "shade", className: "pad-vel-shade",
                  style: { height: ((1 - vel) * 100) + "%" } }));
              }
              if (probDots > 0) {
                const dots = [];
                for (let d = 0; d < probDots; d++) dots.push(h("span", { key: d }));
                padChildren.push(h("span", { key: "dots", className: "pad-prob-dots" }, dots));
              }
              return h(React.Fragment, { key: si },
                isSpacer ? h("div", { className: "spacer" }) : null,
                h("button", Object.assign({
                  className: "pad" + (val ? " on" : "") + (state.currentStep === si ? " current" : ""),
                  style: { "--tc": TRACK_COLORS_RAW[ti] },
                  "aria-label": track.name + " step " + (si + 1) + (val ? ", active" : ", off"),
                  title: titleText,
                  onPointerDown: (e) => handlePadDown(e, ti, si, val, vel),
                  onContextMenu: (e) => { e.preventDefault(); cycleProb(ti, si, prob); }
                }), ...padChildren)
              );
            })
          ),
          h("button", {
            className: "pad-reroll", title: "Reroll " + track.name,
            "aria-label": "Reroll " + track.name,
            onClick: () => dispatch({ type: "REROLL_TRACK", id: ti })
          }, "\uD83C\uDFB2")
        );
      })
    );
  }

  function MixerTab({ state, dispatch }) {
    const KEYS = ["C", "C♯", "D", "D♯", "E", "F", "F♯", "G", "G♯", "A", "A♯", "B"];
    return h("div", null,
      state.tracks.map((track, ti) => {
        const variantIdx = track.variant != null ? track.variant : 0;
        const variantName = ((VARIANT_TABLE[ti] || [])[variantIdx] || {}).name || "—";
        const isMelodic = ti === 6 || ti === 7;
        return h("div", { key: ti, className: "mixer-row" },
          h("div", { className: "mixer-label", style: { color: TRACK_COLORS_RAW[ti] } }, track.name),
          h("input", { type: "range", className: "mixer-slider", min: 0, max: 1, step: 0.01, value: track.gain,
            style: { "--tc": TRACK_COLORS_RAW[ti], accentColor: TRACK_COLORS_RAW[ti] },
            onChange: e => dispatch({ type: "SET_GAIN", id: ti, value: parseFloat(e.target.value) }) }),
          h("div", { className: "mixer-val" }, Math.round(track.gain * 100) + "%"),
          h("input", { type: "range", style: { width: "48px", accentColor: "oklch(0.62 0.16 230)" },
            min: -1, max: 1, step: 0.1, value: track.pan,
            onChange: e => dispatch({ type: "SET_PAN", id: ti, value: parseFloat(e.target.value) }) }),
          h("button", { className: "mixer-btn" + (track.mute ? " active" : ""),
            onClick: () => dispatch({ type: "MUTE", id: ti }) }, "M"),
          h("button", { className: "mixer-btn" + (track.solo ? " solo-active" : ""),
            onClick: () => dispatch({ type: "SOLO", id: ti }) }, "S"),
          h("button", { className: "variant-pill",
            title: "Cycle sound variant (current: " + variantName + ")",
            onClick: () => dispatch({ type: "SET_VARIANT", trackId: ti, value: variantIdx + 1 }) },
            variantName),
          isMelodic ? h("div", { className: "melodic-controls" },
            h("button", { className: "octave-stepper",
              title: "Octave",
              onClick: () => dispatch({ type: "SET_OCTAVE", trackId: ti,
                value: ((track.octave || 0) + 1 > 2 ? -2 : (track.octave || 0) + 1) }) },
              (track.octave || 0) >= 0 ? "+" + (track.octave || 0) : "" + (track.octave || 0)),
            h("select", { className: "key-select",
              title: "Root key",
              value: track.rootKey || 0,
              onChange: e => dispatch({ type: "SET_ROOT_KEY", trackId: ti, value: parseInt(e.target.value) }) },
              KEYS.map((k, i) => h("option", { key: i, value: i }, k)))
          ) : null
        );
      }),
      h("div", { className: "mixer-row", style: { borderTop: "2px solid oklch(0.65 0.04 70)", marginTop: "8px", paddingTop: "8px" } },
        h("div", { className: "mixer-label", style: { fontWeight: 800 } }, "Master"),
        h("input", { type: "range", className: "mixer-slider", min: 0, max: 1, step: 0.01, value: state.master.gain,
          style: { accentColor: "oklch(0.55 0.16 90)" },
          onChange: e => dispatch({ type: "SET_MASTER_GAIN", value: parseFloat(e.target.value) }) }),
        h("div", { className: "mixer-val" }, Math.round(state.master.gain * 100) + "%")
      )
    );
  }

  function FxTab({ state, dispatch }) {
    const fxNames = ["Reverb", "Delay", "Filter", "Distortion"];
    const paramLabels = {
      reverb: ["Decay", "Wet", "Pre-delay"],
      delay: ["Time", "Feedback", "Wet"],
      filter: ["Freq", "Q", "Wet"],
      distortion: ["Amount", "Wet", "Drive"],
    };
    return h("div", null,
      state.fx.map((fx, i) =>
        h("div", { key: i, className: "fx-slot" },
          h("div", { className: "fx-header" },
            h("span", { style: { fontWeight: 700, fontSize: "11px", letterSpacing: ".1em", textTransform: "uppercase" } }, fxNames[i]),
            h("button", {
              className: "mixer-btn" + (fx.enabled ? " active" : ""),
              onClick: () => dispatch({ type: "TOGGLE_FX", slot: i })
            }, fx.enabled ? "ON" : "OFF")
          ),
          h("div", { className: "fx-params" },
            Object.entries(fx.params).map(([key, val], pi) =>
              h("div", { key: key, className: "fx-param" },
                h("label", null, (paramLabels[fx.type] || [])[pi] || key),
                h("input", { type: "range", min: 0, max: key === "frequency" ? 8000 : key === "Q" ? 10 : key === "decay" ? 10 : 1,
                  step: key === "frequency" ? 50 : 0.01, value: val,
                  onChange: e => dispatch({ type: "SET_FX_PARAM", slot: i, key, value: parseFloat(e.target.value) }) }),
                h("span", { className: "val" }, typeof val === "number" ? val.toFixed(2) : val)
              )
            )
          )
        )
      )
    );
  }

  function PresetTab({ state, dispatch, showToast }) {
    const [name, setName] = useState("");
    const copyUrl = useCallback(async () => {
      const hash = encodeStateHash(state);
      const url = location.origin + location.pathname + "#s=" + hash;
      try {
        await navigator.clipboard.writeText(url);
        showToast && showToast("URL copied to clipboard");
      } catch (e) {
        location.hash = "s=" + hash;
        showToast && showToast("URL set in address bar");
      }
    }, [state, showToast]);
    return h("div", null,
      h("div", { className: "preset-save-row" },
        h("input", { type: "text", value: name, placeholder: "Preset name...",
          className: "preset-input",
          onChange: e => setName(e.target.value),
          onKeyDown: e => { if (e.key === "Enter" && name.trim()) { dispatch({ type: "SAVE_PRESET", name: name.trim() }); setName(""); } }
        }),
        h("button", { className: "ctrl-btn", onClick: () => { if (name.trim()) { dispatch({ type: "SAVE_PRESET", name: name.trim() }); setName(""); } } }, "SAVE"),
        h("button", { className: "ctrl-btn", onClick: copyUrl, title: "Copy shareable URL (Cmd/Ctrl+S)" }, "🔗 Copy URL")
      ),
      state.presets.length === 0
        ? h("div", { style: { color: "var(--text-muted)", fontSize: "11px", padding: "16px", textAlign: "center", letterSpacing: ".04em" } },
            "No presets yet. Save the current pattern above.")
        : state.presets.map(p =>
            h("div", { key: p.id, className: "preset-item" },
              h("div", { className: "preset-name" }, p.name),
              h("span", { style: { fontSize: "10px", color: "var(--text-muted)" } }, p.bpm + " BPM"),
              h("div", { className: "preset-actions" },
                h("button", { className: "preset-btn", onClick: () => dispatch({ type: "LOAD_PRESET", id: p.id }) }, "Load"),
                h("button", { className: "preset-btn del", onClick: () => dispatch({ type: "DELETE_PRESET", id: p.id }) }, "Del")
              )
            )
          )
    );
  }

  function StageDisplay({ state }) {
    const canvasRef = useRef(null);
    const stageRef = useRef(null);

    useEffect(() => {
      if (canvasRef.current && !stageRef.current) {
        stageRef.current = createStage(canvasRef.current);
        // Initial sync
        stageRef.current.setBPM(state.bpm);
        stageRef.current.setTrackStates(state.tracks);
        stageRef.current.setEnergies(state.tracks, state.activeBank);
      }
      return () => { if (stageRef.current) { stageRef.current.destroy(); stageRef.current = null; } };
    }, []);

    useEffect(() => {
      if (stageRef.current) stageRef.current.setPlaying(state.isPlaying);
    }, [state.isPlaying]);

    useEffect(() => {
      if (stageRef.current) stageRef.current.setBPM(state.bpm);
    }, [state.bpm]);

    useEffect(() => {
      if (stageRef.current) {
        stageRef.current.setTrackStates(state.tracks);
        stageRef.current.setEnergies(state.tracks, state.activeBank);
      }
    }, [state.tracks, state.activeBank]);

    return h("div", { className: "display" },
      h("canvas", { ref: canvasRef, tabIndex: 0, role: "application",
        "aria-label": "Jungle band stage with 8 animal characters" })
    );
  }

  // ─── App ──────────────────────────────────────────────────────────────────────

  function App() {
    const [state, dispatch] = useReducer(reducer, null, createInitialState);
    const stateRef = useRef(state);
    stateRef.current = state;
    // v4: toast helper
    const [toast, setToast] = useState(null);
    const showToast = useCallback((msg) => {
      setToast(msg);
      setTimeout(() => setToast(null), 2000);
    }, []);

    // v4: Hash-share — load on mount if URL has #s=...
    useEffect(() => {
      const hashState = readHashState();
      if (!hashState) return;
      const migratedTracks = (hashState.tracks || []).map((t, i) => migrateTrack({ ...t, ...TRACK_DEFS[i], id: i }));
      dispatch({ type: "LOAD_SAVED", data: { ...hashState, tracks: migratedTracks } });
      showToast("Loaded shared pattern");
    }, []);

    // Sync BPM
    useEffect(() => {
      if (Tone.Transport) Tone.Transport.bpm.value = state.bpm;
    }, [state.bpm]);

    // Sync master gain
    useEffect(() => {
      if (masterGain) masterGain.gain.value = state.master.gain;
    }, [state.master.gain]);

    // Sync FX params
    useEffect(() => {
      if (!audioReady) return;
      const [rv, dl] = state.fx;
      if (reverbSend) {
        try { reverbSend.decay = rv.params.decay; } catch(e){}
        reverbGain.gain.value = rv.enabled ? rv.params.wet * 0.5 : 0;
      }
      if (delaySend) {
        try {
          delaySend.feedback.value = dl.params.feedback;
        } catch(e){}
        delayGain.gain.value = dl.enabled ? dl.params.wet * 0.5 : 0;
      }
    }, [state.fx]);

    // Build sequences when playing
    useEffect(() => {
      if (state.isPlaying && audioReady) {
        rebuildSequences(() => stateRef.current);
        Tone.Transport.bpm.value = state.bpm;
        if (Tone.Transport.state !== "started") Tone.Transport.start();
      }
    }, [state.isPlaying]);

    // Step tracking
    useEffect(() => {
      const onStep = (d) => dispatch({ type: "SET_STEP", step: d.step });
      bus.on("step", onStep);
      return () => bus.off("step", onStep);
    }, []);

    // Persistence
    useEffect(() => { debounceSave(state); }, [state.presets, state.bpm, state.vibe, state.tracks, state.fx, state.master]);

    // Load saved
    useEffect(() => {
      loadSaved().then(saved => {
        if (saved && saved.lastSession) {
          dispatch({ type: "SET_BPM", value: saved.lastSession.bpm || 96 });
          if (saved.presets) {
            saved.presets.forEach(p => dispatch({ type: "SAVE_PRESET", name: p.name || "Unnamed" }));
          }
        }
      });
    }, []);

    // Keyboard shortcuts
    useEffect(() => {
      const handler = (e) => {
        // Cmd/Ctrl+S = copy share URL — works even from inputs
        if ((e.metaKey || e.ctrlKey) && (e.key === "s" || e.key === "S")) {
          e.preventDefault();
          const hash = encodeStateHash(stateRef.current);
          const url = location.origin + location.pathname + "#s=" + hash;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(() => showToast("URL copied"));
          } else {
            location.hash = "s=" + hash;
            showToast("URL set in address bar");
          }
          return;
        }
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT" || e.target.tagName === "TEXTAREA") return;
        if (e.code === "Space") {
          e.preventDefault();
          if (!state.isPlaying) {
            createAudio();
            Tone.start().then(() => {
              Tone.Transport.bpm.value = stateRef.current.bpm;
              dispatch({ type: "PLAY" });
            });
          } else {
            Tone.Transport.stop();
            Tone.Transport.position = 0;
            disposeSequences();
            dispatch({ type: "STOP" });
          }
        }
        if (e.key === "r" || e.key === "R") dispatch({ type: "REROLL_ALL" });
        if (e.key === "q" || e.key === "Q") dispatch({ type: "QUICK_CLEAR" });
        if (e.key === "f" || e.key === "F") dispatch({ type: "QUICK_FILL" });
        // v4: 1-4 = bank switch (no shift); Shift+1..Shift+8 = reroll track
        if (e.shiftKey && e.key >= "1" && e.key <= "8" && !e.ctrlKey && !e.metaKey && !e.altKey) {
          dispatch({ type: "REROLL_TRACK", id: parseInt(e.key) - 1 });
        } else if (!e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey && e.key >= "1" && e.key <= "4") {
          const banks = ["a", "b", "c", "d"];
          dispatch({ type: "SET_BANK", bank: banks[parseInt(e.key) - 1] });
        }
      };
      addEventListener("keydown", handler);
      return () => removeEventListener("keydown", handler);
    }, [state.isPlaying]);

    const tabs = ["seq", "mixer", "fx", "presets"];
    const tabLabels = { seq: "Sequencer", mixer: "Mixer", fx: "FX", presets: "Presets" };
    const panelContent = state.activeTab === "mixer" ? h(MixerTab, { state, dispatch })
      : state.activeTab === "fx" ? h(FxTab, { state, dispatch })
      : state.activeTab === "presets" ? h(PresetTab, { state, dispatch, showToast })
      : null;

    return h("div", { className: "machine" },
      h(Header, { state, dispatch }),
      h(StageDisplay, { state }),
      h(TransportBar, { state, dispatch }),
      h(PlayheadBar, { currentStep: state.currentStep }),
      h(PadGrid, { state, dispatch }),
      h(SeqControls, { state, dispatch }),
      h("div", { className: "tabs" },
        tabs.map(tab =>
          h("button", {
            key: tab, className: "tab" + (state.activeTab === tab ? " active" : ""),
            onClick: () => dispatch({ type: "SET_TAB", tab })
          }, tabLabels[tab])
        )
      ),
      panelContent ? h("div", { className: "panel" }, panelContent) : null,
      h("div", { className: "kb-hint" }, "Space \u00B7 R \u00B7 Q \u00B7 F \u00B7 1-4 banks \u00B7 \u21E7+1-8 reroll \u00B7 \u2318+S share"),
      h("div", { role: "status", "aria-live": "polite",
        style: { position: "absolute", left: "-9999px", top: "-9999px" } },
        state.isPlaying ? "Playing at " + state.bpm + " BPM" : "Stopped"
      ),
      toast ? h("div", { className: "bb-toast", role: "alert" }, toast) : null
    );
  }

  // ─── Mount ────────────────────────────────────────────────────────────────────
  ReactDOM.render(h(App), document.getElementById("root"));

  })();
  </script>
</body>
</html>
