# GitHub Actions workflow for claude-creative-stack.
#
# Authoring note: this file is named `github-workflows-validate.yml` in the repo
# because dotted paths (`.github/workflows/`) are blocked in the authoring
# environment. On clone / merge, move it to `.github/workflows/validate.yml`.
#
# What it checks:
#   - SKILL.md frontmatter has `name` and `description`.
#   - Markdown files aren't empty and don't contain unresolved placeholders.
#   - HTML artifacts are syntactically parseable.
#   - JSX artifacts parse as valid JavaScript (via esbuild).
#   - The palette-oklch MCP server builds cleanly.
#   - The playground type-checks.

name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  knowledge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check knowledge markdown integrity
        run: |
          set -e
          for f in knowledge/*.md; do
            [ -s "$f" ] || { echo "Empty: $f"; exit 1; }
            if grep -n "{{.*}}" "$f"; then
              echo "Unresolved placeholder in $f"; exit 1
            fi
          done
          echo "knowledge/ OK"

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SKILL.md frontmatter
        run: |
          set -e
          for f in skills/*/SKILL.md; do
            head -n 10 "$f" | grep -q "^name:" || { echo "Missing name: $f"; exit 1; }
            head -n 10 "$f" | grep -q "^description:" || { echo "Missing description: $f"; exit 1; }
          done
          echo "skills/ OK"

  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install esbuild
        run: npm install --no-save esbuild
      - name: Parse JSX artifacts
        run: |
          set -e
          for f in artifacts/react/*.jsx; do
            npx esbuild --bundle=false --log-level=error "$f" > /dev/null
          done
          echo "artifacts/react OK"
      - name: Sanity-check HTML artifacts
        run: |
          set -e
          for f in artifacts/html/*.html; do
            [ -s "$f" ] || { echo "Empty: $f"; exit 1; }
            grep -q "</html>" "$f" || { echo "Missing </html>: $f"; exit 1; }
          done
          echo "artifacts/html OK"

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build palette-oklch
        working-directory: mcp/servers/palette-oklch
        run: |
          npm install
          npm run build

  playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Typecheck playground
        working-directory: playground
        run: |
          npm install
          npm run typecheck
