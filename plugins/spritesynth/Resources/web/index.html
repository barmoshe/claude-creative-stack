<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpriteSynth</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="cv"></canvas>
  <div id="ui">
    <div id="title">Sprite<em>Synth</em></div>
    <div id="status"><span id="stat-trees">0</span> trees · <span id="stat-nodes">0</span> nodes · <span id="stat-creatures">0</span> creatures</div>

    <div id="overlay">
      <label class="ctrl">
        <span>Scale</span>
        <select id="ov-scale">
          <option value="0">Pent Maj</option>
          <option value="1">Pent Min</option>
          <option value="2">Dorian</option>
          <option value="3">Phrygian</option>
          <option value="4">Lydian</option>
          <option value="5">Major</option>
          <option value="6">Minor</option>
          <option value="7">Chromatic</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Root</span>
        <select id="ov-root">
          <option value="0">C</option><option value="1">C#</option><option value="2">D</option>
          <option value="3">D#</option><option value="4">E</option><option value="5">F</option>
          <option value="6">F#</option><option value="7">G</option><option value="8">G#</option>
          <option value="9">A</option><option value="10">A#</option><option value="11">B</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Octave</span>
        <input id="ov-octave" type="range" min="2" max="6" step="1" value="4">
        <output id="ov-octave-v">4</output>
      </label>
      <label class="ctrl">
        <span>Speed</span>
        <input id="ov-speed" type="range" min="0.5" max="6" step="0.1" value="2">
        <output id="ov-speed-v">2</output>
      </label>
    </div>

    <div id="controls">
      <button id="add-snail">+ Snail</button>
      <button id="reset-btn">Forget</button>
    </div>

    <div id="help">
      <b>Click</b> the canvas to seed a mycelium tree. Press <b>+ Snail</b> (or hit <b>S</b>) to spawn a creature that walks the network and fires MIDI on every node it lands on. Route Track 1 → Track 2's <b>MIDI From: SpriteSynth</b>.
    </div>
    <div id="toast"></div>
  </div>

  <script type="module" src="bridge.js"></script>
  <script type="module" src="creatures.js"></script>
  <script type="module" src="sim.js"></script>
</body>
</html>
