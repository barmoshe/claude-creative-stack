<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mycelium Grove</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="cv"></canvas>
  <div id="ui">
    <div id="title">Mycelium <em>Grove</em></div>
    <div id="stats"><span id="stat-spores">0</span> spores · <span id="stat-bonds">0</span> bonds</div>

    <div id="overlay">
      <label class="ctrl">
        <span>Scale</span>
        <select id="ov-scale">
          <option value="0">Pent Maj</option>
          <option value="1">Pent Min</option>
          <option value="2">Dorian</option>
          <option value="3">Phrygian</option>
          <option value="4">Lydian</option>
          <option value="5">Major</option>
          <option value="6">Minor</option>
          <option value="7">Chromatic</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Root</span>
        <select id="ov-root">
          <option value="0">C</option><option value="1">C#</option><option value="2">D</option>
          <option value="3">D#</option><option value="4">E</option><option value="5">F</option>
          <option value="6">F#</option><option value="7">G</option><option value="8">G#</option>
          <option value="9">A</option><option value="10">A#</option><option value="11">B</option>
        </select>
      </label>
      <label class="ctrl">
        <span>Oct</span>
        <input id="ov-octave" type="range" min="1" max="6" step="1" value="4">
        <output id="ov-octave-v">4</output>
      </label>
      <label class="ctrl">
        <span>Density</span>
        <input id="ov-branch" type="range" min="0" max="0.5" step="0.005" value="0.16">
      </label>
      <label class="ctrl ctrl-toggle">
        <input id="ov-rain" type="checkbox">
        <span>Rain</span>
      </label>
    </div>

    <div id="help"><b>Click anywhere</b> to seed a spore. When two networks meet, a bond strikes a chime. Tempo sync, swing and humanize live in the host's parameter list.</div>
    <div id="controls">
      <button id="reset-btn">Forget</button>
    </div>
    <div id="toast"></div>
  </div>

  <script type="module" src="bridge.js"></script>
  <script type="module" src="sim.js"></script>
</body>
</html>
