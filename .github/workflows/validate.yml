# Validation workflow for claude-creative-stack.
#
# Jobs:
#   knowledge        — markdown integrity + lint + link check
#   skills           — SKILL.md frontmatter against a Zod schema
#   artifacts        — HTML well-formed; JSX parses
#   mcp              — every server under mcp/servers/* builds + tests
#   playground       — typecheck the optional Vite project (if it has changed)
#
# The validators try to use globally-available tooling (npx) so contributors don't
# need a global install — `npm run validate` from the repo root mirrors CI.

name: Validate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knowledge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Markdown integrity
        run: |
          set -e
          for f in knowledge/*.md; do
            [ -s "$f" ] || { echo "Empty: $f"; exit 1; }
            if grep -n "{{.*}}" "$f"; then
              echo "Unresolved placeholder in $f"; exit 1
            fi
          done
          echo "knowledge/ markdown integrity OK"
      - name: markdownlint
        run: npx --yes markdownlint-cli2 "knowledge/**/*.md" "skills/**/*.md" "prompts/**/*.md" "recipes/**/*.md" "**/README.md" "CLAUDE.md"
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --no-progress --max-concurrency 8 --accept '200,206,301,302,304,403,429'
            --exclude-path docs/archive
            --exclude 'localhost'
            --exclude 'example\.com'
            --exclude 'api\.anthropic\.com'
            'knowledge/**/*.md' 'skills/**/*.md' 'prompts/**/*.md' 'recipes/**/*.md' 'README.md' 'CLAUDE.md'
          fail: true

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Validate SKILL.md frontmatter
        run: node scripts/validate-skills.mjs

  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Parse JSX artifacts
        run: |
          set -e
          npm install --no-save esbuild
          for f in artifacts/react/*.jsx; do
            npx esbuild --bundle=false --log-level=error --loader:.jsx=jsx "$f" > /dev/null
          done
          echo "artifacts/react OK"
      - name: Sanity-check HTML artifacts
        run: |
          set -e
          for f in artifacts/html/*.html; do
            [ -s "$f" ] || { echo "Empty: $f"; exit 1; }
            grep -q "</html>" "$f" || { echo "Missing </html>: $f"; exit 1; }
          done
          echo "artifacts/html OK"
      - name: Smoke-test artifacts in headless Chromium
        run: node scripts/smoke-artifacts.mjs

  mcp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [palette-oklch, sprite-packer, asset-router]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Build & test mcp/servers/${{ matrix.server }}
        working-directory: mcp/servers/${{ matrix.server }}
        run: |
          npm install
          npm run build
          if npm run | grep -q "^  test"; then npm test; fi

  playground:
    runs-on: ubuntu-latest
    if: hashFiles('playground/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Typecheck playground
        working-directory: playground
        run: |
          npm install
          npm run typecheck
