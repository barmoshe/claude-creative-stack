const W = 1280, H = 760;
const MAP_W = 940, MAP_H = 760;
const SHOP_X = MAP_W;
const SHOP_W = W - SHOP_X;

const PATH = [
  { x:-30,  y: 110 }, { x: 230, y: 110 }, { x: 230, y: 290 },
  { x: 90,  y: 290 }, { x: 90,  y: 480 }, { x: 360, y: 480 },
  { x: 360, y: 200 }, { x: 540, y: 200 }, { x: 540, y: 600 },
  { x: 760, y: 600 }, { x: 760, y: 360 }, { x: 870, y: 360 },
  { x: 870, y: 100 }, { x: 970, y: 100 },
];
const SEG = []; let TOTAL = 0;
for (let i=0;i<PATH.length-1;i++){
  const a=PATH[i], b=PATH[i+1];
  const len = Math.hypot(b.x-a.x, b.y-a.y);
  SEG.push({ a, b, len, cum: TOTAL }); TOTAL += len;
}
function pointAt(d){
  if (d<=0) return { ...PATH[0], ang:0 };
  if (d>=TOTAL) return { ...PATH[PATH.length-1], ang:0 };
  for (const s of SEG){
    if (d <= s.cum + s.len){
      const t = (d - s.cum)/s.len;
      return { x: s.a.x + (s.b.x-s.a.x)*t, y: s.a.y + (s.b.y-s.a.y)*t,
               ang: Math.atan2(s.b.y-s.a.y, s.b.x-s.a.x) };
    }
  }
  return { ...PATH[PATH.length-1], ang:0 };
}

function buildRound(n){
  const e=[]; const add=(tier,count,gap=0.55)=>e.push({tier,count,gap});
  if (n===1) add('red',12,0.6);
  else if (n===2) add('red',22,0.5);
  else if (n===3){ add('red',16,0.5); add('blue',6,0.7); }
  else if (n===4) add('blue',18,0.55);
  else if (n===5){ add('blue',14,0.5); add('green',6,0.6); }
  else if (n===6){ add('red',24,0.35); add('green',8,0.6); }
  else if (n===7) add('green',22,0.45);
  else if (n===8){ add('green',14,0.45); add('gold',8,0.65); }
  else if (n===9) add('gold',18,0.5);
  else if (n===10){ add('gold',10,0.45); add('pink',6,0.8); }
  else if (n<=15){
    add('green',10+n,0.4); add('gold',6+(n>>1),0.5);
    if (n>=12) add('pink',4+Math.floor((n-11)*1.5),0.6);
    if (n===13) add('onyx',6,0.7); if (n===15) add('steel',5,0.8);
  } else if (n<=25){
    add('gold',8+n,0.35); add('pink',6+(n>>1),0.5);
    add('onyx',3+Math.floor((n-15)/2),0.65);
    if (n>=18) add('steel',3+Math.floor((n-17)/2),0.7);
    if (n>=20) add('striped',3+Math.floor((n-19)/2),0.6);
  } else {
    add('pink',10+n,0.3); add('onyx',6+(n>>1),0.55);
    add('steel',6+(n>>1),0.65); add('striped',4+(n>>1),0.5);
    if (n>=30) add('pink',30,0.25);
    if (n===40){ add('steel',20,0.4); add('onyx',20,0.4); add('striped',20,0.35); }
  }
  return { entries:e, reward: 100 + n*10 };
}

/* ============================================================ Scene */
class TD extends Phaser.Scene {
  constructor(){ super('td'); }

  create(){
    this.cameras.main.setBackgroundColor('#0a0d18');
    this.bakeTextures();

    this.money=850; this.lives=100; this.round=0; this.maxRound=40;
    this.running=false; this.fast=false; this.gameOver=false; this.won=false;
    this.hitStop=0; this.trauma=0; this.spawnQueue=[]; this.t=0;
    this.orbs=[]; this.towers=[]; this.heroes=[];
    this.projectiles=[]; this.particles=[]; this.rings=[]; this.beams=[];
    this.clouds=[]; this.bolts=[]; this.meteors=[]; this.floats=[];
    this.placing=null; this.selected=null; this.tab='towers'; this.hover=null;

    this.gMap=this.add.graphics();   this.drawMap();
    this.gAura=this.add.graphics();
    this.orbLayer = this.add.container();
    this.towerLayer = this.add.container();
    this.heroLayer  = this.add.container();
    this.gFx = this.add.graphics();
    this.gPreview = this.add.graphics();
    this.gUI = this.add.graphics();

    this.buildUI();

    this.input.on('pointerdown', p=>this.onClick(p));
    this.input.on('pointermove', p=>{ this.mouse=p; this.updateHover(p); });
    this.input.keyboard.on('keydown-SPACE', ()=>this.toggleStart());
    this.input.keyboard.on('keydown-F', ()=>this.fast=!this.fast);
    this.input.keyboard.on('keydown-ESC', ()=>{ this.placing=null; this.selected=null; });
    for (const k of ['ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT'])
      this.input.keyboard.on('keydown-'+k, ()=>this.quickBuyTower(k));
    this.input.keyboard.on('keydown-Q', ()=>this.quickBuyHero('captain'));
    this.input.keyboard.on('keydown-W', ()=>this.quickBuyHero('sorceress'));
    this.input.keyboard.on('keydown-E', ()=>this.quickBuyHero('ranger'));
    this.input.keyboard.on('keydown-R', ()=>this.castUlt());
    this.lastT = performance.now();
  }

  /* =================================================== Texture baking */
  newG(){ return this.make.graphics({ x:0, y:0, add:false }); }

  bakeTextures(){
    for (const k of Object.keys(YARN)) this.bakeYarn(k, YARN[k]);
    for (const k of Object.keys(TOWER)) this.bakeTower(k, TOWER[k]);
    for (const k of Object.keys(HERO)) this.bakeHero(k, HERO[k]);
  }

  bakeYarn(key, def){
    const size=42, cx=21, cy=21, r=16;
    const col=def.color, dark=shade(col,-45), darker=shade(col,-75), light=shade(col,+30);
    const g=this.newG();
    g.fillStyle(0x000000,0.28).fillEllipse(cx, cy+14, r*1.8, r*0.55);
    g.fillStyle(darker,1).fillCircle(cx, cy, r);
    g.fillStyle(col,1).fillCircle(cx-r*0.12, cy-r*0.12, r-1);
    g.fillStyle(light,0.55).fillCircle(cx-r*0.32, cy-r*0.32, r*0.55);
    // clean concentric winding arcs (cheap, clear shape)
    g.lineStyle(1.5, dark, 0.9);
    for (let i=-2;i<=2;i++){ g.beginPath(); g.arc(cx, cy+i*3.2, r-1, Math.PI*0.15, Math.PI*0.85, false); g.strokePath(); }
    g.lineStyle(1.2, light, 0.7);
    for (let i=-1;i<=1;i++){ g.beginPath(); g.arc(cx, cy+i*4.2, r-2, Math.PI*1.15, Math.PI*1.85, false); g.strokePath(); }
    g.lineStyle(1.2, dark, 0.7);
    for (let i=-2;i<=2;i++){ g.beginPath(); g.arc(cx+i*3.2, cy, r-1, Math.PI*0.65, Math.PI*1.35, false); g.strokePath(); }
    g.fillStyle(0xffffff, 0.45).fillEllipse(cx-r*0.45, cy-r*0.5, r*0.35, r*0.22);
    g.lineStyle(1.5, darker, 1).strokeCircle(cx, cy, r);
    if (def.flags.stripeBoost){
      g.lineStyle(2.5, 0xe23a3a, 0.95);
      for (let i=-1;i<=1;i++){ g.beginPath(); g.arc(cx, cy+i*5, r-1, Math.PI*0.25, Math.PI*0.75, false); g.strokePath(); }
    }
    if (def.flags.needsSharp){
      for (let i=0;i<6;i++){ const a=i/6*Math.PI*2;
        g.fillStyle(0xd0d6e0,1).fillCircle(cx+Math.cos(a)*(r-3), cy+Math.sin(a)*(r-3), 1.6); }
    }
    if (def.flags.darkImmune) g.lineStyle(1.5, 0x7a5ab0, 0.6).strokeCircle(cx, cy, r-4);
    g.generateTexture('yarn_'+key, size, size);
    g.destroy();
  }

  bakeTower(key, def){
    const Wtex=64, Htex=76, cx=32, baseY=60;
    const col=def.color, dark=shade(col,-45), darker=shade(col,-90), light=shade(col,+35), belly=shade(col,+60);
    const pink=0xffb3c7;
    const g=this.newG();
    g.fillStyle(0x000000,0.4).fillEllipse(cx, baseY+10, 30, 7);

    // seated body
    g.fillStyle(darker,1).fillEllipse(cx, baseY, 28, 22);
    g.fillStyle(col,1).fillEllipse(cx, baseY-1, 26, 20);
    g.fillStyle(belly,0.85).fillEllipse(cx, baseY+3, 16, 11);
    // paws
    g.fillStyle(darker,1).fillEllipse(cx-7, baseY+8, 6, 4);
    g.fillStyle(darker,1).fillEllipse(cx+7, baseY+8, 6, 4);
    g.fillStyle(light,1).fillEllipse(cx-7, baseY+7, 5, 3);
    g.fillStyle(light,1).fillEllipse(cx+7, baseY+7, 5, 3);
    for (const dx of [-8,-7,-6,6,7,8]) g.fillStyle(pink,1).fillCircle(cx+dx, baseY+8, 0.8);
    // tail
    g.lineStyle(7, darker, 1).beginPath().moveTo(cx+13, baseY+3).lineTo(cx+22, baseY-4).lineTo(cx+26, baseY-16).strokePath();
    g.lineStyle(5, col, 1).beginPath().moveTo(cx+13, baseY+3).lineTo(cx+22, baseY-4).lineTo(cx+26, baseY-16).strokePath();
    g.fillStyle(light,1).fillCircle(cx+26, baseY-16, 3);

    // head
    const hy = baseY - 24;
    g.fillStyle(darker,1).fillEllipse(cx, hy+1, 26, 23);
    g.fillStyle(col,1).fillEllipse(cx, hy, 24, 21);
    // ears
    g.fillStyle(darker,1).fillTriangle(cx-13, hy-6, cx-2, hy-6, cx-9, hy-19);
    g.fillStyle(darker,1).fillTriangle(cx+13, hy-6, cx+2, hy-6, cx+9, hy-19);
    g.fillStyle(col,1).fillTriangle(cx-12, hy-6, cx-3, hy-6, cx-9, hy-18);
    g.fillStyle(col,1).fillTriangle(cx+12, hy-6, cx+3, hy-6, cx+9, hy-18);
    g.fillStyle(pink,1).fillTriangle(cx-10, hy-7, cx-6, hy-7, cx-9, hy-14);
    g.fillStyle(pink,1).fillTriangle(cx+10, hy-7, cx+6, hy-7, cx+9, hy-14);
    // cheeks + muzzle
    g.fillStyle(light,0.8).fillCircle(cx-9, hy+4, 4);
    g.fillStyle(light,0.8).fillCircle(cx+9, hy+4, 4);
    g.fillStyle(light,1).fillEllipse(cx, hy+5, 11, 7);
    // eyes
    const iris = breedIris(key);
    g.fillStyle(0xffffff,1).fillEllipse(cx-6, hy-1, 4, 5);
    g.fillStyle(0xffffff,1).fillEllipse(cx+6, hy-1, 4, 5);
    g.fillStyle(iris,1).fillEllipse(cx-6, hy-1, 3, 4.2);
    g.fillStyle(iris,1).fillEllipse(cx+6, hy-1, 3, 4.2);
    g.fillStyle(0x0c0f17,1).fillEllipse(cx-6, hy-1, 1.1, 4);
    g.fillStyle(0x0c0f17,1).fillEllipse(cx+6, hy-1, 1.1, 4);
    g.fillStyle(0xffffff,0.9).fillCircle(cx-7, hy-2.5, 0.8);
    g.fillStyle(0xffffff,0.9).fillCircle(cx+5, hy-2.5, 0.8);
    g.lineStyle(1.2, darker, 0.85);
    g.beginPath().moveTo(cx-8, hy-3).lineTo(cx-4, hy-4).strokePath();
    g.beginPath().moveTo(cx+4, hy-4).lineTo(cx+8, hy-3).strokePath();
    // nose / mouth
    g.fillStyle(0xff7ab8,1).fillTriangle(cx-1.8, hy+3, cx+1.8, hy+3, cx, hy+4.8);
    g.lineStyle(1.2, 0x0c0f17, 0.9);
    g.beginPath().moveTo(cx, hy+4.8).lineTo(cx, hy+6.5).strokePath();
    g.beginPath().moveTo(cx, hy+6.5).lineTo(cx-2.5, hy+8).strokePath();
    g.beginPath().moveTo(cx, hy+6.5).lineTo(cx+2.5, hy+8).strokePath();
    // whiskers
    g.lineStyle(1, 0xffffff, 0.95);
    for (let i=-1;i<=1;i++){
      const wy = hy+3+i*1.8;
      g.beginPath().moveTo(cx-5, wy).lineTo(cx-17, wy+i*0.6).strokePath();
      g.beginPath().moveTo(cx+5, wy).lineTo(cx+17, wy+i*0.6).strokePath();
    }
    // tabby "M" on dart
    if (key==='dart'){
      g.lineStyle(1.5, dark, 0.8);
      g.beginPath().moveTo(cx-5, hy-7).lineTo(cx-2, hy-3).lineTo(cx, hy-6).lineTo(cx+2, hy-3).lineTo(cx+5, hy-7).strokePath();
    }
    this.bakeTowerProps(g, key, cx, hy, baseY, col, dark, darker, light);
    g.generateTexture('tower_'+key, Wtex, Htex);
    g.destroy();

    const fg=this.newG();
    fg.fillStyle(0xffffff, 0.9).fillCircle(cx, hy, 22);
    fg.generateTexture('tower_flash_'+key, Wtex, Htex);
    fg.destroy();
  }

  bakeTowerProps(g, key, cx, hy, baseY, col, dark, darker, light){
    if (key==='dart'){
      g.fillStyle(0xc73d3d,1).fillTriangle(cx-11, hy+10, cx+11, hy+10, cx, hy+17);
      g.fillStyle(0x902828,1).fillRect(cx-12, hy+9, 24, 2);
    } else if (key==='tack'){
      for (let i=0;i<14;i++){
        const ang=i/14*Math.PI*2;
        const rx=cx+Math.cos(ang)*12, ry=hy+Math.sin(ang)*11;
        g.fillStyle(shade(col,+20),0.95).fillTriangle(
          rx-Math.sin(ang)*2, ry+Math.cos(ang)*2,
          rx+Math.sin(ang)*2, ry-Math.cos(ang)*2,
          rx+Math.cos(ang)*7, ry+Math.sin(ang)*7);
      }
    } else if (key==='bomb'){
      g.fillStyle(0x2d3a26,1).fillEllipse(cx, hy-11, 26, 10);
      g.fillStyle(0x3e5032,1).fillEllipse(cx, hy-14, 22, 7);
      g.fillStyle(0x2d3a26,1).fillRect(cx-13, hy-9, 26, 2);
      g.fillStyle(0xc73d3d,1).fillCircle(cx, hy-14, 2);
      g.fillStyle(darker,1).fillRoundedRect(cx-22, baseY-14, 12, 8, 2);
      g.fillStyle(0x1a1a1a,1).fillCircle(cx-22, baseY-10, 4);
      g.fillStyle(0x444444,1).fillCircle(cx-22, baseY-10, 2.5);
    } else if (key==='ice'){
      for (let i=0;i<5;i++){
        const ang=-Math.PI*0.72 + i*Math.PI*0.36;
        const sx=cx+Math.cos(ang)*12, sy=hy-4+Math.sin(ang)*8;
        g.fillStyle(0xeaf6ff,1).fillCircle(sx, sy, 2.5);
        g.lineStyle(1, 0xb0d4e8, 1).beginPath().moveTo(sx-3,sy).lineTo(sx+3,sy).strokePath();
        g.beginPath().moveTo(sx,sy-3).lineTo(sx,sy+3).strokePath();
      }
      g.fillStyle(0x9aa8b4, 0.7);
      for (let i=0;i<6;i++){ const ax=cx-10+((i*7)%20), ay=hy-2+((i*11)%10);
        g.fillCircle(ax, ay, 1.2); }
    } else if (key==='sniper'){
      g.lineStyle(2, 0xffd166, 1).strokeCircle(cx+6, hy-1, 6);
      g.fillStyle(0x6a9ecf, 0.25).fillCircle(cx+6, hy-1, 5);
      g.lineStyle(1, 0xffd166, 0.7).beginPath().moveTo(cx+12, hy+2).lineTo(cx+15, hy+7).strokePath();
      g.fillStyle(0x5a4030, 0.75).fillTriangle(cx-13, hy-6, cx-2, hy-6, cx-9, hy-17);
      g.fillStyle(0x5a4030, 0.75).fillTriangle(cx+13, hy-6, cx+2, hy-6, cx+9, hy-17);
      g.fillStyle(0x5a4030, 0.6).fillEllipse(cx, hy+5, 9, 5);
      g.fillStyle(0x2a2a2a, 1).fillRoundedRect(cx-2, baseY-8, 28, 4, 2);
      g.fillStyle(0x5a3f22, 1).fillRoundedRect(cx-6, baseY-8, 6, 4, 1);
      g.fillStyle(0xff5050, 1).fillCircle(cx+26, baseY-6, 1.5);
    } else if (key==='storm'){
      g.fillStyle(0xfff7d6, 1).beginPath()
        .moveTo(cx-3, baseY-8).lineTo(cx+2, baseY-3).lineTo(cx-1, baseY-3).lineTo(cx+3, baseY+4).lineTo(cx-1, baseY-1).lineTo(cx+1, baseY-1).closePath().fillPath();
      g.lineStyle(1.5, 0xb4befe, 0.8).strokeCircle(cx, hy-1, 18);
      for (let i=0;i<8;i++){ const ang=i/8*Math.PI*2;
        g.fillStyle(0xd4d9ff,1).fillCircle(cx+Math.cos(ang)*14, hy+Math.sin(ang)*13-1, 1.2); }
    } else if (key==='engineer'){
      g.fillStyle(0x1a1a1a,1).fillRoundedRect(cx-11, hy-4, 22, 6, 2);
      g.fillStyle(0x2a2a2a,1).fillRect(cx-1, hy-3, 2, 4);
      g.fillStyle(0xfe8019,0.95).fillCircle(cx-6, hy-1, 2.5);
      g.fillStyle(0xfe8019,0.95).fillCircle(cx+6, hy-1, 2.5);
      g.fillStyle(0xffffff,0.7).fillCircle(cx-6, hy-2, 0.9);
      g.fillStyle(0xffffff,0.7).fillCircle(cx+6, hy-2, 0.9);
      g.fillStyle(darker,1).fillRoundedRect(cx-6, baseY-20, 12, 16, 3);
      g.fillStyle(0xfe8019,1).fillTriangle(cx-5, baseY-20, cx-1, baseY-20, cx-3, baseY-26);
      g.fillStyle(0xfe8019,1).fillTriangle(cx+5, baseY-20, cx+1, baseY-20, cx+3, baseY-26);
    } else if (key==='druid'){
      g.fillStyle(0x1a1026,1).fillRect(cx-15, hy-8, 30, 3);
      g.fillStyle(0x2a1e3a,1).fillTriangle(cx-11, hy-8, cx+11, hy-8, cx-4, hy-28);
      g.fillStyle(0x9bd66b,1).fillRect(cx-11, hy-10, 22, 2);
      g.fillStyle(0xffd166,1).fillCircle(cx-4, hy-28, 2);
      g.fillStyle(0x1a1a1a,1).fillEllipse(cx-16, baseY-3, 12, 9);
      g.fillStyle(0x9bd66b,1).fillEllipse(cx-16, baseY-6, 8, 2);
      g.fillStyle(0xc8ff99, 0.8).fillCircle(cx-17, baseY-8, 1.5);
      g.fillStyle(0xc8ff99, 0.6).fillCircle(cx-14, baseY-9, 1);
    }
  }

  bakeHero(key, def){
    const Wtex=72, Htex=96, cx=36, baseY=82;
    const col=def.color, dark=shade(col,-45), darker=shade(col,-90), light=shade(col,+35), belly=shade(col,+60);
    const pink=0xffb3c7;
    const g=this.newG();
    g.fillStyle(0x000000,0.42).fillEllipse(cx, baseY+6, 30, 8);

    // tail
    g.lineStyle(8, darker, 1).beginPath().moveTo(cx-10, baseY-10).lineTo(cx-22, baseY-18).lineTo(cx-26, baseY-32).strokePath();
    g.lineStyle(6, col, 1).beginPath().moveTo(cx-10, baseY-10).lineTo(cx-22, baseY-18).lineTo(cx-26, baseY-32).strokePath();
    g.fillStyle(light,1).fillCircle(cx-26, baseY-32, 3.5);

    // legs
    g.fillStyle(darker,1).fillRoundedRect(cx-8, baseY-10, 5, 12, 2);
    g.fillStyle(darker,1).fillRoundedRect(cx+3, baseY-10, 5, 12, 2);
    g.fillStyle(col,1).fillRoundedRect(cx-7, baseY-10, 4, 10, 2);
    g.fillStyle(col,1).fillRoundedRect(cx+4, baseY-10, 4, 10, 2);
    g.fillStyle(0x2a1e14,1).fillRoundedRect(cx-9, baseY-2, 7, 5, 2);
    g.fillStyle(0x2a1e14,1).fillRoundedRect(cx+2, baseY-2, 7, 5, 2);
    g.fillStyle(0x5a3f22,1).fillRect(cx-9, baseY-2, 7, 1);
    g.fillStyle(0x5a3f22,1).fillRect(cx+2, baseY-2, 7, 1);

    // torso
    g.fillStyle(darker,1).fillRoundedRect(cx-12, baseY-28, 24, 24, 6);
    g.fillStyle(col,1).fillRoundedRect(cx-11, baseY-27, 22, 22, 5);
    g.fillStyle(belly,1).fillTriangle(cx-6, baseY-25, cx+6, baseY-25, cx, baseY-10);
    g.fillStyle(light,0.7).fillEllipse(cx, baseY-18, 10, 5);
    g.fillStyle(def.accent,1).fillRect(cx-12, baseY-12, 24, 3);
    g.fillStyle(shade(def.accent,-50),1).fillRect(cx-12, baseY-9, 24, 1);
    g.fillStyle(0xffd166,1).fillRect(cx-3, baseY-13, 6, 4);
    g.fillStyle(0x8a6a22,1).fillRect(cx-2, baseY-12, 4, 2);

    // head
    const hy = baseY - 42;
    g.fillStyle(darker,1).fillEllipse(cx, hy+1, 24, 22);
    g.fillStyle(col,1).fillEllipse(cx, hy, 22, 20);
    g.fillStyle(darker,1).fillTriangle(cx-12, hy-6, cx-2, hy-6, cx-8, hy-18);
    g.fillStyle(darker,1).fillTriangle(cx+12, hy-6, cx+2, hy-6, cx+8, hy-18);
    g.fillStyle(col,1).fillTriangle(cx-11, hy-6, cx-3, hy-6, cx-8, hy-17);
    g.fillStyle(col,1).fillTriangle(cx+11, hy-6, cx+3, hy-6, cx+8, hy-17);
    g.fillStyle(pink,1).fillTriangle(cx-9, hy-7, cx-5, hy-7, cx-7, hy-13);
    g.fillStyle(pink,1).fillTriangle(cx+9, hy-7, cx+5, hy-7, cx+7, hy-13);
    g.fillStyle(light,0.8).fillCircle(cx-8, hy+4, 4);
    g.fillStyle(light,0.8).fillCircle(cx+8, hy+4, 4);
    g.fillStyle(light,1).fillEllipse(cx, hy+5, 11, 7);
    const iris = key==='captain'?0x7ec9ff : key==='sorceress'?0xe6b0ff : 0x9fe8c8;
    g.fillStyle(0xffffff,1).fillEllipse(cx-5, hy-1, 3.5, 5);
    g.fillStyle(0xffffff,1).fillEllipse(cx+5, hy-1, 3.5, 5);
    g.fillStyle(iris,1).fillEllipse(cx-5, hy-1, 2.5, 4);
    g.fillStyle(iris,1).fillEllipse(cx+5, hy-1, 2.5, 4);
    g.fillStyle(0x0c0f17,1).fillEllipse(cx-5, hy-1, 1, 3.6);
    g.fillStyle(0x0c0f17,1).fillEllipse(cx+5, hy-1, 1, 3.6);
    g.fillStyle(0xffffff,0.9).fillCircle(cx-6, hy-2.5, 0.9);
    g.fillStyle(0xffffff,0.9).fillCircle(cx+4, hy-2.5, 0.9);
    g.lineStyle(1.5, darker, 0.95);
    g.beginPath().moveTo(cx-8, hy-4).lineTo(cx-2, hy-5).strokePath();
    g.beginPath().moveTo(cx+2, hy-5).lineTo(cx+8, hy-4).strokePath();
    g.fillStyle(0xff7ab8,1).fillTriangle(cx-1.8, hy+3, cx+1.8, hy+3, cx, hy+4.8);
    g.lineStyle(1.2, 0x0c0f17, 0.9);
    g.beginPath().moveTo(cx, hy+4.8).lineTo(cx, hy+6.5).strokePath();
    g.beginPath().moveTo(cx, hy+6.5).lineTo(cx-2.5, hy+8).strokePath();
    g.beginPath().moveTo(cx, hy+6.5).lineTo(cx+2.5, hy+8).strokePath();
    g.lineStyle(1, 0xffffff, 0.95);
    for (let i=-1;i<=1;i++){ const wy=hy+3+i*1.8;
      g.beginPath().moveTo(cx-5,wy).lineTo(cx-16,wy+i*0.6).strokePath();
      g.beginPath().moveTo(cx+5,wy).lineTo(cx+16,wy+i*0.6).strokePath(); }

    // hats
    if (key==='captain'){
      g.fillStyle(0x1a1a1a,1).fillTriangle(cx-15, hy-6, cx+15, hy-6, cx-11, hy-17);
      g.fillStyle(0x1a1a1a,1).fillTriangle(cx-15, hy-6, cx+15, hy-6, cx+11, hy-17);
      g.fillStyle(0x1a1a1a,1).fillRect(cx-15, hy-8, 30, 4);
      g.fillStyle(0xffd166,1).fillRect(cx-15, hy-9, 30, 2);
      g.fillStyle(0xfff7d6,1).fillCircle(cx, hy-12, 2);
      g.fillStyle(0xff6a3d,1).fillTriangle(cx-8, hy-14, cx-6, hy-14, cx-14, hy-24);
    } else if (key==='sorceress'){
      g.fillStyle(0x1a1026,1).fillRect(cx-15, hy-7, 30, 3);
      g.fillStyle(0x2a1e3a,1).fillTriangle(cx-12, hy-7, cx+12, hy-7, cx-4, hy-26);
      g.fillStyle(def.accent,1).fillRect(cx-12, hy-9, 24, 2);
      g.fillStyle(0xffd166,1).fillCircle(cx-4, hy-26, 2);
    } else if (key==='ranger'){
      g.fillStyle(0x1a2a20,1).fillRoundedRect(cx-13, hy-12, 26, 10, 5);
      g.fillStyle(0x2b4a3a,1).fillRoundedRect(cx-12, hy-11, 24, 8, 4);
      g.fillStyle(0x2b4a3a,1).fillTriangle(cx-12, hy-11, cx+12, hy-11, cx-4, hy-20);
      g.fillStyle(0x3a2a14,1).fillRoundedRect(cx+8, baseY-30, 6, 22, 2);
      g.fillStyle(0xfff7d6,1).fillRect(cx+9, baseY-32, 1, 5);
      g.fillStyle(0xfff7d6,1).fillRect(cx+12, baseY-32, 1, 5);
    }
    g.generateTexture('hero_'+key, Wtex, Htex);
    g.destroy();
  }

  /* =================================================== Map (static) */
  drawMap(){
    const g=this.gMap; g.clear();
    // wooden floor
    g.fillStyle(0x2a1f14,1).fillRect(0,0,MAP_W,MAP_H);
    for (let y=0;y<MAP_H;y+=28){
      const c=(y/28)%2===0?0x3a2b1b:0x32251a;
      g.fillStyle(c,1).fillRect(0,y,MAP_W,26);
      g.fillStyle(0x1e1610,1).fillRect(0,y+26,MAP_W,2);
    }
    for (let i=0;i<24;i++){
      const kx=((i*173)%MAP_W), ky=((i*211)%MAP_H);
      g.fillStyle(0x1a1108,0.55).fillCircle(kx, ky, 2.5);
      g.fillStyle(0x2a1e14,0.6).fillCircle(kx, ky, 1.5);
    }
    // rug runner path
    g.lineStyle(56, 0x1a0808, 1).beginPath().moveTo(PATH[0].x, PATH[0].y);
    for (let i=1;i<PATH.length;i++) g.lineTo(PATH[i].x, PATH[i].y); g.strokePath();
    g.lineStyle(48, 0x6a2020, 1).beginPath().moveTo(PATH[0].x, PATH[0].y);
    for (let i=1;i<PATH.length;i++) g.lineTo(PATH[i].x, PATH[i].y); g.strokePath();
    g.lineStyle(44, 0x8a2828, 1).beginPath().moveTo(PATH[0].x, PATH[0].y);
    for (let i=1;i<PATH.length;i++) g.lineTo(PATH[i].x, PATH[i].y); g.strokePath();
    g.lineStyle(2, 0xffd166, 0.6).beginPath().moveTo(PATH[0].x, PATH[0].y);
    for (let i=1;i<PATH.length;i++) g.lineTo(PATH[i].x, PATH[i].y); g.strokePath();
    for (let d=30; d<TOTAL; d+=55){ const pt=pointAt(d);
      g.fillStyle(0xffd166,0.55).fillCircle(pt.x, pt.y, 2); }

    const decor=[
      {x:160,y:50,c:0x8ca7c2},{x:680,y:80,c:0xc28c8c},
      {x:40,y:380,c:0xaeb58c},{x:480,y:380,c:0xd4a88c},
      {x:680,y:260,c:0xc2a78c},{x:820,y:540,c:0x8c9fc2},
      {x:200,y:640,c:0xa8c28c},{x:420,y:640,c:0xc28cbd},
      {x:330,y:60,c:0xd6b88c},{x:900,y:620,c:0x9fbfa8},
    ];
    for (const d of decor){
      let near=false;
      for (const s of SEG) if (pointToSeg(d.x,d.y,s.a.x,s.a.y,s.b.x,s.b.y)<44){ near=true; break; }
      if (near) continue;
      g.fillStyle(0x120a06,0.45).fillEllipse(d.x, d.y+10, 30, 8);
      g.fillStyle(shade(d.c,-40),1).fillRoundedRect(d.x-16, d.y-10, 32, 20, 7);
      g.fillStyle(d.c,1).fillRoundedRect(d.x-15, d.y-9, 30, 18, 6);
      g.fillStyle(shade(d.c,+30),0.55).fillEllipse(d.x-2, d.y-4, 16, 5);
      g.fillStyle(shade(d.c,-60),1).fillCircle(d.x-16, d.y+9, 2);
      g.fillStyle(shade(d.c,-60),1).fillCircle(d.x+16, d.y+9, 2);
      g.fillStyle(shade(d.c,-60),1).fillCircle(d.x-16, d.y-9, 2);
      g.fillStyle(shade(d.c,-60),1).fillCircle(d.x+16, d.y-9, 2);
    }
    for (let i=0;i<24;i++){
      const x=((i*97+20)%MAP_W), y=((i*131+15)%MAP_H);
      let near=false;
      for (const s of SEG) if (pointToSeg(x,y,s.a.x,s.a.y,s.b.x,s.b.y)<38){ near=true; break; }
      if (near) continue;
      let onDecor=false;
      for (const d of decor) if (Math.hypot(x-d.x,y-d.y)<32){ onDecor=true; break; }
      if (onDecor) continue;
      g.fillStyle(0x1a0f06, 0.35).fillCircle(x, y, 2.5);
      g.fillStyle(0x1a0f06, 0.35).fillCircle(x-3, y-3, 1.2);
      g.fillStyle(0x1a0f06, 0.35).fillCircle(x+3, y-3, 1.2);
      g.fillStyle(0x1a0f06, 0.35).fillCircle(x-4, y+1, 1.1);
      g.fillStyle(0x1a0f06, 0.35).fillCircle(x+4, y+1, 1.1);
    }
    g.fillStyle(0x88ff88,0.9).fillCircle(PATH[1].x, PATH[1].y, 10);
    g.lineStyle(2, 0x1a2b1a, 0.9).strokeCircle(PATH[1].x, PATH[1].y, 10);
    g.fillStyle(0xff6666,0.9).fillCircle(PATH[PATH.length-2].x, PATH[PATH.length-2].y, 10);
    g.lineStyle(2, 0x2b1a1a, 0.9).strokeCircle(PATH[PATH.length-2].x, PATH[PATH.length-2].y, 10);
  }

  /* =================================================== UI */
  buildUI(){

      { id:'towers', x:SHOP_X+16, y:96, w:(SHOP_W-40)/2, h:28, label:'Cats' },

    }
    this.txtHeroName=[]; this.txtHeroSub=[]; this.txtHeroCost=[]; this.txtHeroKey=[];
    for (let i=0;i<this.cardsHeroes.length;i++){
      const c=this.cardsHeroes[i]; const h=HERO[c.kind];
      const img = this.add.image(c.x+42, c.y+42, 'hero_'+c.kind).setScale(0.65).setDepth(1);
      this.cardIcons.push({ img, type:'hero' });
      this.txtHeroKey.push(this.add.text(c.x+8,c.y+4,h.hotkey,{fontFamily:'system-ui',fontSize:'11px',color:'#ffd166'}));
      this.txtHeroName.push(this.add.text(c.x+80,c.y+12,h.name,{fontFamily:'system-ui',fontSize:'14px',color:'#e8eef7',fontStyle:'600'}));
      this.txtHeroSub .push(this.add.text(c.x+80,c.y+32,h.desc,{fontFamily:'system-ui',fontSize:'11px',color:'#9fb1cb',wordWrap:{width:c.w-92}}));
      this.txtHeroCost.push(this.add.text(c.x+c.w-12,c.y+10,'$'+h.cost,{fontFamily:'system-ui',fontSize:'14px',color:'#ffd166'}).setOrigin(1,0));
    }

    this.infoPanel={x:SHOP_X+16,y:540,w:SHOP_W-32,h:208};
    this.txtInfoName=this.add.text(this.infoPanel.x+12,this.infoPanel.y+10,'',{fontFamily:'system-ui',fontSize:'15px',color:'#fff',fontStyle:'700'});
    this.txtInfoStats=this.add.text(this.infoPanel.x+12,this.infoPanel.y+34,'',{fontFamily:'system-ui',fontSize:'11px',color:'#9fb1cb',lineSpacing:2});
    this.txtUpgA=this.add.text(this.infoPanel.x+12,this.infoPanel.y+90,'',{fontFamily:'system-ui',fontSize:'12px',color:'#e8eef7'});
    this.txtUpgB=this.add.text(this.infoPanel.x+12,this.infoPanel.y+136,'',{fontFamily:'system-ui',fontSize:'12px',color:'#e8eef7'});
    this.txtSell=this.add.text(this.infoPanel.x+12,this.infoPanel.y+182,'',{fontFamily:'system-ui',fontSize:'12px',color:'#ffb4a2'});

    this.txtToast=this.add.text(MAP_W/2,28,'',{fontFamily:'system-ui',fontSize:'18px',color:'#ffe',align:'center',backgroundColor:'#000a',padding:{x:10,y:6}}).setOrigin(0.5,0).setAlpha(0);
    this.txtCenter=this.add.text(MAP_W/2,MAP_H/2,'',{fontFamily:'system-ui',fontSize:'52px',color:'#fff',align:'center',fontStyle:'800'}).setOrigin(0.5);
    this.startBtn={x:SHOP_X+16,y:74,w:SHOP_W-32,h:18};
    this.tooltipBg=this.add.graphics();
    this.tooltipText=this.add.text(0,0,'',{fontFamily:'system-ui',fontSize:'12px',color:'#fff',wordWrap:{width:230},lineSpacing:2}).setDepth(100);
    this.ultBtn={x:MAP_W-90,y:H-70,w:74,h:54};
    this.txtUltLabel=this.add.text(MAP_W-53,H-58,'ULT',{fontFamily:'system-ui',fontSize:'14px',color:'#fff',fontStyle:'700'}).setOrigin(0.5);
    this.txtUltCd   =this.add.text(MAP_W-53,H-38,'',{fontFamily:'system-ui',fontSize:'11px',color:'#cfd6e6'}).setOrigin(0.5);
  }

  updateHover(p){
    this.hover=null;
    const cards=this.tab==='towers'?this.cardsTowers:this.cardsHeroes;
    for (const c of cards) if (p.x>=c.x&&p.x<=c.x+c.w&&p.y>=c.y&&p.y<=c.y+c.h){ this.hover=c; return; }
  }

  /* =================================================== Input */
  onClick(p){
    if (this.gameOver||this.won){ this.scene.restart(); return; }
    for (const b of this.tabBtns) if (p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ this.tab=b.id; this.placing=null; return; }
    const sb=this.startBtn;
    if (p.x>=sb.x&&p.x<=sb.x+sb.w&&p.y>=sb.y&&p.y<=sb.y+sb.h){ this.toggleStart(); return; }
    const ub=this.ultBtn;
    if (p.x>=ub.x&&p.x<=ub.x+ub.w&&p.y>=ub.y&&p.y<=ub.y+ub.h){ this.castUlt(); return; }
    const cards=this.tab==='towers'?this.cardsTowers:this.cardsHeroes;
    for (const c of cards) if (p.x>=c.x&&p.x<=c.x+c.w&&p.y>=c.y&&p.y<=c.y+c.h){ this.startPlace(c.kind_type,c.kind); return; }
    if (this.selected){
      const u=this.infoPanel;
      if (p.x>=u.x&&p.x<=u.x+u.w){
        if (p.y>=u.y+82 &&p.y<u.y+128){ this.tryUpgrade(this.selected,'A'); return; }
        if (p.y>=u.y+128&&p.y<u.y+174){ this.tryUpgrade(this.selected,'B'); return; }
        if (p.y>=u.y+176&&p.y<u.y+204){ this.sell(this.selected); return; }
      }
    }
    if (this.placing){
      if (p.x<MAP_W && this.canPlace(p.x,p.y, this.placing.type==='hero')){
        if (this.placing.type==='tower'){
          const def=TOWER[this.placing.kind];
          if (this.money>=def.cost){ this.money-=def.cost; this.towers.push(this.makeTower(this.placing.kind,p.x,p.y)); }
        } else {
          const def=HERO[this.placing.kind];
          if (this.heroes.find(h=>h.kind===this.placing.kind)){ this.toast('Hero already placed'); return; }
          if (this.money>=def.cost){ this.money-=def.cost; this.heroes.push(this.makeHero(this.placing.kind,p.x,p.y)); }
        }
        this.placing=null;
      } else this.toast('Cannot place here');
      return;
    }
    if (p.x<MAP_W){
      let pick=null,dmin=30;
      for (const t of this.towers){ const d=Math.hypot(p.x-t.x,p.y-t.y); if (d<dmin){ dmin=d; pick=t; } }
      for (const h of this.heroes){ const d=Math.hypot(p.x-h.x,p.y-h.y); if (d<dmin){ dmin=d; pick=h; } }
      this.selected=pick;
    }
  }

  startPlace(type,kind){
    const def=type==='tower'?TOWER[kind]:HERO[kind];
    if (this.money<def.cost){ this.toast('Not enough cash'); return; }
    if (type==='hero' && this.heroes.find(h=>h.kind===kind)){ this.toast('Hero already placed'); return; }
    this.placing={type,kind}; this.selected=null;
  }
  quickBuyTower(k){
    const map={ONE:'dart',TWO:'tack',THREE:'bomb',FOUR:'ice',FIVE:'sniper',SIX:'storm',SEVEN:'engineer',EIGHT:'druid'};
    if (map[k]){ this.tab='towers'; this.startPlace('tower',map[k]); }
  }
  quickBuyHero(k){ this.tab='heroes'; this.startPlace('hero',k); }
  canPlace(x,y,isHero){
    const minPath=isHero?36:32;
    for (const s of SEG) if (pointToSeg(x,y,s.a.x,s.a.y,s.b.x,s.b.y)<minPath) return false;
    for (const t of this.towers) if (Math.hypot(x-t.x,y-t.y)<40) return false;
    for (const h of this.heroes) if (Math.hypot(x-h.x,y-h.y)<44) return false;
    if (x<26||x>MAP_W-26||y<26||y>MAP_H-26) return false;
    return true;
  }

  /* =================================================== Entities */
  makeTower(kind,x,y){
    const def=TOWER[kind];
    const stats={...def.base, tags:[...def.base.tags]};
    const sprite = this.add.image(x, y, 'tower_'+kind); sprite.setDepth(y);
    this.towerLayer.add(sprite);
    const flash  = this.add.image(x, y, 'tower_flash_'+kind).setAlpha(0).setBlendMode(Phaser.BlendModes.ADD);
    this.towerLayer.add(flash);
    return { kind,x,y,stats,def,sprite,flash,cooldown:0,rotation:0,level:{A:0,B:0},totalSpent:def.cost,fireFlash:0,kills:0,isHero:false };
  }
  applyMods(stats,mods){
    const out={...stats, tags:[...stats.tags]};
    for (const k of Object.keys(mods)){
      const v=mods[k];
      if (k==='tags'){ for (const tag of v) if (tag.startsWith('+')) out.tags.push(tag.slice(1)); }
      else if (typeof v==='number') out[k]=(out[k]||0)+v;
      else out[k]=v;
    }
    return out;
  }
  tryUpgrade(t,path){
    if (t.isHero){ this.toast('Heroes auto-level by XP'); return; }
    const arr=path==='A'?t.def.pathA:t.def.pathB;
    const lvl=t.level[path];
    if (lvl>=arr.length){ this.toast('Max upgrade'); return; }
    const other=path==='A'?t.level.B:t.level.A;
    if (lvl>=2&&other>=1){ this.toast('Cannot stack both paths past T2'); return; }
    const u=arr[lvl];
    if (this.money<u.cost){ this.toast('Not enough cash'); return; }
    this.money-=u.cost; t.totalSpent+=u.cost;
    t.stats=this.applyMods(t.stats,u.mods); t.level[path]++;
    this.spawnParticles(t.x,t.y,0xffe066,8);
  }
  sell(t){
    this.money+=Math.floor(t.totalSpent*0.7);
    if (t.sprite) t.sprite.destroy();
    if (t.flash) t.flash.destroy();
    if (t.isHero) this.heroes=this.heroes.filter(x=>x!==t);
    else this.towers=this.towers.filter(x=>x!==t);
    this.selected=null;
  }
  makeHero(kind,x,y){
    const def=HERO[kind];
    const stats={...def.base, tags:[...def.base.tags]};
    const sprite = this.add.image(x, y, 'hero_'+kind); sprite.setDepth(y);
    this.heroLayer.add(sprite);
    return { kind,x,y,def,stats,sprite,cooldown:0,ultCd:def.ult.cd*0.5,rotation:0,
             level:0,xp:0,totalSpent:def.cost,kills:0,isHero:true,attackT:0, facing:1 };
  }
  heroLevelCheck(h){
    while (h.level<h.def.levels.length && h.xp>=h.def.levels[h.level].xp){
      const u=h.def.levels[h.level];
      h.stats=this.applyMods(h.stats,u.mods); h.level++;
      this.float(h.x,h.y-30,'LEVEL UP!',0xffe066);
      this.spawnParticles(h.x,h.y,0xffe066,18);
    }
  }
  castUlt(){
    if (!this.selected||!this.selected.isHero){ this.toast('Select a hero first'); return; }
    const h=this.selected;
    if (h.ultCd>0){ this.toast('Ult on cooldown'); return; }
    const ult=h.def.ult; h.ultCd=ult.cd;
    if (h.kind==='captain'){
      this.ringFx(h.x,h.y,ult.range,0xffd166);
      this.addTrauma(0.5); this.hitStop=0.1;
      for (const o of this.orbs) if (Math.hypot(o.x-h.x,o.y-h.y)<=ult.range)
        for (let i=0;i<ult.dmg;i++) this.hitOrb(o,{damage:1,tags:['sharp','arcane'],src:h});
    } else if (h.kind==='sorceress'){
      for (let i=0;i<8;i++){
        const target=this.orbs[Math.floor(Math.random()*Math.max(1,this.orbs.length))];
        const tx=target?target.x:100+Math.random()*(MAP_W-200);
        const ty=target?target.y:100+Math.random()*(MAP_H-200);
        this.meteors.push({x:tx,y:ty,t:0.25*i+Math.random()*0.25,dmg:ult.dmg});
      }
      this.float(h.x,h.y-30,'METEOR STORM',0xff7a59);
    } else if (h.kind==='ranger'){
      for (let i=0;i<30;i++){
        const x=Math.random()*MAP_W;
        this.spawnProj(x,-20,0,700,{damage:ult.dmg,pierce:1,life:1.5,tags:['sharp','precision'],color:0xfff7d6,src:h,r:3});
      }
    }
  }

  toggleStart(){
    if (this.gameOver||this.won) return;
    if (!this.running && this.spawnQueue.length===0){
      this.round++;
      if (this.round>this.maxRound){ this.round=this.maxRound; return; }
      const r=buildRound(this.round); this.pendingReward=r.reward;
      let t=0;
      for (const e of r.entries){
        for (let i=0;i<e.count;i++){ this.spawnQueue.push({at:t,tier:e.tier}); t+=e.gap; }
        t+=0.6;
      }
      this.spawnT=0;
    }
    this.running=!this.running;
  }
  toast(s){ this.txtToast.setText(s); this.toastT=1.6; this.txtToast.setAlpha(1); }
  float(x,y,s,color){ this.floats.push({x,y,s,color,life:1.0}); }

  /* =================================================== Update */
  update(){
    const now=performance.now();
    let dt=(now-this.lastT)/1000; this.lastT=now;
    if (dt>0.033) dt=0.033;     // tight cap = no jump after lag
    if (this.fast) dt*=2;
    this.t+=dt;
    if (this.toastT>0){ this.toastT-=dt; this.txtToast.setAlpha(this.toastT<=0?0:Math.min(1,this.toastT*2)); }
    let simDt=dt;
    if (this.hitStop>0){ this.hitStop-=dt; simDt=0; }
    if (this.running&&!this.gameOver&&!this.won) this.simulate(simDt);

    for (const h of this.heroes){
      if (h.attackT>0) h.attackT=Math.max(0,h.attackT-dt*4);
      h.ultCd=Math.max(0,h.ultCd-dt);
    }
    this.trauma=Math.max(0,this.trauma-dt*0.6);
    for (const r of this.rings){ r.life-=dt; r.r=r.max*(1-r.life/r.max0); }
    this.rings=this.rings.filter(r=>r.life>0);
    for (const b of this.beams) b.life-=dt; this.beams=this.beams.filter(b=>b.life>0);
    for (const b of this.bolts) b.life-=dt; this.bolts=this.bolts.filter(b=>b.life>0);
    for (const f of this.floats){ f.life-=dt; f.y-=dt*30; } this.floats=this.floats.filter(f=>f.life>0);

    this.render();
    this.drawHUD();
  }

  simulate(dt){
    this.spawnT+=dt;
    while (this.spawnQueue.length && this.spawnQueue[0].at<=this.spawnT){
      const s=this.spawnQueue.shift(); this.spawnOrb(s.tier);
    }
    for (const o of this.orbs){
      const sp=o.speed*(o.slow>0?(1-o.slow):1);
      o.dist+=sp*dt; o.spin += sp*dt*0.04;
      if (o.slow>0){ o.slowT-=dt; if (o.slowT<=0) o.slow=0; }
      if (o.poisonT>0){
        o.poisonTickT-=dt;
        if (o.poisonTickT<=0){ o.poisonTickT=0.5;
          this.hitOrb(o,{damage:o.poisonDmg,tags:['poison'],src:o.poisonSrc,isPoisonTick:true});
        }
        o.poisonT-=dt; if (o.poisonT<=0) o.poisonT=0;
      }
      if (o.dist>=TOTAL){
        this.lives-=o.layersRemaining; o.dead=true; this.addTrauma(0.25);
        if (this.lives<=0){ this.lives=0; this.gameOver=true; this.running=false; }
      }
    }
    this.orbs = this.orbs.filter(o=>{ if (o.dead){ if (o.sprite) o.sprite.destroy(); return false; } return true; });

    for (const c of this.clouds){
      c.life-=dt; c.tickT-=dt;
      if (c.tickT<=0){
        c.tickT=0.4;
        for (const o of this.orbs) if (Math.hypot(o.x-c.x,o.y-c.y)<=c.r){
          o.poisonT=Math.max(o.poisonT||0,c.dur);
          o.poisonDmg=Math.max(o.poisonDmg||0,c.dmg);
          o.poisonTickT=o.poisonTickT||0.5;
          o.poisonSrc=c.src;
        }
      }
    }
    this.clouds=this.clouds.filter(c=>c.life>0);

    for (const m of this.meteors){
      m.t-=dt;
      if (m.t<=0&&!m.struck){
        m.struck=true;
        this.ringFx(m.x,m.y,70,0xff7a59); this.addTrauma(0.3); this.hitStop=Math.max(this.hitStop,0.05);
        for (const o of this.orbs) if (Math.hypot(o.x-m.x,o.y-m.y)<=70)
          for (let i=0;i<m.dmg;i++) this.hitOrb(o,{damage:1,tags:['arcane','explosive','sharp'],src:null});
        this.spawnParticles(m.x,m.y,0xff8030,12);
      }
    }
    this.meteors=this.meteors.filter(m=>!(m.struck&&m.t<-0.4));

    const captain=this.heroes.find(h=>h.kind==='captain');
    for (const t of this.towers){
      let rateMul=1;
      if (captain&&captain.stats.aura && Math.hypot(t.x-captain.x,t.y-captain.y)<=captain.stats.auraRange) rateMul=1-captain.stats.auraBuff;
      t.cooldown-=dt;
      if (t.fireFlash>0) t.fireFlash-=dt;
      if (t.stats.aura){
        for (const o of this.orbs) if (Math.hypot(o.x-t.x,o.y-t.y)<=t.stats.range){
          if (o.slow<t.stats.slow){ o.slow=t.stats.slow; o.slowT=t.stats.slowDur; }
        }
        if (t.stats.damage>0&&t.cooldown<=0){ this.fireBurst(t); t.cooldown=t.stats.fireRate*rateMul; }
        continue;
      }
      if (t.cooldown<=0){
        const tgt=this.pickTarget(t);
        if (tgt){ this.fire(t,tgt); t.cooldown=t.stats.fireRate*rateMul; }
      }
    }
    for (const h of this.heroes){
      h.cooldown-=dt;
      if (h.cooldown<=0){
        const tgt=this.pickTarget(h);
        if (tgt){ h.facing=tgt.x>=h.x?1:-1; h.attackT=1; this.heroAttack(h,tgt); h.cooldown=h.stats.fireRate; }
      }
    }

    for (const p of this.projectiles){
      p.life-=dt; if (p.life<=0){ p.dead=true; continue; }
      if (p.homing){
        let best=null,bd=Infinity;
        for (const o of this.orbs){ if (p.hits.has(o)) continue;
          const d=Math.hypot(o.x-p.x,o.y-p.y); if (d<bd){ bd=d; best=o; } }
        if (best){
          const desired=Math.atan2(best.y-p.y,best.x-p.x);
          const cur=Math.atan2(p.vy,p.vx);
          let diff=desired-cur; while (diff>Math.PI) diff-=Math.PI*2; while (diff<-Math.PI) diff+=Math.PI*2;
          const turn=Math.max(-3.0*dt,Math.min(3.0*dt,diff));
          const ang=cur+turn; const sp=Math.hypot(p.vx,p.vy);
          p.vx=Math.cos(ang)*sp; p.vy=Math.sin(ang)*sp;
        }
      }
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      for (const o of this.orbs){
        if (p.dead) break;
        if (p.hits.has(o)) continue;
        const r=(o.r||16)+(p.r||4);
        if (Math.hypot(p.x-o.x,p.y-o.y)<=r){
          this.hitOrb(o,{damage:p.damage,tags:p.tags,src:p.src});
          p.hits.add(o); p.pierce--;
          if (p.splash>0) this.splashFx(p.x,p.y,p.splash,p.tags,p.damage,o,p.src);
          if (p.cloudOnHit) this.clouds.push({x:p.x,y:p.y,r:p.cloudOnHit.r,life:p.cloudOnHit.dur,tickT:0,dur:p.cloudOnHit.dur,dmg:p.cloudOnHit.dmg,src:p.src});
          if (p.pierce<=0) p.dead=true;
        }
      }
      if (p.x<-30||p.x>MAP_W+30||p.y<-30||p.y>MAP_H+30) p.dead=true;
    }
    this.projectiles=this.projectiles.filter(p=>!p.dead);

    for (const pt of this.particles){ pt.life-=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vx*=0.93; pt.vy*=0.93; }
    this.particles=this.particles.filter(p=>p.life>0);

    if (this.spawnQueue.length===0 && this.orbs.length===0){
      this.running=false;
      this.money+=this.pendingReward||0;
      this.float(MAP_W/2,80,`+$${this.pendingReward}`,0xffe066);
      this.pendingReward=0;
      if (this.round>=this.maxRound) this.won=true;
    }
  }

  spawnOrb(tier){
    const def=YARN[tier];
    const sprite = this.add.image(0,0,'yarn_'+tier); sprite.setDepth(500);
    this.orbLayer.add(sprite);
    this.orbs.push({ tier,def,dist:0,x:0,y:0,spin:Math.random()*Math.PI*2,
      r: 16 + (totalPops(tier)>4?2:0),
      sprite, hp:1, speed:def.speed, slow:0, slowT:0,
      poisonT:0, poisonDmg:0, poisonTickT:0, poisonSrc:null,
      layersRemaining: totalPops(tier) });
  }

  pickTarget(t){
    let best=null,bestD=-1;
    for (const o of this.orbs){
      const d=Math.hypot(o.x-t.x,o.y-t.y);
      if (d>t.stats.range) continue;
      if (o.dist>bestD){ bestD=o.dist; best=o; }
    }
    return best;
  }

  fire(t,target){
    const s=t.stats; t.fireFlash=0.1;
    if (s.chain){ this.chainLightning(t,target); return; }
    if (s.hitscan){
      this.beam(t.x,t.y,target.x,target.y);
      this.hitOrb(target,{damage:s.damage,tags:s.tags,src:t});
      this.addTrauma(0.05); return;
    }
    if (s.radial){
      const n=s.radial;
      for (let i=0;i<n;i++){
        const a=(i/n)*Math.PI*2+Math.random()*0.05;
        this.spawnProj(t.x,t.y,Math.cos(a)*s.projSpeed,Math.sin(a)*s.projSpeed,
          {damage:s.damage,pierce:s.pierce,life:s.range/s.projSpeed,splash:0,tags:s.tags,color:t.def.color,src:t});
      }
      return;
    }
    const a=Math.atan2(target.y-t.y,target.x-t.x);
    const opts={damage:s.damage,pierce:s.pierce,life:(s.range+60)/Math.max(1,s.projSpeed),splash:s.splash||0,tags:s.tags,color:t.def.color,src:t};
    if (s.homing){ opts.homing=true; opts.r=5; }
    if (s.poison){ opts.cloudOnHit={r:s.splash,dur:s.poisonDur,dmg:s.poisonDmg}; opts.color=0x9bd66b; opts.r=6; }
    this.spawnProj(t.x,t.y,Math.cos(a)*s.projSpeed,Math.sin(a)*s.projSpeed,opts);
    t.rotation=a;
  }
  fireBurst(t){
    this.ringFx(t.x,t.y,t.stats.range,0xa6e3ff);
    for (const o of this.orbs) if (Math.hypot(o.x-t.x,o.y-t.y)<=t.stats.range){
      if (t.stats.damage>0) this.hitOrb(o,{damage:t.stats.damage,tags:t.stats.tags,src:t});
      if (o.slow<t.stats.slow){ o.slow=t.stats.slow; o.slowT=t.stats.slowDur; }
    }
  }
  chainLightning(t,firstTarget){
    const s=t.stats; let dmg=s.damage; let cur=firstTarget;
    const visited=new Set([cur]); let from={x:t.x,y:t.y};
    for (let i=0;i<s.chainTargets;i++){
      this.bolts.push({x1:from.x,y1:from.y,x2:cur.x,y2:cur.y,life:0.18,color:0xb4befe});
      this.hitOrb(cur,{damage:Math.max(1,Math.floor(dmg)),tags:s.tags,src:t});
      dmg*=s.chainFalloff; from={x:cur.x,y:cur.y};
      let next=null,bd=120;
      for (const o of this.orbs){ if (visited.has(o)) continue;
        const d=Math.hypot(o.x-cur.x,o.y-cur.y); if (d<bd){ bd=d; next=o; } }
      if (!next) break; visited.add(next); cur=next;
    }
    this.addTrauma(0.06);
  }

  heroAttack(h,target){
    const s=h.stats;
    if (h.def.weapon==='sword'){
      const r=s.swingRange; const ang=Math.atan2(target.y-h.y,target.x-h.x);
      h.lastSwingAng=ang;
      for (const o of this.orbs){
        const od=Math.hypot(o.x-h.x,o.y-h.y); if (od>r) continue;
        const oa=Math.atan2(o.y-h.y,o.x-h.x);
        let diff=oa-ang; while (diff>Math.PI) diff-=Math.PI*2; while (diff<-Math.PI) diff+=Math.PI*2;
        if (Math.abs(diff)<=s.swingArc/2) this.hitOrb(o,{damage:s.damage,tags:s.tags,src:h});
      }
      this.addTrauma(0.04);
    } else if (h.def.weapon==='staff'){
      const ang=Math.atan2(target.y-h.y,target.x-h.x);
      this.spawnProj(h.x+Math.cos(ang)*18, h.y-8+Math.sin(ang)*18, Math.cos(ang)*s.projSpeed, Math.sin(ang)*s.projSpeed,
        {damage:s.damage,pierce:1,life:(s.range+60)/s.projSpeed,splash:s.splash||0,tags:s.tags,color:0xff6a3d,src:h,r:7});
      h.rotation=ang;
    } else if (h.def.weapon==='bow'){
      const n=s.multishot|0; const baseAng=Math.atan2(target.y-h.y,target.x-h.x);
      for (let i=0;i<n;i++){
        const offset=(n>1)?(i-(n-1)/2)*0.12:0; const a=baseAng+offset;
        this.spawnProj(h.x,h.y,Math.cos(a)*s.projSpeed,Math.sin(a)*s.projSpeed,
          {damage:s.damage,pierce:s.pierce,life:(s.range+60)/s.projSpeed,splash:0,tags:s.tags,color:0xfff7d6,src:h,r:3});
      }
      h.rotation=baseAng;
    }
  }

  spawnProj(x,y,vx,vy,opt){
    this.projectiles.push({ x,y,vx,vy,life:opt.life||1.5,pierce:opt.pierce||1,damage:opt.damage||1,
      splash:opt.splash||0,tags:opt.tags||[],color:opt.color||0xffffff,r:opt.r||4,
      hits:new Set(),src:opt.src||null,homing:!!opt.homing,cloudOnHit:opt.cloudOnHit||null });
  }
  beam(x1,y1,x2,y2){ this.beams.push({x1,y1,x2,y2,life:0.14}); }
  splashFx(x,y,r,tags,damage,exclude,src){
    this.ringFx(x,y,r,0xffb070);
    for (const o of this.orbs){ if (o===exclude) continue;
      if (Math.hypot(o.x-x,o.y-y)<=r) this.hitOrb(o,{damage,tags,src}); }
    this.addTrauma(0.15); this.hitStop=Math.max(this.hitStop,0.04);
  }
  ringFx(x,y,r,color){ this.rings.push({x,y,r:0,max:r,color,life:0.35,max0:0.35}); }
  hitOrb(o,p){
    let dmg=p.damage|0;
    if (o.def.flags.needsSharp && !p.tags.includes('sharp') && !p.tags.includes('precision') && !p.tags.includes('explosive')){
      this.spawnParticles(o.x,o.y,0xcccccc,3); return;
    }
    if (o.def.flags.darkImmune && p.tags.includes('explosive') && !p.tags.includes('sharp') && !p.tags.includes('precision') && !p.tags.includes('arcane')){
      this.spawnParticles(o.x,o.y,0x333333,3); return;
    }
    while (dmg>0 && o.hp>0){
      o.hp-=1; dmg--;
      if (o.hp<=0){
        this.money+=1;
        if (p.src){ p.src.kills=(p.src.kills||0)+1; if (p.src.isHero){ p.src.xp+=1; this.heroLevelCheck(p.src); } }
        this.spawnParticles(o.x,o.y,o.def.color,6);
        this.addTrauma(0.03);
        if (o.def.next){
          const next=o.def.next, count=o.def.childCount||1;
          for (let i=0;i<count;i++){
            const child=this.makeChild(next,Math.max(0,o.dist-i*4));
            if (o.slow>0){ child.slow=o.slow*0.5; child.slowT=0.4; }
            if (o.poisonT>0){ child.poisonT=o.poisonT*0.7; child.poisonDmg=o.poisonDmg; child.poisonTickT=0.5; child.poisonSrc=o.poisonSrc; }
            this.orbs.push(child);
          }
        }
        o.dead=true; break;
      }
    }
  }
  makeChild(tier,dist){
    const def=YARN[tier];
    const sprite = this.add.image(0,0,'yarn_'+tier); sprite.setDepth(500);
    this.orbLayer.add(sprite);
    return {tier,def,dist,x:0,y:0,r:16,hp:1,speed:def.speed,slow:0,slowT:0,spin:Math.random()*Math.PI*2, sprite,
            poisonT:0,poisonDmg:0,poisonTickT:0,poisonSrc:null, layersRemaining:totalPops(tier)};
  }
  spawnParticles(x,y,color,n){
    for (let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=50+Math.random()*100;
      this.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4+Math.random()*0.25,color});
    }
  }
  addTrauma(v){ this.trauma=Math.min(1,this.trauma+v); }

  /* =================================================== Render */
  render(){
    const t2=this.trauma*this.trauma;
    this.cameras.main.setScroll((Math.random()*2-1)*10*t2,(Math.random()*2-1)*10*t2);

    for (const o of this.orbs){
      const p=pointAt(o.dist); o.x=p.x; o.y=p.y;
      if (o.sprite){
        o.sprite.x=p.x; o.sprite.y=p.y; o.sprite.rotation=o.spin;
        if (o.slow>0) o.sprite.setTint(0xa6e3ff);
        else if (o.poisonT>0) o.sprite.setTint(0x9bd66b);
        else o.sprite.clearTint();
      }
    }
    for (const t of this.towers){
      if (t.flash){ t.flash.setAlpha(Math.max(0, t.fireFlash/0.1 * 0.7)); t.flash.x=t.x; t.flash.y=t.y; }
    }
    for (const h of this.heroes){
      if (h.sprite){
        h.sprite.setFlipX(h.facing<0);
        h.sprite.y = h.y + Math.sin(this.t*4 + h.x*0.01)*1.2;
      }
    }

    const ag=this.gAura; ag.clear();
    const captain=this.heroes.find(h=>h.kind==='captain');
    if (captain && captain.stats.aura){
      ag.fillStyle(0xffd166,0.06).fillCircle(captain.x,captain.y,captain.stats.auraRange);
      ag.lineStyle(1,0xffd166,0.25).strokeCircle(captain.x,captain.y,captain.stats.auraRange);
    }
    for (const c of this.clouds){
      const a=Math.min(0.35,c.life/3);
      ag.fillStyle(0x6cae3c,a*0.5).fillCircle(c.x,c.y,c.r);
      ag.lineStyle(1,0x9bd66b,a).strokeCircle(c.x,c.y,c.r);
    }

    const fg=this.gFx; fg.clear();
    for (const r of this.rings){ fg.lineStyle(3,r.color,Math.max(0,r.life/r.max0)); fg.strokeCircle(r.x,r.y,r.r); }
    for (const b of this.beams){
      fg.lineStyle(3,0xffffff,Math.max(0,b.life/0.14));
      fg.beginPath().moveTo(b.x1,b.y1).lineTo(b.x2,b.y2).strokePath();
      fg.lineStyle(1,0xffe066,Math.max(0,b.life/0.14));
      fg.beginPath().moveTo(b.x1,b.y1).lineTo(b.x2,b.y2).strokePath();
    }
    for (const b of this.bolts){
      const segs=5; let px=b.x1,py=b.y1;
      const dx=(b.x2-b.x1)/segs, dy=(b.y2-b.y1)/segs;
      fg.lineStyle(3,b.color,Math.max(0,b.life/0.18));
      fg.beginPath().moveTo(px,py);
      for (let i=1;i<=segs;i++){
        const nx=b.x1+dx*i+(i<segs?(Math.random()*14-7):0);
        const ny=b.y1+dy*i+(i<segs?(Math.random()*14-7):0);
        fg.lineTo(nx,ny); px=nx; py=ny;
      }
      fg.strokePath();
    }
    for (const m of this.meteors){
      if (!m.struck){
        fg.fillStyle(0xff5511,0.3).fillCircle(m.x,m.y,16);
        fg.lineStyle(2,0xffaa00,0.8).strokeCircle(m.x,m.y,18);
        fg.fillStyle(0xff7a30,0.7).fillCircle(m.x,m.y-Math.max(0,m.t)*200,6);
      }
    }
    for (const p of this.projectiles){
      fg.fillStyle(p.color,1).fillCircle(p.x,p.y,p.r);
      fg.fillStyle(0xffffff,0.6).fillCircle(p.x,p.y,p.r*0.4);
    }
    for (const pt of this.particles) fg.fillStyle(pt.color,Math.max(0,pt.life/0.65)).fillCircle(pt.x,pt.y,2.5);

    for (const h of this.heroes){
      if (h.attackT<=0.05) continue;
      if (h.def.weapon==='sword' && h.lastSwingAng!=null){
        const a0=h.lastSwingAng, arc=h.def.base.swingArc, r=h.stats.swingRange, atk=h.attackT;
        fg.lineStyle(4, 0xfff7d6, atk*0.75);
        const startA=a0-arc/2, endA=a0+arc/2;
        const steps=14; fg.beginPath();
        for (let i=0;i<=steps;i++){
          const a=startA+(endA-startA)*(i/steps);
          const xx=h.x+Math.cos(a)*r*atk, yy=h.y+Math.sin(a)*r*atk;
          if (i===0) fg.moveTo(xx,yy); else fg.lineTo(xx,yy);
        }
        fg.strokePath();
        const swingAng = a0 - (arc/2)*h.facing + atk*arc*h.facing;
        const hx = h.x+Math.cos(swingAng)*22, hy = h.y+Math.sin(swingAng)*22;
        fg.lineStyle(5, 0xe8edf2, 1).beginPath().moveTo(h.x,h.y-6).lineTo(hx,hy).strokePath();
      } else if (h.def.weapon==='staff'){
        const a=h.rotation||0;
        const tx = h.x+Math.cos(a)*18, ty = h.y-12+Math.sin(a)*18;
        fg.fillStyle(0xff3a1a, 0.3+h.attackT*0.4).fillCircle(tx,ty,9);
        fg.fillStyle(0xff7a30, 0.9).fillCircle(tx,ty,5);
        fg.fillStyle(0xffd166, 1).fillCircle(tx,ty,2.5);
      } else if (h.def.weapon==='bow'){
        const a=h.rotation||0;
        fg.lineStyle(1, 0xeeeeee, 1);
        const hx=h.x+Math.cos(a)*16, hy=h.y+Math.sin(a)*16;
        fg.beginPath()
          .moveTo(hx+Math.cos(a+Math.PI/2)*10,hy+Math.sin(a+Math.PI/2)*10)
          .lineTo(hx-Math.cos(a)*h.attackT*6, hy-Math.sin(a)*h.attackT*6)
          .lineTo(hx-Math.cos(a+Math.PI/2)*10,hy-Math.sin(a+Math.PI/2)*10)
          .strokePath();
      }
    }
    for (const f of this.floats) fg.fillStyle(f.color,Math.max(0,f.life)).fillRect(f.x-14,f.y,28,3);

    const pv=this.gPreview; pv.clear();
    if (this.placing && this.mouse && this.mouse.x<MAP_W){
      const isHero=this.placing.type==='hero';
      const def=isHero?HERO[this.placing.kind]:TOWER[this.placing.kind];
      const ok=this.canPlace(this.mouse.x,this.mouse.y,isHero);
      pv.fillStyle(ok?0x88ff88:0xff8888,0.16).fillCircle(this.mouse.x,this.mouse.y,def.base.range);
      pv.lineStyle(2,ok?0x88ff88:0xff8888,0.9).strokeCircle(this.mouse.x,this.mouse.y,def.base.range);
      if (isHero && def.base.aura) pv.lineStyle(1,0xffd166,0.6).strokeCircle(this.mouse.x,this.mouse.y,def.base.auraRange);
    }

    if (this.selected){
      fg.lineStyle(2, 0xffe066, 0.9).strokeCircle(this.selected.x, this.selected.y, this.selected.stats.range);
      fg.lineStyle(2, 0xffe066, 1).strokeCircle(this.selected.x, this.selected.y, 30);
    }

    this.drawShop();
  }

  drawShop(){
    const g=this.gUI; g.clear();
    g.fillStyle(0x12172a,1).fillRect(SHOP_X,0,SHOP_W,H);
    g.lineStyle(2,0x232944,1).strokeRect(SHOP_X,0,SHOP_W,H);
    g.fillStyle(0x1a2038,1).fillRect(SHOP_X,0,SHOP_W,70);
    const sb=this.startBtn;
    const startCol=this.running?0xff8b94:0xa8e6cf;
    g.fillStyle(startCol,0.18).fillRoundedRect(sb.x,sb.y,sb.w,sb.h,6);
    g.lineStyle(1.2,startCol,0.9).strokeRoundedRect(sb.x,sb.y,sb.w,sb.h,6);
    for (const b of this.tabBtns){
      const active=b.id===this.tab;
      g.fillStyle(active?0x2a3460:0x1a2038,1).fillRoundedRect(b.x,b.y,b.w,b.h,6);
      g.lineStyle(1,active?0x6b7fbf:0x33384a,1).strokeRoundedRect(b.x,b.y,b.w,b.h,6);
    }
    for (let i=0;i<this.cardsTowers.length;i++){
      const v=this.tab==='towers';
      this.txtCardName[i].setVisible(v); this.txtCardSub[i].setVisible(v);
      this.txtCardCost[i].setVisible(v); this.txtCardKey[i].setVisible(v);
    }
    for (let i=0;i<this.cardsHeroes.length;i++){
      const v=this.tab==='heroes';
      this.txtHeroName[i].setVisible(v); this.txtHeroSub[i].setVisible(v);
      this.txtHeroCost[i].setVisible(v); this.txtHeroKey[i].setVisible(v);
    }
    for (const ic of this.cardIcons) ic.img.setVisible((ic.type==='tower')===(this.tab==='towers'));

    const cards=this.tab==='towers'?this.cardsTowers:this.cardsHeroes;
    for (const c of cards){
      const def=c.kind_type==='tower'?TOWER[c.kind]:HERO[c.kind];
      const can=this.money>=def.cost;
      const sel=this.placing&&this.placing.kind===c.kind;
      const hov=this.hover===c;
      const bg=sel?0x394566:(hov?0x252e4a:0x1a2038);
      g.fillStyle(bg,1).fillRoundedRect(c.x,c.y,c.w,c.h,8);
      g.lineStyle(1.5,can?(sel||hov?0x9fb1cb:0x4a5a7e):0x33384a,1).strokeRoundedRect(c.x,c.y,c.w,c.h,8);
      g.fillStyle(0x0c0f17,0.7).fillRoundedRect(c.x+5,c.y+3,16,14,3);
    }

    if (this.hover){
      const c=this.hover; const def=c.kind_type==='tower'?TOWER[c.kind]:HERO[c.kind];
      let txt=`${def.name}\n$${def.cost}\n${def.desc}`;
      if (c.kind_type==='tower'){
        const b=def.base;
        txt+=`\n\nrange ${b.range|0}  rate ${b.fireRate.toFixed(2)}s\ndmg ${b.damage} pierce ${b.pierce}\ntags: ${b.tags.join(', ')}`;
        txt+=`\n\nA: ${def.pathA.map(u=>u.name).join(' → ')}\nB: ${def.pathB.map(u=>u.name).join(' → ')}`;
      } else {
        txt+=`\n\nWeapon: ${def.weapon}\nUlt: ${def.ult.name} (${def.ult.cd}s)`;
        txt+=`\n\n${def.levels.map((l,i)=>`${i+1}. ${l.name}`).join('\n')}`;
      }
      this.tooltipText.setText(txt);
      const tw=Math.min(240,this.tooltipText.width+14);
      const th=this.tooltipText.height+12;
      let tx=c.x-tw-12, ty=Math.min(H-th-8,c.y);
      if (tx<8) tx=c.x+c.w+8;
      this.tooltipBg.clear();
      this.tooltipBg.fillStyle(0x0c0f17,0.96).fillRoundedRect(tx,ty,tw,th,6).setDepth(99);
      this.tooltipBg.lineStyle(1,0x4a5a7e,1).strokeRoundedRect(tx,ty,tw,th,6);
      this.tooltipText.setPosition(tx+7,ty+6).setVisible(true);
    } else { this.tooltipBg.clear(); this.tooltipText.setVisible(false); }

    if (this.selected){
      const u=this.infoPanel;
      g.fillStyle(0x1a2038,1).fillRoundedRect(u.x,u.y,u.w,u.h,8);
      g.lineStyle(1.5,0x33384a,1).strokeRoundedRect(u.x,u.y,u.w,u.h,8);
      const t=this.selected;
      if (!t.isHero){
        const a=t.def.pathA[t.level.A], b=t.def.pathB[t.level.B];
        this.txtInfoName.setText(`${t.def.name}  ⬩ A${t.level.A}/B${t.level.B}  ⬩ ${t.kills} pops`);
        const s=t.stats;
        this.txtInfoStats.setText(`range ${s.range|0}   rate ${s.fireRate.toFixed(2)}s   dmg ${s.damage}   pierce ${s.pierce}`);
        g.fillStyle(a?0x223352:0x1a2038,1).fillRoundedRect(u.x+8,u.y+82,u.w-16,42,6);
        g.lineStyle(1,a?0x4a7abf:0x33384a,1).strokeRoundedRect(u.x+8,u.y+82,u.w-16,42,6);
        this.txtUpgA.setText(a?`▶ A: ${a.name}\n   $${a.cost}`:'Path A: MAX');
        this.txtUpgA.setColor(this.money>=(a?.cost||0)?'#e8eef7':'#677387');
        g.fillStyle(b?0x223352:0x1a2038,1).fillRoundedRect(u.x+8,u.y+128,u.w-16,42,6);
        g.lineStyle(1,b?0x4a7abf:0x33384a,1).strokeRoundedRect(u.x+8,u.y+128,u.w-16,42,6);
        this.txtUpgB.setText(b?`▶ B: ${b.name}\n   $${b.cost}`:'Path B: MAX');
        this.txtUpgB.setColor(this.money>=(b?.cost||0)?'#e8eef7':'#677387');
        g.fillStyle(0x3a1e22,1).fillRoundedRect(u.x+8,u.y+176,u.w-16,26,6);
        g.lineStyle(1,0x7e4a4a,1).strokeRoundedRect(u.x+8,u.y+176,u.w-16,26,6);
        this.txtSell.setText(`SELL  +$${Math.floor(t.totalSpent*0.7)}`);
      } else {
        const next=t.def.levels[t.level];
        this.txtInfoName.setText(`${t.def.name}  ⬩ Lv ${t.level}  ⬩ ${t.kills} pops`);
        this.txtInfoStats.setText(`xp ${t.xp}${next?'/'+next.xp:''}   range ${t.stats.range|0}   rate ${t.stats.fireRate.toFixed(2)}s   dmg ${t.stats.damage}\nUlt: ${t.def.ult.name}  ${t.ultCd>0?'cd '+t.ultCd.toFixed(1)+'s':'READY (R)'}`);
        const bw=u.w-16, ratio=next?Math.min(1,t.xp/next.xp):1;
        g.fillStyle(0x12172a,1).fillRoundedRect(u.x+8,u.y+74,bw,6,3);
        g.fillStyle(0xffd166,1).fillRoundedRect(u.x+8,u.y+74,bw*ratio,6,3);
        g.fillStyle(0x223352,1).fillRoundedRect(u.x+8,u.y+88,u.w-16,42,6);
        g.lineStyle(1,0x4a7abf,1).strokeRoundedRect(u.x+8,u.y+88,u.w-16,42,6);
        this.txtUpgA.setText(next?`Next: ${next.name}`:'MAX LEVEL'); this.txtUpgA.setColor('#cfd6e6');
        g.fillStyle(t.ultCd<=0?0x3a3460:0x1a2038,1).fillRoundedRect(u.x+8,u.y+136,u.w-16,32,6);
        g.lineStyle(1,t.ultCd<=0?0xb4befe:0x33384a,1).strokeRoundedRect(u.x+8,u.y+136,u.w-16,32,6);
        this.txtUpgB.setText(`R ▶ ${t.def.ult.name}${t.ultCd>0?'  ('+t.ultCd.toFixed(1)+'s)':''}`);
        this.txtUpgB.setColor(t.ultCd<=0?'#e8eef7':'#677387');
        g.fillStyle(0x3a1e22,1).fillRoundedRect(u.x+8,u.y+176,u.w-16,26,6);
        g.lineStyle(1,0x7e4a4a,1).strokeRoundedRect(u.x+8,u.y+176,u.w-16,26,6);
        this.txtSell.setText(`DISMISS  +$${Math.floor(t.totalSpent*0.7)}`);
      }
      this.txtInfoName.setVisible(true); this.txtInfoStats.setVisible(true);
      this.txtUpgA.setVisible(true); this.txtUpgB.setVisible(true); this.txtSell.setVisible(true);
    } else {
      this.txtInfoName.setVisible(false); this.txtInfoStats.setVisible(false);
      this.txtUpgA.setVisible(false); this.txtUpgB.setVisible(false); this.txtSell.setVisible(false);
    }

    if (this.selected && this.selected.isHero){
      const ub=this.ultBtn; const ready=this.selected.ultCd<=0;
      g.fillStyle(ready?0x3a3460:0x1a2038,1).fillRoundedRect(ub.x,ub.y,ub.w,ub.h,8);
      g.lineStyle(2,ready?0xffd166:0x33384a,1).strokeRoundedRect(ub.x,ub.y,ub.w,ub.h,8);
      this.txtUltLabel.setVisible(true); this.txtUltCd.setVisible(true);
      this.txtUltCd.setText(ready?'READY':this.selected.ultCd.toFixed(1)+'s');
    } else { this.txtUltLabel.setVisible(false); this.txtUltCd.setVisible(false); }
  }

  drawHUD(){
    this.txtMoney.setText(`$ ${this.money}`);
    this.txtLives.setText(`♥ ${this.lives}`);
    this.txtRound.setText(`Rd ${this.round}/${this.maxRound}`);
    this.txtNext.setText(this.running?'WAVE IN PROGRESS':(this.gameOver||this.won?'':`SPACE / click ▶ to begin Rd ${Math.min(this.round+1,this.maxRound)}`));
    if (this.gameOver) this.txtCenter.setText('DEFEAT\nclick anywhere to restart');
    else if (this.won) this.txtCenter.setText('VICTORY\nclick anywhere to restart');
    else this.txtCenter.setText('');
  }
}

/* ---------- helpers ---------- */
function pointToSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay; const l2=dx*dx+dy*dy;
  if (l2===0) return Math.hypot(px-ax,py-ay);
  let t=((px-ax)*dx+(py-ay)*dy)/l2;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+dx*t),py-(ay+dy*t));
}
function shade(color, amt){
  const r=(color>>16)&0xff, g=(color>>8)&0xff, b=color&0xff;
  const f=v=>Math.max(0,Math.min(255,v+amt));
  return (f(r)<<16)|(f(g)<<8)|f(b);
}
function breedIris(kind){
  return kind==='dart'?0x6bc24f
       : kind==='tack'?0xf2a33a
       : kind==='bomb'?0xffaa55
       : kind==='ice' ?0xa6e3ff
       : kind==='sniper'?0x6a9ecf
       : kind==='storm' ?0xc9d0ff
       : kind==='engineer'?0xffb070
       : kind==='druid'?0x9bd66b
       : 0xfff7d6;
}
